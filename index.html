function skillRow(label, value) {
  return `<div class="skill"><span class="skill-name">${label}</span><span class="skill-value">${value}</span></div>`;
}

function renderDamageBody(p, eq) {
  const d = p.derived;
  const hitsPerDay = actionsPerDay(p.eco.energy);
  const hpPerHit = hpCostPerHit(d.armRaw);
  const hitsBefore = hpPerHit ? Math.floor(d.hp / hpPerHit) : '–';
  const rankPct = p.militaryRankPercent || 0;
  const expDmg = expectedDamagePerHit(d, rankPct, battleBonusPct);
  const baseDmgNoBonus = expectedDamagePerHit(d, rankPct, 0);
  return `
    <div class="stats">
      <div class="stat"><span class="stat-label">Attack</span><span class="stat-value">${fmtInt(d.atk)}</span></div>
      <div class="stat"><span class="stat-label">Precision</span><span class="stat-value">${fmtInt(d.prc)}%</span></div>
      <div class="stat"><span class="stat-label">Crit chance</span><span class="stat-value">${fmtInt(d.cc)}%</span></div>
      <div class="stat"><span class="stat-label">Crit damage</span><span class="stat-value">${fmtInt(d.cd)}%</span></div>
      <div class="stat"><span class="stat-label">Armor</span><span class="stat-value">${fmtInt(d.arm)}%</span></div>
      <div class="stat"><span class="stat-label">Dodge</span><span class="stat-value">${fmtInt(d.ddg)}%</span></div>
      <div class="stat"><span class="stat-label">Health</span><span class="stat-value">${fmtInt(d.hp)}</span></div>
      <div class="stat"><span class="stat-label">HP / hit</span><span class="stat-value">${hpPerHit ? fmt(hpPerHit, 1) : '–'}</span></div>
    </div>
    <div class="section">
      <div class="section-label">
        Expected damage / hit
        ${infoBtn([
          { term: 'Formula', desc: 'atk × (1 + mil rank%) × (1 + battle bonus%) × precision/crit/miss weighting.' },
          { term: 'Mil rank', desc: `+${fmt(rankPct, 1)}% (rank ${p.militaryRank ?? '?'}).` },
          { term: 'Battle bonus', desc: 'Sum of country order, MU order, patriotic, ally, first-hit, etc. Shown live in-game on the battle screen — copy that number in.' },
          { term: 'Roll variance', desc: 'Real hits vary ±1-2% from this average due to RNG damage roll.' },
        ], 'Damage formula')}
        <span class="right">${fmtInt(expDmg)} dmg${battleBonusPct > 0 ? ` <span style="color: var(--dimmer); font-weight: 400;">(${fmtInt(baseDmgNoBonus)} without bonuses)</span>` : ''}</span>
      </div>
      <div class="plan-control" style="margin-bottom: 0.7rem;">
        <label>Battle bonus
          <input id="battle-bonus-input" type="number" min="0" max="200" step="1" value="${battleBonusPct}">
          <span class="muted">%</span>
        </label>
        <span class="muted" style="font-size: 0.78rem;">Set this to the aggregate % shown in-game on the battle screen (country/MU orders, ally, patriotic, first-hit, etc.). 0 = peacetime preview.</span>
      </div>
    </div>
    <div class="section">
      <div class="section-label">Equipped gear<span class="right">${fmt(hitsPerDay, 1)} hits/day · ${hitsBefore} hits before regen</span></div>
      ${equipmentTable(eq)}
    </div>
  `;
}

const STAT_LABELS = {
  attack: 'attack', criticalChance: 'crit chance', criticalDamages: 'crit damage',
  armor: 'armor', dodge: 'dodge', precision: 'precision',
};

function equipmentTable(eq) {
  const slots = [
    ['weapon', 'Weapon', ['attack', 'criticalChance']],
    ['helmet', 'Helmet', ['criticalDamages']],
    ['chest',  'Chest',  ['armor']],
    ['pants',  'Pants',  ['armor']],
    ['boots',  'Boots',  ['dodge']],
    ['gloves', 'Gloves', ['precision']],
  ];
  const rows = slots.map(([key, label, statKeys]) => {
    const item = eq[key];
    if (!item) return `<tr class="empty"><td>${label}</td><td colspan="3">empty</td></tr>`;
    const statStr = statKeys
      .map(sk => { const v = item.skills[sk]; return v ? `${fmtInt(v)} ${STAT_LABELS[sk] || sk}` : null; })
      .filter(Boolean).join(', ') || '–';
    const nameCell = item.rarity
      ? `${escapeHtml(item.displayName)}${rarityTag(item.rarity)}`
      : `<span class="mono">${escapeHtml(item.code)}</span>`;
    return `<tr>
      <td>${label}</td>
      <td>${nameCell}</td>
      <td>${statStr}</td>
      <td class="num">${item.durability != null ? fmtInt(item.durability) + '%' : '–'}</td>
    </tr>`;
  });
  return `<table class="list">
    <thead><tr><th>Slot</th><th>Item</th><th>Stat</th><th>Durability</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

function renderIncomeBody(p, data, comps, ownWage, dailyWageIncome, factoryNet) {
  const eco = p.eco;
  const workActions = actionsPerDay(eco.energy);
  const entreActions = actionsPerDay(eco.entrepreneurship);

  const factoryRevenue = comps.reduce((s, c) => s + (c.dailyRevenue || 0), 0);
  const factoryWageCost = comps.reduce((s, c) => s + (c.dailyWageCost || 0), 0);
  const factoryIngCost = comps.reduce((s, c) => s + (c.dailyIngredientCost || 0), 0);

  const isForeignEmployer = !!data.workplaceCountry;
  const employerCountry = data.workplaceCountry || data.country;
  const ownCountry = data.country;
  const employerName = employerCountry?.name || 'your country';
  const ownName = ownCountry?.name || 'your country';

  const wageProdBonus = employerCountry?.strategicResources?.bonuses?.productionPercent || 0;
  const wageIncomeTax = employerCountry?.taxes?.income || 0;
  const ownProdBonus = ownCountry?.strategicResources?.bonuses?.productionPercent || 0;
  const ownMarketTax = ownCountry?.taxes?.market || 0;

  let modifiersNote = '';
  if (isForeignEmployer) {
    const wageMods = [];
    if (wageIncomeTax) wageMods.push(`−${wageIncomeTax}% income tax`);
    const compMods = [];
    if (ownProdBonus) compMods.push(`+${ownProdBonus}% prod`);
    if (ownMarketTax) compMods.push(`−${ownMarketTax}% market tax`);
    modifiersNote = `<p class="note" style="margin-top: 0; margin-bottom: 0.7rem;">
      <strong style="color: var(--warn);">Foreign employer (${escapeHtml(employerName)})</strong>:
      wage uses ${wageMods.join(' · ') || 'no modifiers'} (production bonus lifts the employer's PP, not your wage).
      Your companies (${escapeHtml(ownName)}): ${compMods.join(' · ') || 'no modifiers'}.
    </p>`;
  } else {
    const modParts = [];
    if (ownProdBonus) modParts.push(`+${ownProdBonus}% production (companies only)`);
    if (ownMarketTax) modParts.push(`−${ownMarketTax}% market tax`);
    if (wageIncomeTax) modParts.push(`−${wageIncomeTax}% income tax (wages only)`);
    modifiersNote = modParts.length
      ? `<p class="note" style="margin-top: 0; margin-bottom: 0.7rem;">${escapeHtml(ownName)} modifiers applied: ${modParts.join(' · ')}.</p>`
      : '';
  }

  return `
    ${modifiersNote}
    <div class="bs-grid" style="margin-bottom: 0.85rem;">
      <div class="bs-block">
        <h5>Daily inflow</h5>
        ${ownWage != null ? `
          <div class="bs-line">
            <span class="ll">Job wage<span class="qty" style="color: var(--dimmer); font-family: var(--mono); font-size: 0.74rem; margin-left: 0.3rem;">${fmt(ownWage, 3)} ₿/PP × ${eco.production} PP × ${fmt(workActions, 1)} actions</span></span>
            <span class="lv pos">${fmtSigned(dailyWageIncome)}</span>
          </div>` : ''}
        <div class="bs-line">
          <span class="ll">Company revenue</span>
          <span class="lv pos">${fmtSigned(factoryRevenue)}</span>
        </div>
        <div class="bs-line total">
          <span class="ll">Total in</span>
          <span class="lv pos">${fmtSigned(factoryRevenue + dailyWageIncome)}</span>
        </div>
      </div>
      <div class="bs-block">
        <h5>Daily costs</h5>
        ${factoryWageCost > 0 ? `<div class="bs-line">
          <span class="ll">Worker wages</span>
          <span class="lv neg">${fmtSigned(-factoryWageCost)}</span>
        </div>` : ''}
        ${factoryIngCost > 0 ? `<div class="bs-line">
          <span class="ll">Ingredient costs</span>
          <span class="lv neg">${fmtSigned(-factoryIngCost)}</span>
        </div>` : ''}
        ${factoryWageCost === 0 && factoryIngCost === 0 ? `<div class="bs-line"><span class="ll muted">No recurring costs</span><span class="lv">${fmtBtc(0)}</span></div>` : ''}
        <div class="bs-line total">
          <span class="ll">Total out</span>
          <span class="lv neg">${fmtSigned(-(factoryWageCost + factoryIngCost))}</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Pools<span class="right">Energy ${eco.energy} · Entr ${eco.entrepreneurship}</span></div>
      <div class="skills">
        <div class="skill">
          <span class="skill-name">Energy pool (work or fight)</span>
          <span class="skill-value"><span class="total">${fmt(workActions, 1)}</span> <span class="sub">actions/day</span></span>
        </div>
        <div class="skill">
          <span class="skill-name">Entrepreneurship pool (self-work)</span>
          <span class="skill-value"><span class="total">${fmt(entreActions, 1)}</span> <span class="sub">actions/day</span></span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Per company · ${comps.length}/${eco.companies}</div>
      ${companiesTable(comps)}
    </div>
  `;
}

function companyBreakdownRows(c) {
  const rows = [];
  rows.push({ term: 'Engine', desc: c.aeLevel ? `AE ${c.aeLevel} → ${fmtInt(c.aePP)} PP/day (config)` : 'No automated engine' });

  if (c.workers && c.workers.length) {
    const lines = c.workers.map(w => {
      if (!w.hasProfile) return `fid ${w.fidelity} @ ${fmt(w.wage, 3)} ₿/PP — profile unavailable`;
      return `fid ${w.fidelity} @ ${fmt(w.wage, 3)} ₿/PP, E${w.energy}/P${w.production} → ${fmt(w.actionsPerDay, 1)} acts/day, ${fmtInt(w.pp)} PP`;
    }).join(' · ');
    rows.push({ term: 'Workers', desc: `${c.workers.length} (${lines}) → wages ${fmtBtc(c.dailyWageCost)}/day` });
  } else if (c.workerCount > 0) {
    rows.push({ term: 'Workers', desc: `${c.workerCount} worker(s), details not loaded — PP not counted` });
  } else {
    rows.push({ term: 'Workers', desc: 'None' });
  }

  if (c.dailyOutput) rows.push({ term: 'Output', desc: `${fmtInt(c.aePP + c.workerPP)} PP/day ÷ ${c.ppPer} PP/unit = ${fmtInt(c.dailyOutput)} units/day` });

  if (c.marketPrice != null) {
    rows.push({ term: 'Revenue', desc: `${fmt(c.marketPrice, 3)} ₿ × ${fmtInt(c.dailyOutput)} = ${fmtBtc(c.dailyRevenue)}/day` });
  } else {
    rows.push({ term: 'Revenue', desc: 'Market price unavailable' });
  }

  if (c.isProcessed && c.dailyIngredientCost != null) {
    const recipeStr = c.recipeBreakdown.map(r => `${r.qty}× ${r.ingredient}`).join(' + ');
    rows.push({ term: 'Ingredients', desc: `${recipeStr} per unit → −${fmtBtc(c.dailyIngredientCost)}/day` });
  }

  if (c.dailyNet != null) rows.push({ term: 'Net', desc: `${fmtSigned(c.dailyNet)}/day` });
  return rows;
}

function companiesTable(comps) {
  if (!comps.length) return `<p class="muted" style="font-size:0.85rem; margin:0;">No companies found.</p>`;
  const anyIncomplete = comps.some(c => c.workersIncomplete);
  const rows = comps.map(c => {
    const revCol = c.dailyRevenue != null
      ? `<td class="num">${fmtBtc(c.dailyRevenue)}</td>`
      : `<td class="num muted">–</td>`;
    const netCol = c.dailyNet != null
      ? `<td class="${c.dailyNet >= 0 ? 'pos' : 'neg'}">${fmtSigned(c.dailyNet)}</td>`
      : `<td class="num muted">–</td>`;
    const workerCell = c.workersIncomplete
      ? `${c.workerCount} <span class="muted" title="Worker profile data incomplete — PP and wage costs may be under-counted">⚠</span>`
      : `${c.workerCount}`;
    return `<tr>
      <td>${escapeHtml(c.name)}&nbsp;<span class="mono" style="color: var(--dimmer); font-size: 0.76rem; margin-left: 0.25rem;">${escapeHtml(c.itemCode)}</span>&nbsp;${infoBtn(companyBreakdownRows(c), c.name + ' breakdown')}</td>
      <td>${c.aeLevel ? 'AE ' + c.aeLevel : '–'}</td>
      <td class="num">${workerCell}</td>
      ${revCol}
      ${netCol}
    </tr>`;
  });
  const incompleteNote = anyIncomplete
    ? `<p class="note" style="margin-top: 0.4rem;">⚠ Some worker profiles couldn't be loaded — affected companies show under-counted PP and may have a blank net.</p>`
    : '';
  return `<table class="list">
    <thead><tr>
      <th>Company</th><th>Engine</th><th>Workers</th><th>Revenue</th><th>Net</th>
    </tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>${incompleteNote}`;
}

function renderWealthBody(data) {
  const stats = data.user?.stats || {};
  const wealth = stats.wealth;
  if (!wealth || typeof wealth !== 'object') {
    return `<p class="muted" style="font-size:0.82rem; margin:0;">Wealth data unavailable.</p>`;
  }
  const rows = [
    ['Companies', wealth.companies],
    ['Items',     wealth.items],
    ['Money',     wealth.money],
    ['Equipment', wealth.equipments],
    ['Weapons',   wealth.weapons],
  ].filter(([, v]) => v != null);

  const tbody = rows.map(([label, value]) => `
    <tr><td>${label}</td><td class="num">${fmtBtc(value)}</td></tr>
  `).join('');

  return `<table class="list"><tbody>
    ${tbody}
    <tr><td><strong>Total</strong></td><td class="num"><strong>${fmtBtc(wealth.total)}</strong></td></tr>
  </tbody></table>`;
}

function renderTargetBuild(p, data) {
  const preset = PRESETS[selectedPreset];
  const currentLevel = parseInt(p.level, 10) || 0;

  const minLevel = Math.max(20, currentLevel);
  const effectiveLevel = viewLevel != null ? viewLevel : minLevel;
  const isProjected = currentLevel < 20;
  const isUnsupported = currentLevel > 30;

  const tabBadges = {};
  for (const key of Object.keys(PRESETS)) {
    const ps = PRESETS[key];
    const tempParams = { ...warParams, warDays: warParams.warDays };
    const cons = computeConsumables(ps, data.prices, p, tempParams);
    const eq = extractEquipment(data.inventory);
    const gear = computeGearNeeds(eq, ps, data.prices, tempParams);
    const daily = computeDailyDuringWar(ps, data.prices, p, data, tempParams, cons);
    const selfFunding = daily.warNet >= 0;
    tabBadges[key] = {
      selfFunding,
      label: selfFunding ? '✓ Self-funding' : '⚠ Burns ₿',
      gearTotal: gear.total + cons.total,
    };
  }

  const target = computeTargetStats(preset, p.militaryRankPercent, battleBonusPct);
  const eq = extractEquipment(data.inventory);
  const comps = extractCompanies(data);
  const foundations = computeFoundations(p, comps, preset);
  const gearNeeds = computeGearNeeds(eq, preset, data.prices, warParams);
  const consumables = computeConsumables(preset, data.prices, p, warParams);
  const daily = computeDailyDuringWar(preset, data.prices, p, data, warParams, consumables);

  const totalToPrepare = (gearNeeds.total || 0) + (consumables.total || 0);
  const grandTotalSub = gearNeeds.anyMissing || consumables.anyMissing
    ? 'Some prices missing — total is a lower bound.'
    : `${escapeHtml(preset.daysLabel || 'War days')}: ${escapeHtml(String(warParams.warDays))}`;

  const tabsHtml = Object.entries(PRESETS).map(([key, ps]) => {
    const badge = tabBadges[key];
    return `<button type="button" class="tab ${key === selectedPreset ? 'active' : ''}" data-preset="${key}">
      <span class="tab-name">${escapeHtml(ps.name)}</span>
      <span class="tab-sub">${escapeHtml(ps.sub || '')}</span>
      <span class="tab-badge ${badge.selfFunding ? 'self-funding' : 'burns'}">${escapeHtml(badge.label)}</span>
    </button>`;
  }).join('');

  const levelControl = renderLevelControl(currentLevel, effectiveLevel, isProjected, isUnsupported, preset);

  const boxes = [
    targetBox('skills', '1', 'Skill allocation',
      skillSummary(p, preset, effectiveLevel),
      renderSkillBox(p, preset, effectiveLevel, currentLevel)),
    targetBox('companies', '2', 'Companies',
      foundationsSummary(foundations, comps),
      renderCompaniesBox(p, data, foundations, comps, preset)),
    targetBox('gear', '3', 'Gear & consumables',
      gearSummary(gearNeeds, consumables),
      renderGearBox(gearNeeds, consumables, preset)),
    targetBox('modelDay', '4', 'Model war day',
      `<span class="mono ${daily.warNet >= 0 ? 'pos' : 'neg'}">${fmtSigned(daily.warNet)}/day net</span>`,
      renderModelDayBox(daily, warParams, preset)),
    targetBox('bottomLine', '5', 'Bottom line',
      bottomLineSummary(daily, totalToPrepare, warParams),
      renderBottomLineBox(daily, totalToPrepare, warParams, preset, gearNeeds, consumables)),
  ].join('');

  $('#target-content').innerHTML = `
    <div class="tabs">${tabsHtml}</div>
    ${preset.outcome ? `<p class="placeholder-text" style="margin-bottom: 0.7rem;"><strong style="color: var(--accent);">Outcome</strong> ${escapeHtml(preset.outcome)}</p>` : ''}
    ${levelControl}

    <div class="grand-banner">
      <div>
        <div class="label">Total to prepare</div>
        <div class="sub">${grandTotalSub}</div>
      </div>
      <div class="mono">${fmtBtc(totalToPrepare)}</div>
    </div>

    ${boxes}
  `;

  $('#target-content .tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const newPreset = btn.dataset.preset;
      if (newPreset !== selectedPreset) {
        selectedPreset = newPreset;
        warParams.warDays = PRESETS[selectedPreset].daysDefault ?? DEFAULT_WAR_PARAMS.warDays;
      }
      renderTargetBuild(p, data);
    });
  });

  $$('#target-content .target-box-head').forEach(h => {
    h.addEventListener('click', () => {
      const box = h.closest('.target-box');
      const id = box.dataset.box;
      targetExpanded[id] = !targetExpanded[id];
      box.classList.toggle('open', targetExpanded[id]);
    });
  });

  const lvSelect = $('#plan-level');
  if (lvSelect) {
    lvSelect.addEventListener('change', () => {
      const v = parseInt(lvSelect.value, 10);
      viewLevel = isNaN(v) ? null : v;
      renderTargetBuild(p, data);
    });
  }
  const wDays = $('#war-days');
  if (wDays) {
    wDays.addEventListener('change', () => {
      const v = parseInt(wDays.value, 10);
      const fallback = PRESETS[selectedPreset].daysDefault ?? DEFAULT_WAR_PARAMS.warDays;
      warParams.warDays = isNaN(v) || v < 1 ? fallback : v;
      renderTargetBuild(p, data);
    });
  }
}

function targetBox(id, num, title, summary, body) {
  const open = targetExpanded[id];
  return `<div class="target-box${open ? ' open' : ''}" data-box="${id}">
    <div class="target-box-head">
      <span class="caret">▾</span>
      <span class="target-box-num">${num}.</span>
      <span class="target-box-title">${escapeHtml(title)}</span>
      <span class="target-box-summary">${summary || ''}</span>
    </div>
    <div class="target-box-body">${body}</div>
  </div>`;
}

function renderLevelControl(currentLevel, effectiveLevel, isProjected, isUnsupported, preset) {
  if (isUnsupported) {
    return `<div class="plan-control">
      <span class="muted">Plan for level:</span>
      <strong style="color: var(--warn);">Lvl ${currentLevel} not modelled</strong>
      ${infoBtn('Published guides cover Levels 20-30. For Lvl 31+ we use the Lvl 30 endgame plan as a reference.', 'Unsupported level')}
      <label>${escapeHtml(preset.daysLabel || 'War days')}
        <input id="war-days" type="number" min="1" max="30" value="${warParams.warDays}">
      </label>
      <p class="plan-note">Showing Lvl 30 endgame plan as a fallback. Lvl 30+ builds haven't been modelled yet.</p>
    </div>`;
  }

  const minLevel = Math.max(20, currentLevel);
  const options = [];
  for (let l = minLevel; l <= 30; l++) {
    const isCurrent = l === currentLevel;
    const label = isCurrent ? `Lvl ${l} (my level)` : `Lvl ${l}`;
    options.push(`<option value="${l}" ${l === effectiveLevel ? 'selected' : ''}>${label}</option>`);
  }

  const note = isProjected
    ? `You're at Lvl ${currentLevel}. The published plans start at Lvl 21 (post-Lvl-20 baseline). Numbers below project off your CURRENT stats, so they understate what you'll have at Lvl 20+. Get to Lvl 20 first.`
    : '';

  return `<div class="plan-control">
    <label>Plan for
      <select id="plan-level">${options.join('')}</select>
    </label>
    <label>${escapeHtml(preset.daysLabel || 'War days')}
      <input id="war-days" type="number" min="1" max="30" value="${warParams.warDays}">
    </label>
    ${infoBtn([
      { term: 'Plan for', desc: 'Pick the level you want the plan computed for. Skill allocation steps update; gear/consumables stay the same.' },
      { term: preset.daysLabel || 'War days', desc: 'For Basic: full war duration. For High-Damage: pill push days (when you intend to pop pills).' },
    ], 'Plan controls')}
    ${note ? `<p class="plan-note">${escapeHtml(note)}</p>` : ''}
  </div>`;
}

function skillSummary(p, preset, effectiveLevel) {
  if (!preset.skillPlan) return '<span class="muted">no plan</span>';
  const currentLevel = parseInt(p.level, 10) || 0;
  if (currentLevel >= 30) return '<span class="pos">✓ Lvl 30 reached</span>';
  const remaining = preset.skillPlan.filter(s => s.level > Math.max(currentLevel, effectiveLevel - 1)).length;
  return `<span class="muted">${remaining} step${remaining === 1 ? '' : 's'} to Lvl 30</span>`;
}

function foundationsSummary(foundations, comps) {
  if (foundations.items.length === 0) return '<span class="pos">✓ Ready</span>';
  const need = foundations.items.length;
  return `<span class="warn">${need} action${need > 1 ? 's' : ''} needed</span>`;
}

function gearSummary(gearNeeds, consumables) {
  const gearTotal = gearNeeds.total || 0;
  const consTotal = consumables.total || 0;
  const total = gearTotal + consTotal;
  if (total === 0 && gearNeeds.items.length === 0 && consumables.items.length === 0) {
    return '<span class="pos">✓ None needed</span>';
  }
  return `<span class="mono">${fmtBtc(total)}</span>${gearNeeds.anyMissing || consumables.anyMissing ? ' <span class="muted">+ unknowns</span>' : ''}`;
}

function bottomLineSummary(daily, totalToPrepare, params) {
  const warTotal = daily.warNet * params.warDays;
  const grandSwing = warTotal - totalToPrepare;
  return `<span class="mono ${grandSwing >= 0 ? 'pos' : 'neg'}">${fmtSigned(grandSwing)}</span>`;
}

function renderSkillBox(p, preset, effectiveLevel, currentLevel) {
  if (!preset.skillPlan) {
    return `<p class="placeholder-text">No published skill plan for this preset yet.</p>`;
  }
  if (currentLevel >= 30) {
    return `<p class="placeholder-text ok">✓ You're at Lvl 30+. The base plan is complete — customize from here.</p>`;
  }

  const sorted = [...preset.skillPlan].sort((a, b) => a.level - b.level);
  const showFromLevel = Math.max(21, effectiveLevel + 1);
  let nextMarked = false;
  const rows = sorted
    .filter(plan => plan.level > Math.max(20, currentLevel))
    .map(plan => {
      let cls = 'plan-row';
      let badge = '';
      if (plan.level >= showFromLevel && !nextMarked) {
        cls += ' next';
        badge = '<span class="plan-badge next">next</span>';
        nextMarked = true;
      }
      const spend = plan.skill
        ? `+1 ${escapeHtml(plan.label)}`
        : `<span class="muted">${escapeHtml(plan.label)}</span>`;
      return `<div class="${cls}">
        <span class="plan-level">Lvl ${plan.level}</span>
        <span class="plan-spend">${spend}</span>
        ${badge}
      </div>`;
    }).join('');

  const projected = projectSkillsAtLevel(p.levels, preset.skillPlan, effectiveLevel);
  const projectionRow = (key) => {
    const lvl = projected[key] || 0;
    const curLvl = p.levels[key] || 0;
    const val = skillValueAt(key, lvl);
    const delta = lvl - curLvl;
    const deltaStr = delta > 0 ? `<span class="sub"> +${delta}</span>` : '';
    return `<div class="skill">
      <span class="skill-name">${SKILL_LABELS[key]}</span>
      <span class="skill-value">
        <span class="total">lvl ${lvl}</span>${deltaStr}
        <span class="sub"> → ${val ?? '–'}</span>
      </span>
    </div>`;
  };
  const projectionTable = `
    <div class="section">
      <div class="section-label">Projected state at Lvl ${effectiveLevel}<span class="right">current → projected</span></div>
      <div class="skill-cols">
        <div>
          <div class="section-label" style="font-size: 0.74rem; margin-bottom: 0.35rem;">Fight</div>
          <div class="skills">${FIGHT_KEYS.map(projectionRow).join('')}</div>
        </div>
        <div>
          <div class="section-label" style="font-size: 0.74rem; margin-bottom: 0.35rem;">Eco</div>
          <div class="skills">${ECO_KEYS.map(projectionRow).join('')}</div>
        </div>
      </div>
    </div>
  `;

  const note = currentLevel < 20
    ? `You're at Lvl ${currentLevel}. The plan starts at Lvl 21 (after the Lvl 20 baseline build). Get to Lvl 20 first by working and battling.`
    : currentLevel < effectiveLevel
      ? `Showing the plan from Lvl ${effectiveLevel + 1} onwards. Levels ${currentLevel + 1}–${effectiveLevel} are assumed done.`
      : '';

  const selfSustainable = !preset.buffs.pill;
  const sustainNote = selfSustainable
    ? '<p class="placeholder-text ok" style="margin-top: 0.6rem;">✓ Self-sustainable: this plan keeps 4 SP in the Companies skill (=6 max), enough to run 6 factories on AE while fighting.</p>'
    : '<p class="placeholder-text warn" style="margin-top: 0.6rem;">⚠ Pill push: heavy bitcoin burn. Foundations matter more — see Companies box.</p>';

  return `
    <div class="plan-list">${rows}</div>
    ${note ? `<p class="note">${escapeHtml(note)}</p>` : ''}
    ${projectionTable}
    ${sustainNote}
  `;
}

function renderCompaniesBox(p, data, foundations, comps, preset) {
  const eco = p.eco;
  const minCo = foundations.minCompanies;
  const minAe = foundations.minAe;

  let actionsHtml;
  if (foundations.items.length === 0) {
    actionsHtml = `<p class="placeholder-text ok">✓ Foundations ready — ${comps.length} compan${comps.length === 1 ? 'y' : 'ies'} at AE ${minAe}+.</p>`;
  } else {
    actionsHtml = `<div class="action-list">${foundations.items.map(actionRow).join('')}</div>`;
  }

  const totalWorkers = comps.reduce((s, c) => s + (c.workerCount || 0), 0);
  let workforceHtml = '';
  if (totalWorkers > eco.management) {
    workforceHtml = `<p class="placeholder-text warn">⚠ You have ${totalWorkers} worker${totalWorkers > 1 ? 's' : ''} but only ${eco.management} management capacity. Some can't be hired.</p>`;
  }

  return `
    <div class="section">
      <div class="section-label">Required state<span class="right">${minCo} companies @ AE ${minAe}+</span></div>
      <p class="note" style="margin-top: 0;">${escapeHtml(foundations.note)}</p>
    </div>
    <div class="section">
      <div class="section-label">Current status<span class="right">${comps.length} / ${eco.companies} built · ${comps.filter(c => c.aeLevel >= minAe).length} at AE ${minAe}+</span></div>
      ${companiesTable(comps)}
    </div>
    <div class="section">
      <div class="section-label">What to fix</div>
      ${actionsHtml}
      ${workforceHtml}
    </div>
  `;
}

function renderGearBox(gearNeeds, consumables, preset) {
  let gearHtml;
  if (gearNeeds.items.length === 0) {
    gearHtml = `<p class="placeholder-text ok">✓ Gear ready — nothing to buy.</p>`;
  } else {
    const rows = gearNeeds.items.map(it => actionRow({
      what: `${escapeHtml(gearItemName(it.slot, it.targetRarity))}${rarityTag(it.targetRarity)} × ${fmtInt(it.qty)}`,
      detail: it.detail,
      cost: it.line != null ? it.line : null,
    })).join('');
    gearHtml = `<div class="action-list">${rows}</div>`;
  }

  let consumablesHtml;
  if (consumables.items.length === 0) {
    consumablesHtml = `<p class="placeholder-text">No consumables for this build.</p>`;
  } else {
    const rows = consumables.items.map(it => actionRow({
      what: `${escapeHtml(it.label)} × ${fmtInt(it.qty)}`,
      detail: it.detail,
      cost: it.line != null ? it.line : null,
    })).join('');
    consumablesHtml = `<div class="action-list">${rows}</div>`;
  }

  return `
    <div class="section">
      <div class="section-label">Gear to acquire<span class="right">${(gearNeeds.total || 0) > 0 ? fmtBtc(gearNeeds.total) : (gearNeeds.items.length ? 'no prices' : '—')}</span></div>
      ${gearHtml}
    </div>
    <div class="section">
      <div class="section-label">Consumables · ${consumables.days} day${consumables.days > 1 ? 's' : ''}<span class="right">${fmtBtc(consumables.total)}</span></div>
      ${consumablesHtml}
    </div>
    ${gearNeeds.anyMissing || consumables.anyMissing ? `<p class="note">Some market prices unavailable — those lines aren't included in totals.</p>` : ''}
  `;
}

function renderModelDayBox(daily, params, preset) {
  const inLines = [];
  if (daily.factoriesHaveRevenue) {
    inLines.push(`<div class="flow-line"><span class="ll">Company revenue</span><span class="lv pos">${fmtSigned(daily.factoryRevenue)}</span></div>`);
  } else {
    inLines.push(`<div class="flow-line"><span class="ll">Company revenue</span><span class="lv unk">unavailable</span></div>`);
  }
  if (daily.missionIncome > 0) {
    inLines.push(`<div class="flow-line"><span class="ll">Daily mission <span class="qty">(complete daily)</span></span><span class="lv pos">${fmtSigned(daily.missionIncome)}</span></div>`);
  }
  const moneyIn = (daily.factoriesHaveRevenue ? daily.factoryRevenue : 0) + (daily.missionIncome || 0);

  const outLines = [];
  if (daily.factoriesHaveWage && daily.factoryWageCost > 0) {
    outLines.push(`<div class="flow-line"><span class="ll">Worker wages</span><span class="lv neg">${fmtSigned(-daily.factoryWageCost)}</span></div>`);
  }
  if (daily.factoryIngCost > 0) {
    outLines.push(`<div class="flow-line"><span class="ll">Ingredient costs</span><span class="lv neg">${fmtSigned(-daily.factoryIngCost)}</span></div>`);
  }
  daily.consumableLines.forEach(it => {
    if (it.line == null) return;
    const dailyValue = it.line / Math.max(1, params.warDays);
    outLines.push(`<div class="flow-line">
      <span class="ll">${escapeHtml(it.label)}<span class="qty">× ${fmt(it.qty / Math.max(1, params.warDays), 1)}/day</span></span>
      <span class="lv neg">${fmtSigned(-dailyValue)}</span>
    </div>`);
  });
  const moneyOut = (daily.factoriesHaveWage ? daily.factoryWageCost : 0)
                 + (daily.factoryIngCost || 0)
                 + (daily.consumablesDaily || 0);

  const netDay = moneyIn - moneyOut;
  const netClass = netDay >= 0 ? 'positive' : 'negative';

  return `
    <p class="note" style="margin-top: 0;">One typical day during the war. The model assumes Energy goes to fighting (not working-for-others), so wage income is excluded from war-day inflows. If you split Energy between work and fight, war-day income lands somewhere between this and the peacetime value. Case/scrap/ranking loot adds variable income on top of mission gold.</p>
    <div class="war-flow">
      <div class="flow-block">
        <h5>Money in</h5>
        ${inLines.join('')}
        <div class="flow-line flow-subtotal">
          <span class="ll">Total in</span>
          <span class="lv pos">${fmtSigned(moneyIn)}</span>
        </div>
      </div>
      <div class="flow-block">
        <h5>Money out</h5>
        ${outLines.length ? outLines.join('') : `<div class="flow-line"><span class="ll">No costs</span><span class="lv">${fmtBtc(0)}</span></div>`}
        <div class="flow-line flow-subtotal">
          <span class="ll">Total out</span>
          <span class="lv neg">${fmtSigned(-moneyOut)}</span>
        </div>
      </div>
      <div class="flow-net ${netClass}">
        <span>Net per day</span>
        <span class="mono">${fmtSigned(netDay)}/day</span>
      </div>
    </div>
  `;
}

function renderBottomLineBox(daily, totalToPrepare, params, preset, gearNeeds, consumables) {
  const days = params.warDays;
  const warTotal = daily.warNet * days;
  const peaceTotal = daily.peaceNet * days;
  const oppCost = peaceTotal - warTotal;
  const grandSwing = warTotal - totalToPrepare;

  return `
    <p class="note" style="margin-top: 0;">Full P&L for fighting this war (${days} day${days > 1 ? 's' : ''}) vs staying in peace.</p>

    <div class="bs-grid">
      <div class="bs-block">
        <h5>Upfront stockpile</h5>
        <div class="bs-line">
          <span class="ll">Gear</span>
          <span class="lv neg">${fmtSigned(-(gearNeeds.total || 0))}</span>
        </div>
        <div class="bs-line">
          <span class="ll">Consumables</span>
          <span class="lv neg">${fmtSigned(-(consumables.total || 0))}</span>
        </div>
        <div class="bs-line total">
          <span class="ll">Total upfront</span>
          <span class="lv neg">${fmtSigned(-totalToPrepare)}</span>
        </div>
      </div>

      <div class="bs-block">
        <h5>Over ${days} day${days > 1 ? 's' : ''} of war</h5>
        <div class="bs-line">
          <span class="ll">Per-day net (in war)</span>
          <span class="lv ${daily.warNet >= 0 ? 'pos' : 'neg'}">${fmtSigned(daily.warNet)}</span>
        </div>
        <div class="bs-line">
          <span class="ll">× ${days} day${days > 1 ? 's' : ''}</span>
          <span class="lv ${warTotal >= 0 ? 'pos' : 'neg'}">${fmtSigned(warTotal)}</span>
        </div>
        <div class="bs-line total">
          <span class="ll">War operations</span>
          <span class="lv ${warTotal >= 0 ? 'pos' : 'neg'}">${fmtSigned(warTotal)}</span>
        </div>
      </div>
    </div>

    <div class="flow-net ${grandSwing >= 0 ? 'positive' : 'negative'}" style="margin-top: 0.85rem;">
      <span>Bitcoin swing vs starting position</span>
      <span class="mono">${fmtSigned(grandSwing)}</span>
    </div>

    <div class="bs-block" style="margin-top: 0.7rem;">
      <h5>Comparison</h5>
      <div class="bs-line">
        <span class="ll">If you stayed in peace</span>
        <span class="lv ${peaceTotal >= 0 ? 'pos' : 'neg'}">${fmtSigned(peaceTotal)}</span>
      </div>
      <div class="bs-line">
        <span class="ll">Opportunity cost of fighting</span>
        <span class="lv neg">${fmtSigned(-oppCost)}</span>
      </div>
    </div>

    <p class="note">Modelled income lines: factory revenue, daily mission (${fmtBtc(daily.missionIncome)}). Not yet modelled: ranking loot (scales with damage × battle pool, formula known), case/scrap drops, battle loot, bounties. All count as upside on top of the totals above.</p>
  `;
}

function setStatus(kind, msg = '') {
  const el = $('#status');
  el.className = 'status' + (kind ? ' ' + kind : '');
  el.textContent = msg;
}

async function load(username) {
  if (!username) { setStatus('error', 'Enter a username.'); return; }
  setStatus('', `Resolving "${username}"…`);
  $('#load-btn').disabled = true;
  $('#player').classList.add('hidden');
  $('#debug-panel').classList.add('hidden');
  try {
    const userId = await resolveUserId(username);
    if (!userId) throw new Error(`No user found for "${username}"`);
    setStatus('', `Loading profile…`);
    const data = await loadPlayer(userId);
    renderPlayer(data);
    const newQs = new URLSearchParams();
    newQs.set('u', username);
    if (battleBonusPct > 0) newQs.set('bb', String(battleBonusPct));
    if (DEBUG) newQs.set('debug', '1');
    history.replaceState(null, '', location.pathname + '?' + newQs.toString());
    setStatus('ok', `Loaded ${data.user?.username || username}.`);
  } catch (e) {
    console.error(e);
    setStatus('error', e.message || String(e));
  } finally {
    $('#load-btn').disabled = false;
  }
}

$('#load-btn').addEventListener('click', () => load($('#username').value.trim()));
$('#username').addEventListener('keydown', e => {
  if (e.key === 'Enter') load($('#username').value.trim());
});

const initialU = QS.get('u');
if (initialU) {
  $('#username').value = initialU;
  load(initialU);
} else {
  $('#username').focus();
}

if (DEBUG) console.log('Debug mode on.');
</script>

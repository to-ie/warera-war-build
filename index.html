<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>War Readiness · we-ie.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d10;
    --surface: #14181d;
    --surface-2: #1c2128;
    --border: #2a313a;
    --border-strong: #3a424d;
    --text: #e8ecf0;
    --dim: #98a2b0;
    --dimmer: #6b7480;
    --accent: #4ad395;
    --accent-soft: rgba(74, 211, 149, 0.12);
    --warn: #f0c14b;
    --warn-soft: rgba(240, 193, 75, 0.12);
    --error: #f06060;
    --error-soft: rgba(240, 96, 96, 0.12);
    --rarity-common: #8b94a3;
    --rarity-uncommon: #4ad395;
    --rarity-rare: #5b8cff;
    --rarity-epic: #b87ddf;
    --rarity-legendary: #f0c14b;
    --rarity-mythic: #f06060;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-size: 15px;
  }

  .topbar { border-bottom: 1px solid var(--border); background: var(--surface); }
  .topbar-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0.9rem 1.5rem;
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .brand h1 { margin: 0; font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em; }
  .brand .accent { color: var(--accent); }
  .brand .sub { color: var(--dimmer); font-size: 0.85rem; }

  main {
    flex: 1;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .search-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
    flex-wrap: wrap;
  }
  .search-row input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.85rem;
    border-radius: 6px;
    font: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-row input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search-row button {
    background: var(--accent);
    border: 0;
    color: #07120c;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .search-row button:hover:not(:disabled) { background: #5fdfa6; }
  .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    min-height: 1.3rem;
    font-size: 0.85rem;
    color: var(--dim);
    margin-bottom: 1rem;
  }
  .status.error { color: var(--error); }
  .status.ok { color: var(--accent); }

  .player-head {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 1rem;
  }
  .avatar {
    width: 56px;
    height: 56px;
    border-radius: 8px;
    background: var(--surface-2);
    flex-shrink: 0;
    object-fit: cover;
  }
  .player-name { margin: 0 0 0.2rem 0; font-size: 1.2rem; font-weight: 600; }
  .player-meta { margin: 0; font-size: 0.9rem; color: var(--dim); }
  .pill {
    display: inline-block;
    padding: 0.1rem 0.55rem;
    background: var(--surface-2);
    border-radius: 4px;
    margin-right: 0.35rem;
    margin-bottom: 0.2rem;
    font-size: 0.8rem;
  }
  .pill .mono { font-family: var(--mono); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem 1.25rem;
  }
  .card h3 {
    margin: 0 0 1rem 0;
    font-size: 1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .badge {
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.18rem 0.55rem;
    border-radius: 999px;
    font-family: var(--mono);
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
    gap: 0.5rem;
    margin-bottom: 1.1rem;
  }
  .stat {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.55rem 0.7rem;
    text-align: left;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 4.5em;
  }
  .stat-label {
    display: block;
    color: var(--dim);
    font-size: 0.72rem;
    line-height: 1.3;
    margin-bottom: 0.35rem;
    overflow-wrap: break-word;
    hyphens: auto;
  }
  .stat-value {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 0.95rem;
  }

  /* Calmer deltas — single muted color, smaller. */
  .delta {
    font-size: 0.68rem;
    font-weight: 400;
    margin-left: 0.25rem;
    font-family: var(--mono);
    white-space: nowrap;
    color: var(--dimmer);
  }
  .delta.positive,
  .delta.negative,
  .delta.neutral { color: var(--dimmer); }

  .state-section { margin: 0; margin-top: 1.5rem; }
  .state-section:first-of-type { margin-top: 0; }
  .state-section > summary {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    cursor: pointer;
    padding: 0.5rem 0 0.85rem;
    list-style: none;
    user-select: none;
  }
  .state-section > summary::-webkit-details-marker { display: none; }
  .state-section > summary > .caret {
    color: var(--dim);
    transition: transform 0.2s;
    font-size: 0.85rem;
    flex-shrink: 0;
    display: inline-block;
  }
  .state-section > summary > h2 {
    margin: 0;
    font-size: 1.05rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .state-section > summary > h2 .sub {
    color: var(--dimmer);
    font-weight: 400;
    font-size: 0.85rem;
    margin-left: 0.5rem;
  }
  .state-section:not([open]) > summary > .caret { transform: rotate(-90deg); }

  .picker {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
  }
  .picker button {
    flex: 1;
    min-width: 130px;
    padding: 0.6rem 0.9rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.15s;
  }
  .picker button:hover { border-color: var(--accent); }
  .picker button.active {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }
  .preset-tagline {
    color: var(--dim);
    font-size: 0.88rem;
    margin: 0 0 1rem 0;
    font-style: italic;
  }

  /* War params bar */
  .war-params {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    padding: 0.6rem 0.85rem;
    background: var(--surface-2);
    border-radius: 6px;
    border: 1px solid var(--border);
    margin-bottom: 1rem;
    font-size: 0.85rem;
  }
  .war-params label {
    color: var(--dim);
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .war-params input {
    width: 56px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.25rem 0.45rem;
    border-radius: 4px;
    font: inherit;
    font-family: var(--mono);
    text-align: right;
  }
  .war-params input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .war-params input[type=number] {
    -moz-appearance: textfield;
    appearance: textfield;
  }
  .war-params input[type=number]::-webkit-inner-spin-button,
  .war-params input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .war-params .auto-tag {
    color: var(--dimmer);
    font-size: 0.72rem;
    margin-left: 0.15rem;
    font-style: italic;
  }

  /* Section labels — flex (no float / no overflow:hidden), so tooltips
     inside don't get clipped. */
  .section { margin-top: 1rem; }
  .section:first-child { margin-top: 0; }
  .section-label {
    color: var(--dim);
    font-size: 0.82rem;
    margin-bottom: 0.55rem;
    font-weight: 500;
    display: flex;
    align-items: baseline;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .section-label .right {
    margin-left: auto;
    color: var(--text);
    font-family: var(--mono);
    font-weight: 400;
  }
  .section-label .right .muted-suffix {
    color: var(--dimmer);
    font-size: 0.75rem;
    font-weight: 400;
    margin-left: 0.4rem;
  }

  .sub-label {
    color: var(--dimmer);
    font-size: 0.78rem;
    margin-top: 0.95rem;
    margin-bottom: 0.4rem;
    font-weight: 500;
    display: flex;
    align-items: baseline;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .sub-label:first-child { margin-top: 0; }
  .sub-label .right {
    margin-left: auto;
    color: var(--dim);
    font-family: var(--mono);
    font-weight: 400;
  }

  .grand-total {
    margin-top: 0.9rem;
    padding: 0.55rem 0.75rem;
    background: var(--surface-2);
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-weight: 600;
    font-size: 0.92rem;
  }
  .grand-total .mono { font-family: var(--mono); }

  .skills { display: grid; gap: 0.3rem; font-size: 0.85rem; }
  .skill {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.6rem;
    padding: 0.4rem 0.6rem;
    background: var(--surface-2);
    border-radius: 4px;
  }
  .skill-name { color: var(--dim); }
  .skill-value { font-family: var(--mono); font-weight: 500; text-align: right; }
  .skill-value .sub { color: var(--dimmer); font-weight: 400; }
  .skill-value .total { color: var(--text); font-weight: 600; }

  /* Tables — headers left-aligned (dejusted); numeric body cells stay right-aligned. */
  table.list { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  table.list th, table.list td {
    text-align: left;
    padding: 0.4rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  table.list th {
    color: var(--dimmer);
    font-weight: 500;
    font-size: 0.78rem;
  }
  table.list td.mono { font-family: var(--mono); }
  table.list td.num { text-align: right; font-family: var(--mono); }
  table.list tr:last-child td { border-bottom: 0; }
  table.list tr.empty td { color: var(--dimmer); font-style: italic; }
  table.list td.pos { color: var(--accent); font-family: var(--mono); text-align: right; }
  table.list td.neg { color: var(--error); font-family: var(--mono); text-align: right; }
  table.list tr.total td {
    border-top: 1px solid var(--border-strong);
    border-bottom: 0;
    font-weight: 600;
    padding-top: 0.55rem;
  }

  /* Rarity-colored text (replacing the pill tags). */
  .r-common    { color: var(--rarity-common);    font-weight: 500; }
  .r-uncommon  { color: var(--rarity-uncommon);  font-weight: 500; }
  .r-rare      { color: var(--rarity-rare);      font-weight: 500; }
  .r-epic      { color: var(--rarity-epic);      font-weight: 500; }
  .r-legendary { color: var(--rarity-legendary); font-weight: 500; }
  .r-mythic    { color: var(--rarity-mythic);    font-weight: 500; }

  .placeholder-text {
    font-size: 0.85rem;
    color: var(--dim);
    margin: 0.25rem 0 0;
    padding: 0.5rem 0.7rem;
    background: var(--surface-2);
    border-radius: 6px;
    border-left: 2px solid var(--border-strong);
  }
  .placeholder-text.ok { color: var(--accent); border-color: var(--accent); }
  .placeholder-text.warn { color: var(--warn); border-color: var(--warn); }

  /* Daily flow */
  .flow {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.55rem;
    margin-top: 0.5rem;
  }
  @media (max-width: 520px) { .flow { grid-template-columns: 1fr; } }
  .flow-side {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.6rem 0.75rem;
  }
  .flow-side h5 {
    margin: 0 0 0.55rem;
    font-size: 0.82rem;
    color: var(--dim);
    font-weight: 500;
  }
  .flow-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.83rem;
    padding: 0.18rem 0;
    gap: 0.5rem;
  }
  .flow-line .ll { color: var(--dim); flex: 1; }
  .flow-line .ll .qty { color: var(--dimmer); font-family: var(--mono); font-size: 0.78rem; margin-left: 0.3rem; }
  .flow-line .lv { font-family: var(--mono); white-space: nowrap; }
  .flow-line .lv.pos { color: var(--accent); }
  .flow-line .lv.neg { color: var(--error); }
  .flow-line .lv.unk { color: var(--dimmer); font-style: italic; }
  .flow-total {
    border-top: 1px solid var(--border);
    margin-top: 0.45rem;
    padding-top: 0.5rem;
    font-weight: 600;
  }
  .flow-net {
    margin-top: 0.6rem;
    padding: 0.6rem 0.85rem;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.95rem;
    font-weight: 600;
  }
  .flow-net.positive { background: var(--accent-soft); color: var(--accent); }
  .flow-net.negative { background: var(--error-soft); color: var(--error); }
  .flow-net .mono { font-family: var(--mono); }

  .note {
    font-size: 0.8rem;
    color: var(--dimmer);
    font-style: italic;
    margin-top: 0.9rem;
  }
  .hidden { display: none !important; }
  .muted { color: var(--dim); }

  /* Tooltip system — uses a child .tip element instead of ::after, so it
     can contain HTML (bold terms, rows). Each tip is structured rows. */
  .info-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--dim);
    font-size: 0.65rem;
    font-weight: 600;
    cursor: help;
    margin-left: 0.3rem;
    position: relative;
    padding: 0;
    vertical-align: middle;
    font-family: inherit;
    line-height: 1;
    flex-shrink: 0;
  }
  .info-btn:hover, .info-btn:focus {
    outline: none;
    color: var(--accent);
    border-color: var(--accent);
  }
  .info-btn .tip {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: var(--surface-2);
    border: 1px solid var(--border-strong);
    padding: 0.55rem 0.7rem;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 400;
    width: 300px;
    max-width: calc(100vw - 2rem);
    text-align: left;
    color: var(--dim);
    line-height: 1.45;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    cursor: default;
    white-space: normal;
  }
  .info-btn:hover .tip, .info-btn:focus .tip { opacity: 1; }
  .tip-row {
    display: block;
    padding: 0.32rem 0;
    border-bottom: 1px solid var(--border);
  }
  .tip-row:first-child { padding-top: 0; }
  .tip-row:last-child  { padding-bottom: 0; border-bottom: 0; }
  .tip-row strong {
    color: var(--text);
    font-weight: 600;
    margin-right: 0.35rem;
  }

  details.debug {
    margin-top: 1rem;
    padding: 0.6rem 0.85rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  details.debug summary { cursor: pointer; font-size: 0.8rem; color: var(--dim); }
  details.debug pre {
    margin: 0.6rem 0 0;
    overflow: auto;
    background: var(--bg);
    padding: 0.6rem;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--dim);
    max-height: 400px;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 1rem 1.5rem;
    color: var(--dim);
    font-size: 0.85rem;
    text-align: center;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
  footer .sep { margin: 0 0.5rem; color: var(--border-strong); }

  @media (max-width: 600px) {
    body { font-size: 14px; }
    main { padding: 1rem; }
    .topbar-inner { padding: 0.75rem 1rem; }
    .card { padding: 0.9rem 1rem; }
    .stats { grid-template-columns: repeat(auto-fit, minmax(78px, 1fr)); gap: 0.4rem; }
    .stat { padding: 0.45rem 0.55rem; }
    .stat-label { font-size: 0.7rem; }
    .stat-value { font-size: 0.9rem; }
    .skills { font-size: 0.8rem; }
    .skill { padding: 0.4rem 0.5rem; }
    table.list { font-size: 0.78rem; }
    table.list th, table.list td { padding: 0.35rem 0.4rem; }
    .player-head { padding: 0.85rem 1rem; }
    .player-name { font-size: 1.1rem; }
    .info-btn .tip { width: 240px; left: auto; right: 0; }
    .picker button { min-width: 0; flex: 1 1 calc(50% - 0.25rem); font-size: 0.85rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <h1>War <span class="accent">Readiness</span></h1>
    </div>
    <span class="brand sub">build planner for warera.io · v0.5</span>
  </div>
</div>

<main>
  <div class="search-row">
    <input id="username" placeholder="warera username..." autocomplete="off" spellcheck="false">
    <button id="load-btn">Load profile</button>
  </div>
  <div id="status" class="status"></div>

  <div id="player" class="hidden">
    <div class="player-head">
      <img id="avatar" class="avatar" alt="" hidden>
      <div>
        <h2 id="player-name" class="player-name"></h2>
        <p id="player-meta" class="player-meta"></p>
      </div>
    </div>

    <details class="state-section" open>
      <summary>
        <span class="caret">▾</span>
        <h2>Your current state</h2>
      </summary>
      <div class="grid">
        <div class="card">
          <h3>
            <span>Combat <span id="combat-info"></span></span>
            <span class="badge" id="combat-badge"></span>
          </h3>
          <div id="combat-content"></div>
        </div>
        <div class="card">
          <h3>
            <span>Economy <span id="economy-info"></span></span>
            <span class="badge" id="economy-badge"></span>
          </h3>
          <div id="economy-content"></div>
        </div>
      </div>
    </details>

    <details class="state-section" id="target-section" open>
      <summary>
        <span class="caret">▾</span>
        <h2>Target build <span id="target-info"></span></h2>
      </summary>
      <div id="target-content"></div>
    </details>

    <details class="debug hidden" id="debug-panel">
      <summary>Raw API responses (debug mode)</summary>
      <pre id="debug-content"></pre>
    </details>
  </div>
</main>

<footer>
  Made with <span style="color: var(--accent);">♥</span> by toie.
  <span class="sep">·</span>
  Data via <a href="https://gateway.warerastats.io/" target="_blank" rel="noopener">War Era Gateway</a>.
  <span class="sep">·</span>
  Sibling of <a href="https://tools.we-ie.com/" target="_blank" rel="noopener">tools.we-ie.com</a>.
</footer>

<script>
/* ═══════════════════════════════════════════════════════════════════
 *  CONFIG
 * ═══════════════════════════════════════════════════════════════════ */
const CFG = {
  API: 'https://warera-proxy.toie.workers.dev/trpc',
  GAME: 'https://app.warera.io',
};
const QS = new URLSearchParams(location.search);
const DEBUG = QS.has('debug');

/* ═══════════════════════════════════════════════════════════════════
 *  UTILITIES
 * ═══════════════════════════════════════════════════════════════════ */
const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
function fmt(n, d = 2) {
  if (n == null || isNaN(n)) return '–';
  return Number(n).toLocaleString(undefined, {
    minimumFractionDigits: d, maximumFractionDigits: d
  });
}
function fmtInt(n) {
  if (n == null || isNaN(n)) return '–';
  return Math.round(Number(n)).toLocaleString();
}
function fmtGold(n, d = 2) { return n == null || isNaN(n) ? '–' : fmt(n, d) + ' g'; }
function fmtSigned(n, d = 2) {
  if (n == null || isNaN(n)) return '–';
  const sign = n > 0 ? '+' : '';
  return sign + fmt(n, d) + ' g';
}
function flag(code) {
  if (!code || code.length !== 2) return '🏳️';
  return code.toUpperCase().split('').map(c =>
    String.fromCodePoint(c.charCodeAt(0) - 65 + 0x1F1E6)
  ).join('');
}
function midpoint([min, max]) { return (min + max) / 2; }

/* Tooltip helpers — child-element pattern so we can render bold terms
   and per-row layout. Pass either a string (single plain row) or an
   array of `{term, desc}` objects (or strings for unstyled rows). */
function tipRows(content) {
  if (typeof content === 'string') {
    return `<span class="tip-row">${escapeHtml(content)}</span>`;
  }
  return content.map(r => {
    if (typeof r === 'string') return `<span class="tip-row">${escapeHtml(r)}</span>`;
    return `<span class="tip-row"><strong>${escapeHtml(r.term)}</strong>${escapeHtml(r.desc)}</span>`;
  }).join('');
}
function infoBtn(content, label = 'More info') {
  return `<button class="info-btn" type="button" tabindex="0" aria-label="${escapeAttr(label)}">?<span class="tip">${tipRows(content)}</span></button>`;
}

/* Color a gear item name by rarity (replacing the old rarity pill). */
function rarityColored(rarity, label) {
  if (!rarity) return escapeHtml(label || '');
  return `<span class="r-${rarity}">${escapeHtml(label)}</span>`;
}

/* ═══════════════════════════════════════════════════════════════════
 *  TRPC CLIENT
 * ═══════════════════════════════════════════════════════════════════ */
async function trpc(endpoint, params = {}) {
  const input = encodeURIComponent(JSON.stringify(params));
  const url = `${CFG.API}/${endpoint}?input=${input}`;
  if (DEBUG) console.log(`→ ${endpoint}`, params);
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${endpoint} HTTP ${res.status}`);
  const json = await res.json();
  if (DEBUG) console.log(`← ${endpoint}`, json);
  const item = Array.isArray(json) ? json[0] : json;
  if (item?.error) throw new Error(`${endpoint}: ${item.error.message || 'error'}`);
  const d = item?.result?.data;
  return d?.json ?? d ?? item;
}

function itemCode(slot, rarity) {
  if (slot === 'weapon') return WEAPON_BY_RARITY[rarity];
  return `${slot}${RARITY_BY_INDEX.indexOf(rarity)}`;
}

function rarityFromCode(code) {
  if (!code) return null;
  const m = String(code).match(/(\d)$/);
  if (m) return RARITY_BY_INDEX[parseInt(m[1], 10)] || null;
  const byWeapon = Object.entries(WEAPON_BY_RARITY).find(([, c]) => c === code);
  return byWeapon ? byWeapon[0] : null;
}

function rarityIndex(rarity) { return RARITY_BY_INDEX.indexOf(rarity); }

function gearItemName(slot, rarity) {
  if (slot === 'weapon') return WEAPON_DISPLAY[WEAPON_BY_RARITY[rarity]] || SLOT_LABEL.weapon;
  return `${RARITY_LABEL[rarity] || ''} ${SLOT_LABEL[slot] || slot}`.trim();
}

async function resolveUserId(input) {
  const t = input.trim();
  if (!t) return null;
  if (/^[a-f0-9]{24}$/i.test(t)) return t;
  const r = await trpc('search.searchAnything', { searchText: t });
  const userIds = r?.userIds || [];
  if (!userIds.length) return null;
  return userIds[0];
}

async function loadPlayer(userId) {
  const [user, inventory, companyList, pricesR, workersR] = await Promise.allSettled([
    trpc('user.getUserById', { userId }),
    trpc('inventory.fetchCurrentEquipment', { userId }),
    trpc('company.getCompanies', { userId, perPage: 50 }),
    trpc('itemTrading.getPrices'),
    trpc('worker.getWorkers', { userId }),
  ]);

  const u = user.status === 'fulfilled' ? user.value : null;
  const ids = companyList.status === 'fulfilled' ? (companyList.value?.items || []) : [];

  const workersData = workersR.status === 'fulfilled' ? workersR.value : null;
  const workersByCompanyId = {};
  if (workersData?.workersPerCompany) {
    workersData.workersPerCompany.forEach(entry => {
      if (entry?.company?._id) {
        workersByCompanyId[entry.company._id] = entry.workers || [];
      }
    });
  }

  const secondary = await Promise.allSettled([
    ...ids.map(id => trpc('company.getById', { companyId: id })),
    u?.country ? trpc('country.getCountryById', { countryId: u.country }) : Promise.resolve(null),
    u?.mu ? trpc('mu.getById', { muId: u.mu }) : Promise.resolve(null),
    u?.company ? trpc('company.getById', { companyId: u.company }) : Promise.resolve(null),
  ]);

  const companies = secondary.slice(0, ids.length)
    .filter(r => r.status === 'fulfilled')
    .map(r => r.value);
  const country = secondary[ids.length]?.status === 'fulfilled' ? secondary[ids.length].value : null;
  const mu = secondary[ids.length + 1]?.status === 'fulfilled' ? secondary[ids.length + 1].value : null;
  const workplaceCompany = secondary[ids.length + 2]?.status === 'fulfilled' ? secondary[ids.length + 2].value : null;

  let ownWage = null;
  let ownFidelity = null;
  if (workplaceCompany?.user) {
    try {
      const ownerWorkers = await trpc('worker.getWorkers', { userId: workplaceCompany.user });
      if (ownerWorkers?.workersPerCompany) {
        const entry = ownerWorkers.workersPerCompany.find(e => e?.company?._id === workplaceCompany._id);
        const myRecord = entry?.workers?.find(w => w.user === userId);
        if (myRecord) {
          ownWage = Number(myRecord.wage);
          ownFidelity = Number(myRecord.fidelity);
        }
      }
    } catch (e) {
      if (DEBUG) console.warn('Failed to fetch workplace workers:', e);
    }
  }

  return {
    userId,
    user: u,
    userError: user.status === 'rejected' ? String(user.reason?.message || user.reason) : null,
    inventory: inventory.status === 'fulfilled' ? inventory.value : null,
    inventoryError: inventory.status === 'rejected' ? String(inventory.reason?.message || inventory.reason) : null,
    companies,
    companiesError: companyList.status === 'rejected' ? String(companyList.reason?.message || companyList.reason) : null,
    country, mu,
    workplaceCompany,
    workersByCompanyId,
    ownWage, ownFidelity,
    ownWorkOffer: ownWage != null ? { wage: ownWage, fidelity: ownFidelity, source: 'worker_record' } : null,
    companyWorkOffers: {},
    prices: pricesR.status === 'fulfilled' ? normalizePrices(pricesR.value) : {},
    pricesError: pricesR.status === 'rejected' ? String(pricesR.reason?.message || pricesR.reason) : null,
    workersError: workersR.status === 'rejected' ? String(workersR.reason?.message || workersR.reason) : null,
  };
}

function normalizePrices(raw) {
  if (!raw) return {};
  if (Array.isArray(raw)) {
    const out = {};
    raw.forEach(item => {
      const code = item?.itemCode || item?.code || item?.item;
      const price = item?.price ?? item?.value;
      if (code && price != null) out[code] = price;
    });
    return out;
  }
  if (raw.prices && typeof raw.prices === 'object') return raw.prices;
  if (typeof raw === 'object') return raw;
  return {};
}

function offerWage(offer) {
  if (!offer) return null;
  const candidates = [offer.wage, offer.salary, offer.payment, offer.amount, offer.ppPerWork, offer.gold];
  for (const c of candidates) {
    if (c != null && !isNaN(c)) return Number(c);
  }
  return null;
}

function extractEquipment(inv) {
  const slot = key => {
    const p = inv?.[key];
    if (!p) return null;
    const code = p.code ?? '?';
    const rarity = rarityFromCode(code);
    return {
      code,
      rarity,
      displayName: rarity ? gearItemName(key, rarity) : code,
      durability: p.state != null ? Math.round((p.state / (p.maxState || 100)) * 100) : null,
      skills: p.skills || {},
    };
  };
  return {
    weapon: slot('weapon'),
    helmet: slot('helmet'),
    chest:  slot('chest'),
    pants:  slot('pants'),
    boots:  slot('boots'),
    gloves: slot('gloves'),
  };
}

/* Compute real per-factory output, revenue, costs, and net using
   AE_TABLE + workersByCompanyId + RECIPES. Falls back gracefully when
   data is missing. */
function extractCompanies(data) {
  const items = Array.isArray(data.companies) ? data.companies : [];
  const prices = data.prices || {};
  const workersByCompany = data.workersByCompanyId || {};
  const A = FACTORY_ASSUMPTIONS;

  return items.map(co => {
    const id = co._id;
    const itemCodeStr = co.itemCode ?? '?';
    const workerCount = co.workerCount ?? 0;
    const aeLevel = co.activeUpgradeLevels?.automatedEngine ?? 0;
    const price = prices[itemCodeStr] != null ? Number(prices[itemCodeStr]) : null;

    // Automated Engine output (fixed table).
    const aePP = AE_TABLE[aeLevel] ?? (aeLevel * 24);

    // Worker output: prefer real worker records (with fidelity + wage).
    // Fall back to estimate from workerCount if records missing.
    const workers = workersByCompany[id] || [];
    let workerPP = 0;
    let dailyWageCost = null;
    const workerDetails = [];
    if (workers.length > 0) {
      let wageSum = 0;
      workers.forEach(w => {
        const fid = Number(w.fidelity) || 0;
        const wage = Number(w.wage) || 0;
        const pp = A.workerActionsPerDay * A.workerProduction * (1 + fid / 100);
        workerPP += pp;
        wageSum += wage * A.workerActionsPerDay;
        workerDetails.push({ fidelity: fid, wage, dailyWage: wage * A.workerActionsPerDay, pp });
      });
      dailyWageCost = wageSum;
    } else if (workerCount > 0) {
      // Estimate at 0 fidelity, wage unknown.
      workerPP = workerCount * A.workerActionsPerDay * A.workerProduction;
    }

    const dailyOutput = (aePP + workerPP) * A.outputCalibration;
    const dailyRevenue = price != null ? dailyOutput * price : null;

    // Ingredient cost for processed goods.
    const recipe = RECIPES[itemCodeStr];
    const isProcessed = !!recipe;
    const recipeBreakdown = [];
    let dailyIngredientCost = null;
    if (recipe) {
      let allPriced = true;
      let cost = 0;
      for (const [ing, qty] of Object.entries(recipe)) {
        const ingPrice = prices[ing] != null ? Number(prices[ing]) : null;
        recipeBreakdown.push({ ingredient: ing, qty, price: ingPrice });
        if (ingPrice == null) { allPriced = false; }
        else { cost += qty * dailyOutput * ingPrice; }
      }
      if (allPriced) dailyIngredientCost = cost;
    }

    const dailyNet = (dailyRevenue != null)
      ? dailyRevenue - (dailyWageCost || 0) - (dailyIngredientCost || 0)
      : null;

    return {
      id, name: co.name ?? '?',
      itemCode: itemCodeStr,
      aeLevel,
      aePP,
      storageLevel: co.activeUpgradeLevels?.storage ?? null,
      breakRoomLevel: co.activeUpgradeLevels?.breakRoom ?? null,
      stored: co.production ?? null,
      estimatedValue: co.estimatedValue ?? null,
      workerCount,
      workers: workerDetails,
      workerPP,
      isProcessed,
      recipeBreakdown,
      dailyIngredientCost,
      marketPrice: price,
      dailyOutput,
      dailyRevenue,
      dailyWageCost,
      dailyNet,
    };
  });
}

/* ═══════════════════════════════════════════════════════════════════
 *  TARGET BUILD MATH
 * ═══════════════════════════════════════════════════════════════════ */
function computeTargetStats(preset, militaryRankPercent = 0) {
  const g = preset.gear, b = preset.buffs;
  const gs = r => GEAR_STATS[r];

  const weaponAtk  = midpoint(gs(g.weapon).weapon.attack);
  const weaponCrit = midpoint(gs(g.weapon).weapon.crit);
  const helmetCD   = midpoint(gs(g.helmet).helmet.critDamage);
  const chestArm   = midpoint(gs(g.chest).chest.armor);
  const pantsArm   = midpoint(gs(g.pants).pants.armor);
  const bootsDdg   = midpoint(gs(g.boots).boots.dodge);
  const glovesPrc  = midpoint(gs(g.gloves).gloves.precision);

  const pillMult = b.pill ? BUFFS.pill.damageMult : 1;
  const ammoMult = BUFFS.ammo[b.ammo] ?? 1;
  const foodHp   = BUFFS.food[b.food] ?? 0;
  const rankMult = 1 + militaryRankPercent / 100;

  const armRaw = chestArm + pantsArm;
  const ddgRaw = bootsDdg;

  return {
    atk: (100 + weaponAtk) * ammoMult * pillMult * rankMult,
    prc: 50 + glovesPrc,
    cc:  10 + weaponCrit,
    cd:  100 + helmetCD,
    armRaw,
    arm: armRaw / (armRaw + 40) * 100,
    ddgRaw,
    ddg: ddgRaw / (ddgRaw + 40) * 100,
    hp:  100 * (1 + foodHp),
  };
}

function computeBuyGap(currentEq, preset, prices) {
  const slots = ['weapon', 'helmet', 'chest', 'pants', 'boots', 'gloves'];
  const out = [];
  let total = 0;
  for (const slot of slots) {
    const targetRarity = preset.gear[slot];
    const targetCode = itemCode(slot, targetRarity);
    const currentCode = currentEq?.[slot]?.code;
    const currentRarity = rarityFromCode(currentCode);

    const needsBuy = !currentCode
      || currentCode === '?'
      || (currentRarity && rarityIndex(currentRarity) < rarityIndex(targetRarity))
      || !currentRarity;

    if (needsBuy) {
      const price = prices?.[targetCode];
      out.push({
        slot,
        currentCode: currentCode && currentCode !== '?' ? currentCode : null,
        currentRarity,
        targetCode,
        targetRarity,
        price: price != null ? Number(price) : null,
      });
      if (price != null) total += Number(price);
    }
  }
  return { items: out, total };
}

function computeStockpile(preset, prices, player, params) {
  const hitsPerDay = effectiveHitsPerDay(player, params);
  const days = params.warDays;
  const totalHits = hitsPerDay * days;
  const hunger = player?.derived?.hunger || 4;
  const out = [];
  let total = 0;
  let anyMissingPrice = false;

  const push = (cons, qty) => {
    if (qty <= 0) return;
    const price = prices?.[cons.code];
    const unit = price != null ? Number(price) : null;
    const line = unit != null ? unit * qty : null;
    if (unit == null) anyMissingPrice = true;
    if (line != null) total += line;
    out.push({ kind: cons.kind, code: cons.code, label: cons.label, qty, unit, line });
  };

  if (preset.buffs.pill) push(CONSUMABLES.pill, params.pillsPerDay * days);

  const ammoKey = preset.buffs.ammo;
  if (ammoKey && CONSUMABLES[ammoKey]) push(CONSUMABLES[ammoKey], totalHits);

  const foodKey = preset.buffs.food;
  if (foodKey && CONSUMABLES[foodKey]) {
    const foodNeeded = Math.ceil(totalHits / hunger);
    push(CONSUMABLES[foodKey], foodNeeded);
  }

  return { items: out, total, hitsPerDay, days, totalHits, hunger, anyMissingPrice };
}

function computeDailyDuringWar(preset, prices, player, data, params) {
  const stockpile = computeStockpile(preset, prices, player, params);
  const comps = extractCompanies(data);

  const consumablesDaily = stockpile.total / Math.max(1, params.warDays);
  const consumableLines = stockpile.items.map(it => ({
    ...it,
    qtyPerDay: it.qty / Math.max(1, params.warDays),
    linePerDay: it.line != null ? it.line / Math.max(1, params.warDays) : null,
  }));

  const factoryRevenue = comps.reduce((s, c) => s + (c.dailyRevenue || 0), 0);
  const factoryWageCost = comps.reduce((s, c) => s + (c.dailyWageCost || 0), 0);
  const factoryIngCost = comps.reduce((s, c) => s + (c.dailyIngredientCost || 0), 0);
  const factoryNet = factoryRevenue - factoryWageCost - factoryIngCost;
  const factoriesHaveRevenue = comps.some(c => c.dailyRevenue != null);
  const factoriesHaveWage = comps.some(c => c.dailyWageCost != null);

  const ownWage = offerWage(data.ownWorkOffer);
  const workActionsPeace = actionsPerDay(player.eco.energy);
  const wageIncomePeace = ownWage != null ? ownWage * workActionsPeace : null;
  const wageIncomeWar = 0;

  const peaceNet = (wageIncomePeace ?? 0) + factoryNet;
  const warNet   = wageIncomeWar + factoryNet - consumablesDaily;
  const burnRate = peaceNet - warNet;

  return {
    consumableLines,
    consumablesDaily,
    factoryRevenue, factoryWageCost, factoryIngCost, factoryNet,
    factoriesHaveRevenue, factoriesHaveWage,
    ownWage, workActionsPeace,
    wageIncomePeace, wageIncomeWar,
    peaceNet, warNet, burnRate,
    hasOwnWage: ownWage != null,
  };
}

function actionsPerDay(bar, usagePct = 1) {
  return Math.floor(bar / 10) * 2.4 * usagePct;
}

function effectiveHitsPerDay(player, params) {
  if (params.hitsPerDay != null && !isNaN(params.hitsPerDay) && params.hitsPerDay >= 0) {
    return params.hitsPerDay;
  }
  return Math.round(actionsPerDay(player.eco.energy));
}

  attack: 'attack',
  criticalChance: 'crit chance',
  criticalDamages: 'crit damage',
  armor: 'armor',
  dodge: 'dodge',
  precision: 'precision',
};

function equipmentTable(eq) {
  const slots = [
    ['weapon', 'Weapon', ['attack', 'criticalChance']],
    ['helmet', 'Helmet', ['criticalDamages']],
    ['chest',  'Chest',  ['armor']],
    ['pants',  'Pants',  ['armor']],
    ['boots',  'Boots',  ['dodge']],
    ['gloves', 'Gloves', ['precision']],
  ];
  const rows = slots.map(([key, label, statKeys]) => {
    const item = eq[key];
    if (!item) return `<tr class="empty"><td>${label}</td><td colspan="3">empty</td></tr>`;
    const statStr = statKeys
      .map(sk => {
        const v = item.skills[sk];
        return v ? `${fmtInt(v)} ${STAT_LABELS[sk] || sk}` : null;
      })
      .filter(Boolean)
      .join(', ') || '–';
    const nameCell = item.rarity
      ? rarityColored(item.rarity, item.displayName)
      : `<span class="mono">${escapeHtml(item.code)}</span>`;
    return `<tr>
      <td>${label}</td>
      <td>${nameCell}</td>
      <td>${statStr}</td>
      <td class="num">${item.durability != null ? fmtInt(item.durability) + '%' : '–'}</td>

    <thead><tr><th>Slot</th><th>Item</th><th>Stat</th><th>Durability</th></tr></thead>
    <tbody>${rows.join('')}</tbody>

}

/* Per-factory breakdown — rich tooltip rows showing each contribution. */
function factoryBreakdownRows(c) {
  const rows = [];
  rows.push({ term: 'Engine', desc: c.aeLevel ? `AE ${c.aeLevel} → ${fmtInt(c.aePP)} units/day` : 'No automated engine' });

  if (c.workers && c.workers.length) {
    const fidList = c.workers.map(w => `fid ${w.fidelity} @ ${fmt(w.wage, 3)} g/act`).join(', ');
    rows.push({ term: 'Workers', desc: `${c.workers.length} (${fidList}) → +${fmtInt(c.workerPP)} units/day, wages ${fmtGold(c.dailyWageCost)}/day` });
  } else if (c.workerCount > 0) {
    rows.push({ term: 'Workers', desc: `${c.workerCount} worker(s), details not loaded — estimated +${fmtInt(c.workerPP)} units/day at 0 fidelity` });
  } else {
    rows.push({ term: 'Workers', desc: 'None' });
  }

  if (c.dailyOutput) rows.push({ term: 'Total output', desc: `${fmtInt(c.dailyOutput)} units/day` });

  if (c.marketPrice != null) {
    rows.push({ term: 'Revenue', desc: `${fmt(c.marketPrice, 3)} g × ${fmtInt(c.dailyOutput)} = ${fmtGold(c.dailyRevenue)}/day` });
  } else {
    rows.push({ term: 'Revenue', desc: 'Market price unavailable' });
  }

  if (c.isProcessed) {
    if (c.dailyIngredientCost != null) {
      const recipeStr = c.recipeBreakdown.map(r => `${r.qty}× ${r.ingredient}`).join(' + ');
      rows.push({ term: 'Ingredients', desc: `${recipeStr} → −${fmtGold(c.dailyIngredientCost)}/day` });
    } else {
      rows.push({ term: 'Ingredients', desc: 'Some ingredient prices unavailable' });
    }
  }

  if (c.dailyNet != null) rows.push({ term: 'Net', desc: `${fmtSigned(c.dailyNet)}/day` });
  return rows;
}

function companiesTable(comps) {
  if (!comps.length) {
    return `<p class="muted" style="font-size:0.85rem; margin:0;">No companies found.</p>`;
  }
  const rows = comps.map(c => {
    const revCol = c.dailyRevenue != null
      ? `<td class="num">${fmtGold(c.dailyRevenue)}</td>`
      : `<td class="num muted">–</td>`;
    const netCol = c.dailyNet != null
      ? `<td class="${c.dailyNet >= 0 ? 'pos' : 'neg'}">${fmtSigned(c.dailyNet)}</td>`
      : `<td class="num muted">–</td>`;
    return `<tr>
      <td>${escapeHtml(c.name)} ${infoBtn(factoryBreakdownRows(c), c.name + ' breakdown')}</td>
      <td class="mono">${escapeHtml(c.itemCode)}</td>
      <td>${c.aeLevel ? 'AE ' + c.aeLevel : '–'}</td>
      <td class="num">${c.workerCount}</td>
      ${revCol}
      ${netCol}
    </tr>`;
  });
  return `<table class="list">
    <thead><tr>
      <th>Name</th><th>Item</th><th>Engine</th>
      <th>Workers</th>
      <th>Revenue</th>
      <th>Net</th>
    </tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

function renderTargetBuild(p, data) {
  const preset = PRESETS[selectedPreset];

  const current = p.derived;
  const eq = extractEquipment(data.inventory);
  const havePrices = !!data.prices && Object.keys(data.prices).length > 0;
  const gap = computeBuyGap(eq, preset, data.prices);
  const stockpile = computeStockpile(preset, data.prices, p, warParams);
  const daily = computeDailyDuringWar(preset, data.prices, p, data, warParams);
  const hitsToday = effectiveHitsPerDay(p, warParams);
  const hitsAutoDerived = warParams.hitsPerDay == null;

  $('#target-content').innerHTML = `
    <div class="picker">
      ${Object.entries(PRESETS).map(([key, ps]) => `
        <button type="button" data-preset="${key}" class="${key === selectedPreset ? 'active' : ''}">${escapeHtml(ps.name)}</button>
      `).join('')}
    </div>
    <p class="preset-tagline">${escapeHtml(preset.tagline)}</p>

    ${warParamsBar(p, hitsToday, hitsAutoDerived)}

    <div class="grid">
      <div class="card">
        <h3>
          <span>Target combat</span>
          <span class="badge">${fmtInt(target.atk)} attack</span>
        </h3>
        ${targetStatsBlock(target, current)}
        <div class="section">
          <div class="section-label">Active during fighting</div>
          <p class="placeholder-text">${escapeHtml(describeBuffs(preset.buffs))}</p>
        </div>
      </div>

      <div class="card">
        <h3><span>What to do</span></h3>
        ${beforeTheWar(gap, stockpile, havePrices)}
        ${dailyDuringWarSection(daily, havePrices, hitsToday, warParams)}
      </div>
    </div>
  `;

  $$('#target-content .picker button').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedPreset = btn.dataset.preset;
      renderTargetBuild(p, data);
    });
  });

  const wDays = $('#war-days');
  const wHits = $('#war-hits');
  if (wDays) {
    wDays.addEventListener('change', () => {
      const v = parseInt(wDays.value, 10);
      warParams.warDays = isNaN(v) || v < 1 ? DEFAULT_WAR_PARAMS.warDays : v;
      renderTargetBuild(p, data);
    });
  }
  if (wHits) {
    wHits.addEventListener('change', () => {
      const raw = wHits.value.trim();
      if (raw === '' || raw === 'auto') {
        warParams.hitsPerDay = null;
      } else {
        const v = parseInt(raw, 10);
        warParams.hitsPerDay = isNaN(v) || v < 0 ? null : v;
      }
      renderTargetBuild(p, data);
    });

}

function warParamsBar(player, hitsToday, hitsAutoDerived) {

    { term: 'Default (auto)', desc: `Derived from your Energy stat (${player.eco.energy} → ${Math.round(actionsPerDay(player.eco.energy))} actions/day).` },

function describeBuffs(buffs) {
  const parts = [];
  if (buffs.pill) parts.push('Pill (+60% damage)');
  const ammoLabel = { light: 'Light Ammo (+10% damage)', ammo: 'Ammo (+20% damage)', heavy: 'Heavy Ammo (+40% damage)' }[buffs.ammo];
  if (ammoLabel) parts.push(ammoLabel);
  const foodLabel = { bread: 'Bread (+10% health)', steak: 'Steak (+15% health)', fish: 'Fish (+20% health)' }[buffs.food];
  if (foodLabel) parts.push(foodLabel);
  return parts.length ? parts.join(' · ') : 'No active buffs';
}

function targetStatsBlock(target, current) {
  const stat = (label, t, c, suffix = '') => {
    const tv = Math.round(t);
    const cv = Math.round(c);
    const delta = tv - cv;
    const sign = delta > 0 ? '+' : '';
    const deltaStr = delta === 0
      ? ''
      : `<span class="delta">${sign}${fmtInt(delta)}${suffix}</span>`;
    return `<div class="stat">
      <span class="stat-label">${label}</span>
      <span class="stat-value">${fmtInt(tv)}${suffix}${deltaStr}</span>
    </div>`;
  };
  return `<div class="stats">
    ${stat('Attack', target.atk, current.atk)}
    ${stat('Precision', target.prc, current.prc, '%')}
    ${stat('Crit chance', target.cc, current.cc, '%')}
    ${stat('Crit damage', target.cd, current.cd, '%')}
    ${stat('Armor', target.arm, current.arm, '%')}
    ${stat('Dodge', target.ddg, current.ddg, '%')}
    ${stat('Health', target.hp, current.hp)}
  </div>`;
}

/* ── Before the war (combined gear + consumables) ─────────────────── */
function beforeTheWar(gap, stockpile, havePrices) {
  const gearTotal = gap.total || 0;
  const stockpileTotal = stockpile.total || 0;
  const grandTotal = gearTotal + stockpileTotal;
  const hasGearGap = gap.items.length > 0;
  const hasStockpile = stockpile.items.length > 0;
  const gearPricesMissing = hasGearGap && gap.items.every(it => it.price == null);

  if (!hasGearGap && !hasStockpile) {
    return `<div class="section">
      <div class="section-label">Before the war</div>
      <p class="placeholder-text ok">✓ Gear meets target and no consumables required.</p>
    </div>`;
  }

  let blocks = '';

  // Gear sub-block
  if (hasGearGap) {
    const gearTip = [
      { term: 'Targets', desc: 'Suggested gear upgrades for the selected build, by slot and rarity.' },
      { term: 'Prices', desc: 'Come from the market data endpoint, which currently does not include crafted gear — that is why prices may show ?.' },
      { term: 'Usable now', desc: 'Slot and rarity targets are valid as a shopping list even without prices.' },
    ];
    const rows = gap.items.map(it => {
      const fromCell = it.currentRarity
        ? rarityColored(it.currentRarity, gearItemName(it.slot, it.currentRarity))
        : (it.currentCode
          ? `<span class="mono">${escapeHtml(it.currentCode)}</span>`
          : '<span class="muted">none</span>');
      const toCell = rarityColored(it.targetRarity, gearItemName(it.slot, it.targetRarity));
      return `<tr>
        <td>${SLOT_LABEL[it.slot]}</td>
        <td>${fromCell}</td>
        <td>${toCell}</td>
        <td class="num">${it.price != null ? fmtGold(it.price) : (havePrices ? '?' : '–')}</td>
      </tr>`;
    }).join('');

    const gearTotalLabel = gearTotal > 0 ? fmtGold(gearTotal) : 'no prices';
    blocks += `<div class="sub-label">Gear ${infoBtn(gearTip)}<span class="right">${gearTotalLabel}</span></div>
      <table class="list">
        <thead><tr><th>Slot</th><th>From</th><th>To</th><th>Price</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${gearPricesMissing ? '<p class="note">Crafted gear prices aren\'t in the market data we currently fetch — slot/rarity targets shown without prices. Total below excludes gear.</p>' : ''}`;
  } else {
    blocks += `<div class="sub-label">Gear</div>
      <p class="placeholder-text ok">✓ Target rarity met in every slot.</p>`;
  }

  // Consumables sub-block with derivation tooltip
  if (hasStockpile) {
    const pillItem = stockpile.items.find(i => i.kind === 'pill');
    const ammoItem = stockpile.items.find(i => i.kind === 'ammo');
    const foodItem = stockpile.items.find(i => i.kind === 'food');
    const tipRowsArr = [];
    if (pillItem) tipRowsArr.push({ term: 'Pills', desc: `1/day × ${stockpile.days} days = ${fmtInt(pillItem.qty)}` });
    if (ammoItem) tipRowsArr.push({ term: 'Ammo', desc: `1 per hit × ${fmt(stockpile.hitsPerDay, 1)} hits/day × ${stockpile.days} days = ${fmtInt(ammoItem.qty)}` });
    if (foodItem) tipRowsArr.push({ term: 'Food', desc: `1 per ${stockpile.hunger} hits (your Hunger skill) × ${fmtInt(stockpile.totalHits)} hits = ${fmtInt(foodItem.qty)}` });
    tipRowsArr.push({ term: 'Adjust', desc: 'Use War days or Hits/day above to recompute.' });

    const rows = stockpile.items.map(it => `
      <tr>
        <td>${escapeHtml(it.label)}</td>
        <td class="num">${fmtInt(it.qty)}</td>
        <td class="num">${it.unit != null ? fmtGold(it.unit) : (havePrices ? '?' : '–')}</td>
        <td class="num">${it.line != null ? fmtGold(it.line) : '–'}</td>
      </tr>
    `).join('');

    blocks += `<div class="sub-label">Consumables · ${stockpile.days} days × ${fmt(stockpile.hitsPerDay, 1)} hits/day ${infoBtn(tipRowsArr)}<span class="right">${fmtGold(stockpileTotal)}</span></div>
      <table class="list">
        <thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th>Line</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  const totalSuffix = gearPricesMissing && hasGearGap
    ? `<span class="muted-suffix">(consumables only)</span>`
    : '';

  return `<div class="section">
    <div class="section-label">Before the war<span class="right">${fmtGold(grandTotal)} total${totalSuffix}</span></div>
    ${blocks}
    ${stockpile.anyMissingPrice ? '<p class="note">Some consumable prices missing — total excludes those lines.</p>' : ''}
  </div>`;
}

/* ── Daily during war ─────────────────────────────────────────────── */
function dailyDuringWarSection(d, havePrices, hitsPerDay, params) {
  const incomeLines = [];
  if (d.factoriesHaveRevenue) {
    incomeLines.push({ label: 'Factory revenue', qty: null, value: d.factoryRevenue, cls: 'pos' });
  }
  if (d.factoriesHaveWage) {
    incomeLines.push({ label: 'Worker payroll (cost)', qty: null, value: -d.factoryWageCost, cls: 'neg' });
  }
  if (d.factoryIngCost > 0) {
    incomeLines.push({ label: 'Ingredient cost', qty: null, value: -d.factoryIngCost, cls: 'neg' });
  }
  if (!d.factoriesHaveRevenue && !d.factoriesHaveWage) {
    incomeLines.push({ label: 'Factory data', value: null, qty: null, cls: 'unk', note: 'unavailable' });
  }
  incomeLines.push({ label: 'Working-for-others wage', qty: 'paused during war', value: 0, cls: 'neg' });

  const incomeTotal = (d.factoriesHaveRevenue ? d.factoryRevenue : 0)
                   - (d.factoriesHaveWage ? d.factoryWageCost : 0)
                   - (d.factoryIngCost || 0);

  const costLines = d.consumableLines.map(it => ({
    label: it.label,
    qty: it.qtyPerDay,
    value: it.linePerDay,
    cls: 'neg',
  }));

  const costTotal = d.consumablesDaily;
  const warNetEstimate = incomeTotal - costTotal;
  const burnVsPeace = d.peaceNet - warNetEstimate;

  const renderLine = (l) => {
    let valStr;
    if (l.value == null) valStr = `<span class="lv unk">${l.note || '?'}</span>`;
    else valStr = `<span class="lv ${l.cls}">${l.cls === 'neg' && l.value !== 0 ? fmtSigned(l.value < 0 ? l.value : -l.value) : (l.value === 0 ? '0 g' : fmtSigned(l.value))}</span>`;
    return `<div class="flow-line">
      <span class="ll">${escapeHtml(l.label)}${l.qty != null ? `<span class="qty">${typeof l.qty === 'number' ? '× ' + fmt(l.qty, 1) : l.qty}</span>` : ''}</span>
      ${valStr}
    </div>`;
  };

  const netClass = warNetEstimate >= 0 ? 'positive' : 'negative';

  const peaceLine = d.hasOwnWage
    ? `Working-for-others wage ${fmtGold(d.wageIncomePeace)}/day + factory net ${fmtSigned(d.factoryNet)} = ${fmtSigned(d.peaceNet)}/day.`
    : `Factory net ${fmtSigned(d.factoryNet)}/day (no current job detected).`;

  const tipRowsArr = [
    { term: 'War shift', desc: 'Your Energy goes to fighting instead of working — working-for-others wage drops to 0.' },
    { term: 'Factories', desc: 'Keep running. Revenue, worker wages, and ingredient costs all continue (see the Factories ? in the Economy card for the model).' },
    { term: 'Peace baseline', desc: peaceLine },
  ];

  return `<div class="section">
    <div class="section-label">Daily during war ${infoBtn(tipRowsArr)}
      <span class="right">vs peace: ${burnVsPeace >= 0 ? '−' : '+'}${fmtGold(Math.abs(burnVsPeace))}/day</span>
    </div>
    <div class="flow">
      <div class="flow-side">
        <h5>Income</h5>
        ${incomeLines.map(renderLine).join('')}
        <div class="flow-line flow-total">
          <span class="ll">Net income</span>
          <span class="lv ${incomeTotal >= 0 ? 'pos' : 'neg'}">${fmtSigned(incomeTotal)}</span>
        </div>
      </div>
      <div class="flow-side">
        <h5>Cost</h5>
        ${costLines.map(renderLine).join('')}
        <div class="flow-line flow-total">
          <span class="ll">Total cost</span>
          <span class="lv neg">${fmtSigned(-costTotal)}</span>
        </div>
      </div>
    </div>
    <div class="flow-net ${netClass}">
      <span>Estimated daily net during war</span>
      <span class="mono">${fmtSigned(warNetEstimate)}</span>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════
 *  STATUS / FLOW
 * ═══════════════════════════════════════════════════════════════════ */
function setStatus(kind, msg = '') {
  const el = $('#status');
  el.className = 'status' + (kind ? ' ' + kind : '');
  el.textContent = msg;
}

async function load(username) {
  if (!username) {
    setStatus('error', 'Enter a username.');
    return;
  }
  setStatus('', `Resolving "${username}"…`);
  $('#load-btn').disabled = true;
  $('#player').classList.add('hidden');
  $('#debug-panel').classList.add('hidden');
  try {
    const userId = await resolveUserId(username);
    if (!userId) throw new Error(`No user found for "${username}"`);
    setStatus('', `Loading profile…`);
    const data = await loadPlayer(userId);
    renderPlayer(data);
    const newQs = new URLSearchParams();
    newQs.set('u', username);
    if (DEBUG) newQs.set('debug', '1');
    history.replaceState(null, '', '?' + newQs.toString());
    setStatus('ok', `Loaded ${data.user?.username || username}.`);
  } catch (e) {
    console.error(e);
    setStatus('error', e.message || String(e));
  } finally {
    $('#load-btn').disabled = false;
  }
}

$('#load-btn').addEventListener('click', () => load($('#username').value.trim()));
$('#username').addEventListener('keydown', e => {
  if (e.key === 'Enter') load($('#username').value.trim());
});

const initialU = QS.get('u');
if (initialU) {
  $('#username').value = initialU;
  load(initialU);
} else {
  $('#username').focus();
}

if (DEBUG) console.log('Debug mode on. Add ?debug=1 to URL.');
</script>
</body>

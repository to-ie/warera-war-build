<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>War Readiness · we-ie.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d10;
    --surface: #14181d;
    --surface-2: #1c2128;
    --border: #2a313a;
    --border-strong: #3a424d;
    --text: #e8ecf0;
    --dim: #98a2b0;
    --dimmer: #6b7480;
    --accent: #4ad395;
    --accent-soft: rgba(74, 211, 149, 0.12);
    --warn: #f0c14b;
    --warn-soft: rgba(240, 193, 75, 0.12);
    --error: #f06060;
    --error-soft: rgba(240, 96, 96, 0.12);
    --rarity-common: #8b94a3;
    --rarity-uncommon: #4ad395;
    --rarity-rare: #5b8cff;
    --rarity-epic: #b87ddf;
    --rarity-legendary: #f0c14b;
    --rarity-mythic: #f06060;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-size: 15px;
  }

  .topbar { border-bottom: 1px solid var(--border); background: var(--surface); }
  .topbar-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0.9rem 1.5rem;
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .brand h1 { margin: 0; font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em; }
  .brand .accent { color: var(--accent); }
  .brand .sub { color: var(--dimmer); font-size: 0.85rem; }

  main {
    flex: 1;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .search-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
    flex-wrap: wrap;
  }
  .search-row input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.85rem;
    border-radius: 6px;
    font: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-row input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search-row button {
    background: var(--accent);
    border: 0;
    color: #07120c;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .search-row button:hover:not(:disabled) { background: #5fdfa6; }
  .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    min-height: 1.3rem;
    font-size: 0.85rem;
    color: var(--dim);
    margin-bottom: 1rem;
  }
  .status.error { color: var(--error); }
  .status.ok { color: var(--accent); }

  .player-head {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 1rem;
  }
  .avatar {
    width: 56px;
    height: 56px;
    border-radius: 8px;
    background: var(--surface-2);
    flex-shrink: 0;
    object-fit: cover;
  }
  .player-name { margin: 0 0 0.2rem 0; font-size: 1.2rem; font-weight: 600; }
  .player-meta { margin: 0; font-size: 0.9rem; color: var(--dim); }
  .pill {
    display: inline-block;
    padding: 0.1rem 0.55rem;
    background: var(--surface-2);
    border-radius: 4px;
    margin-right: 0.35rem;
    margin-bottom: 0.2rem;
    font-size: 0.8rem;
  }
  .pill .mono { font-family: var(--mono); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem 1.25rem;
  }
  .card h3 {
    margin: 0 0 1rem 0;
    font-size: 1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .badge {
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.18rem 0.55rem;
    border-radius: 999px;
    font-family: var(--mono);
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
    gap: 0.5rem;
    margin-bottom: 1.1rem;
  }
  .stat {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.55rem 0.7rem;
    text-align: left;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 4.5em;
  }
  .stat-label {
    display: block;
    color: var(--dim);
    font-size: 0.72rem;
    line-height: 1.3;
    margin-bottom: 0.35rem;
    overflow-wrap: break-word;
    hyphens: auto;
  }
  .stat-value {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 0.95rem;
  }

  .delta {
    font-size: 0.68rem;
    font-weight: 400;
    margin-left: 0.25rem;
    font-family: var(--mono);
    white-space: nowrap;
    color: var(--dimmer);
  }
  .delta.positive,
  .delta.negative,
  .delta.neutral { color: var(--dimmer); }

  .state-section { margin: 0; margin-top: 1.5rem; }
  .state-section:first-of-type { margin-top: 0; }
  .state-section > summary {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    cursor: pointer;
    padding: 0.5rem 0 0.85rem;
    list-style: none;
    user-select: none;
  }
  .state-section > summary::-webkit-details-marker { display: none; }
  .state-section > summary > .caret {
    color: var(--dim);
    transition: transform 0.2s;
    font-size: 0.85rem;
    flex-shrink: 0;
    display: inline-block;
  }
  .state-section > summary > h2 {
    margin: 0;
    font-size: 1.05rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .state-section:not([open]) > summary > .caret { transform: rotate(-90deg); }

  .picker {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
  }
  .picker button {
    flex: 1;
    min-width: 130px;
    padding: 0.6rem 0.9rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.15s;
  }
  .picker button:hover { border-color: var(--accent); }
  .picker button.active {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }
  .preset-tagline {
    color: var(--dim);
    font-size: 0.88rem;
    margin: 0 0 0.6rem 0;
    font-style: italic;
  }
  .preset-outcome {
    color: var(--text);
    font-size: 0.85rem;
    margin: 0 0 1rem 0;
    padding: 0.5rem 0.8rem;
    background: var(--surface-2);
    border-radius: 6px;
    border-left: 2px solid var(--accent);
  }
  .preset-outcome strong {
    color: var(--accent);
    font-weight: 600;
    margin-right: 0.4rem;
  }

  .war-params {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    padding: 0.6rem 0.85rem;
    background: var(--surface-2);
    border-radius: 6px;
    border: 1px solid var(--border);
    margin-bottom: 1rem;
    font-size: 0.85rem;
  }
  .war-params label {
    color: var(--dim);
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .war-params label.disabled { opacity: 0.4; }
  .war-params input {
    width: 56px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.25rem 0.45rem;
    border-radius: 4px;
    font: inherit;
    font-family: var(--mono);
    text-align: right;
  }
  .war-params input:focus { outline: none; border-color: var(--accent); }
  .war-params input[type=number] { -moz-appearance: textfield; appearance: textfield; }
  .war-params input[type=number]::-webkit-inner-spin-button,
  .war-params input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .war-params .auto-tag {
    color: var(--dimmer);
    font-size: 0.72rem;
    margin-left: 0.15rem;
    font-style: italic;
  }

  .section { margin-top: 1rem; }
  .section:first-child { margin-top: 0; }
  .section-label {
    color: var(--dim);
    font-size: 0.82rem;
    margin-bottom: 0.55rem;
    font-weight: 500;
    display: flex;
    align-items: baseline;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .section-label .right {
    margin-left: auto;
    color: var(--text);
    font-family: var(--mono);
    font-weight: 400;
  }
  .section-label .right .muted-suffix {
    color: var(--dimmer);
    font-size: 0.75rem;
    font-weight: 400;
    margin-left: 0.4rem;
  }

  .skills { display: grid; gap: 0.3rem; font-size: 0.85rem; }
  .skill {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.6rem;
    padding: 0.4rem 0.6rem;
    background: var(--surface-2);
    border-radius: 4px;
  }
  .skill-name { color: var(--dim); }
  .skill-value { font-family: var(--mono); font-weight: 500; text-align: right; }
  .skill-value .sub { color: var(--dimmer); font-weight: 400; }
  .skill-value .total { color: var(--text); font-weight: 600; }

  .action-list { display: grid; gap: 0.4rem; }
  .action-row {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.55rem 0.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.6rem;
  }
  .action-row.warn { border-left: 3px solid var(--warn); }
  .action-row.ok-row { border-left: 3px solid var(--accent); }
  .action-main {
    display: flex;
    flex-direction: column;
    gap: 0.18rem;
    min-width: 0;
    flex: 1;
  }
  .action-what {
    font-size: 0.88rem;
    color: var(--text);
    font-weight: 500;
  }
  .action-detail {
    color: var(--dim);
    font-size: 0.76rem;
  }
  .action-cost {
    font-family: var(--mono);
    font-size: 0.85rem;
    white-space: nowrap;
    flex-shrink: 0;
    color: var(--text);
    font-weight: 600;
    text-align: right;
  }
  .action-cost.unknown { color: var(--dimmer); font-style: italic; font-size: 0.78rem; font-weight: 400; }
  .action-cost.none { color: var(--dimmer); font-size: 0.78rem; font-weight: 400; }

  table.list { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  table.list th, table.list td {
    text-align: left;
    padding: 0.4rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  table.list th {
    color: var(--dimmer);
    font-weight: 500;
    font-size: 0.78rem;
  }
  table.list td.mono { font-family: var(--mono); }
  table.list td.num { text-align: right; font-family: var(--mono); white-space: nowrap; }
  table.list tr:last-child td { border-bottom: 0; }
  table.list tr.empty td { color: var(--dimmer); font-style: italic; }
  table.list td.pos { color: var(--accent); font-family: var(--mono); text-align: right; white-space: nowrap; }
  table.list td.neg { color: var(--error); font-family: var(--mono); text-align: right; white-space: nowrap; }

  /* Rarity-colored text (kept for legacy uses; we now prefer .r-tag). */
  .r-common    { color: var(--rarity-common);    font-weight: 500; }
  .r-uncommon  { color: var(--rarity-uncommon);  font-weight: 500; }
  .r-rare      { color: var(--rarity-rare);      font-weight: 500; }
  .r-epic      { color: var(--rarity-epic);      font-weight: 500; }
  .r-legendary { color: var(--rarity-legendary); font-weight: 500; }
  .r-mythic    { color: var(--rarity-mythic);    font-weight: 500; }

  /* Compact rarity tag — small pill that sits after the item name. */
  .r-tag {
    display: inline-block;
    font-size: 0.66rem;
    font-weight: 600;
    padding: 0.05rem 0.4rem;
    border-radius: 3px;
    margin-left: 0.4rem;
    vertical-align: middle;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    line-height: 1.4;
  }
  .r-tag.common    { background: rgba(139,148,163,0.18); color: var(--rarity-common); }
  .r-tag.uncommon  { background: rgba(74,211,149,0.18); color: var(--rarity-uncommon); }
  .r-tag.rare      { background: rgba(91,140,255,0.20); color: var(--rarity-rare); }
  .r-tag.epic      { background: rgba(184,125,223,0.20); color: var(--rarity-epic); }
  .r-tag.legendary { background: rgba(240,193,75,0.20); color: var(--rarity-legendary); }
  .r-tag.mythic    { background: rgba(240,96,96,0.20); color: var(--rarity-mythic); }

  .placeholder-text {
    font-size: 0.85rem;
    color: var(--dim);
    margin: 0.25rem 0 0;
    padding: 0.5rem 0.7rem;
    background: var(--surface-2);
    border-radius: 6px;
    border-left: 2px solid var(--border-strong);
  }
  .placeholder-text.ok { color: var(--accent); border-color: var(--accent); }
  .placeholder-text.warn { color: var(--warn); border-color: var(--warn); }

  .grand-total {
    margin-top: 0.9rem;
    padding: 0.7rem 0.85rem;
    background: var(--accent-soft);
    border-radius: 6px;
    border: 1px solid var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--accent);
  }
  .grand-total .mono { font-family: var(--mono); }

  .war-flow { display: grid; gap: 0.5rem; }
  .flow-block {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.55rem 0.75rem;
  }
  .flow-block h5 {
    margin: 0 0 0.4rem;
    font-size: 0.78rem;
    color: var(--dim);
    font-weight: 500;
  }
  .flow-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.84rem;
    padding: 0.18rem 0;
    gap: 0.5rem;
  }
  .flow-line .ll { color: var(--dim); flex: 1; }
  .flow-line .ll .qty { color: var(--dimmer); font-family: var(--mono); font-size: 0.76rem; margin-left: 0.3rem; }
  .flow-line .lv { font-family: var(--mono); white-space: nowrap; }
  .flow-line .lv.pos { color: var(--accent); }
  .flow-line .lv.neg { color: var(--error); }
  .flow-line .lv.unk { color: var(--dimmer); font-style: italic; font-size: 0.78rem; }
  .flow-subtotal {
    border-top: 1px solid var(--border);
    margin-top: 0.35rem;
    padding-top: 0.4rem;
    font-weight: 600;
  }
  .flow-note {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    font-size: 0.82rem;
    color: var(--dim);
    font-style: italic;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.5rem;
  }
  .flow-net {
    margin-top: 0.5rem;
    padding: 0.65rem 0.85rem;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.95rem;
    font-weight: 600;
  }
  .flow-net.positive { background: var(--accent-soft); color: var(--accent); }
  .flow-net.negative { background: var(--error-soft); color: var(--error); }
  .flow-net .mono { font-family: var(--mono); }

  .note {
    font-size: 0.8rem;
    color: var(--dimmer);
    font-style: italic;
    margin-top: 0.9rem;
  }
  .hidden { display: none !important; }
  .muted { color: var(--dim); }

  .info-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--dim);
    font-size: 0.65rem;
    font-weight: 600;
    cursor: help;
    margin-left: 0.3rem;
    position: relative;
    padding: 0;
    vertical-align: middle;
    font-family: inherit;
    line-height: 1;
    flex-shrink: 0;
  }
  .info-btn:hover, .info-btn:focus { outline: none; color: var(--accent); border-color: var(--accent); }
  .info-btn .tip {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: var(--surface-2);
    border: 1px solid var(--border-strong);
    padding: 0.55rem 0.7rem;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 400;
    width: 300px;
    max-width: calc(100vw - 2rem);
    text-align: left;
    color: var(--dim);
    line-height: 1.45;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    cursor: default;
    white-space: normal;
  }
  .info-btn:hover .tip, .info-btn:focus .tip { opacity: 1; }
  .tip-row { display: block; padding: 0.32rem 0; border-bottom: 1px solid var(--border); }
  .tip-row:first-child { padding-top: 0; }
  .tip-row:last-child  { padding-bottom: 0; border-bottom: 0; }
  .tip-row strong { color: var(--text); font-weight: 600; margin-right: 0.35rem; }

  details.debug {
    margin-top: 1rem;
    padding: 0.6rem 0.85rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  details.debug summary { cursor: pointer; font-size: 0.8rem; color: var(--dim); }
  details.debug pre {
    margin: 0.6rem 0 0;
    overflow: auto;
    background: var(--bg);
    padding: 0.6rem;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--dim);
    max-height: 400px;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 1rem 1.5rem;
    color: var(--dim);
    font-size: 0.85rem;
    text-align: center;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
  footer .sep { margin: 0 0.5rem; color: var(--border-strong); }

  @media (max-width: 600px) {
    body { font-size: 14px; }
    main { padding: 1rem; }
    .topbar-inner { padding: 0.75rem 1rem; }
    .card { padding: 0.9rem 1rem; }
    .stats { grid-template-columns: repeat(auto-fit, minmax(78px, 1fr)); gap: 0.4rem; }
    .stat { padding: 0.45rem 0.55rem; }
    .stat-label { font-size: 0.7rem; }
    .stat-value { font-size: 0.9rem; }
    .skills { font-size: 0.8rem; }
    .skill { padding: 0.4rem 0.5rem; }
    table.list { font-size: 0.78rem; }
    table.list th, table.list td { padding: 0.35rem 0.4rem; }
    .player-head { padding: 0.85rem 1rem; }
    .player-name { font-size: 1.1rem; }
    .info-btn .tip { width: 240px; left: auto; right: 0; }
    .picker button { min-width: 0; flex: 1 1 calc(50% - 0.25rem); font-size: 0.85rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <h1>War <span class="accent">Readiness</span></h1>
    </div>
    <span class="brand sub">build planner for warera.io · v0.8</span>
  </div>
</div>

<main>
  <div class="search-row">
    <input id="username" placeholder="warera username..." autocomplete="off" spellcheck="false">
    <button id="load-btn">Load profile</button>
  </div>
  <div id="status" class="status"></div>

  <div id="player" class="hidden">
    <div class="player-head">
      <img id="avatar" class="avatar" alt="" hidden>
      <div>
        <h2 id="player-name" class="player-name"></h2>
        <p id="player-meta" class="player-meta"></p>
      </div>
    </div>

    <details class="state-section" open>
      <summary>
        <span class="caret">▾</span>
        <h2>Your current state</h2>
      </summary>
      <div class="grid">
        <div class="card">
          <h3>
            <span>Combat <span id="combat-info"></span></span>
            <span class="badge" id="combat-badge"></span>

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
function fmt(n, d = 2) {
  if (n == null || isNaN(n)) return '–';
  return Number(n).toLocaleString(undefined, {
    minimumFractionDigits: d, maximumFractionDigits: d
  });
}
function fmtInt(n) {
  if (n == null || isNaN(n)) return '–';
  return Math.round(Number(n)).toLocaleString();
}
function fmtBtc(n, d = 2) { return n == null || isNaN(n) ? '–' : fmt(n, d) + ' ₿'; }
function fmtSigned(n, d = 2) {
  if (n == null || isNaN(n)) return '–';
  const sign = n > 0 ? '+' : '';
  return sign + fmt(n, d) + ' ₿';
}
function fmtCompact(n) {
  if (n == null || isNaN(n)) return '–';
  const abs = Math.abs(n);
  if (abs >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (abs >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return Math.round(n).toLocaleString();
}
function expectedDamagePerHit(d) {
  const atk = d.atk || 0;
  const prc = (d.prc || 0) / 100;
  const cc  = (d.cc  || 0) / 100;
  const cdMult = 1 + (d.cd || 0) / 100;
  const landed = prc * ((1 - cc) * atk + cc * atk * cdMult);
  const missed = (1 - prc) * atk * 0.5;
  return landed + missed;
}
function flag(code) {
  if (!code || code.length !== 2) return '🏳️';
  return code.toUpperCase().split('').map(c =>
    String.fromCodePoint(c.charCodeAt(0) - 65 + 0x1F1E6)
  ).join('');
}
function midpoint([min, max]) { return (min + max) / 2; }

function tipRows(content) {
  if (typeof content === 'string') return `<span class="tip-row">${escapeHtml(content)}</span>`;
  return content.map(r => {

    return `<span class="tip-row"><strong>${escapeHtml(r.term)}</strong>${escapeHtml(r.desc)}</span>`;

/* ═══════════════════════════════════════════════════════════════════
 *  TRPC CLIENT
 * ═══════════════════════════════════════════════════════════════════ */
async function trpc(endpoint, params = {}) {
  const input = encodeURIComponent(JSON.stringify(params));
  const url = `${CFG.API}/${endpoint}?input=${input}`;
  if (DEBUG) console.log(`→ ${endpoint}`, params);
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${endpoint} HTTP ${res.status}`);
  const json = await res.json();
  if (DEBUG) console.log(`← ${endpoint}`, json);
  const item = Array.isArray(json) ? json[0] : json;
  if (item?.error) throw new Error(`${endpoint}: ${item.error.message || 'error'}`);
  const d = item?.result?.data;
  return d?.json ?? d ?? item;
}

async function resolveUserId(input) {
  const t = input.trim();
  if (!t) return null;
  if (/^[a-f0-9]{24}$/i.test(t)) return t;
  const r = await trpc('search.searchAnything', { searchText: t });
  const userIds = r?.userIds || [];
  if (!userIds.length) return null;
  return userIds[0];
}

async function loadPlayer(userId) {
  /* Gateway only exposes inventory.fetchCurrentEquipment. Full inventory
     contents (consumables, materials, spare gear) aren't reachable via
     the gateway — if/when an endpoint is added upstream, plumb it here. */
  const [user, inventory, companyList, pricesR, workersR] = await Promise.allSettled([
    trpc('user.getUserById', { userId }),
    trpc('inventory.fetchCurrentEquipment', { userId }),
    trpc('company.getCompanies', { userId, perPage: 50 }),
    trpc('itemTrading.getPrices'),
    trpc('worker.getWorkers', { userId }),
  ]);

  const u = user.status === 'fulfilled' ? user.value : null;
  const ids = companyList.status === 'fulfilled' ? (companyList.value?.items || []) : [];

  const workersData = workersR.status === 'fulfilled' ? workersR.value : null;
  const workersByCompanyId = {};
  if (workersData?.workersPerCompany) {
    workersData.workersPerCompany.forEach(entry => {
      if (entry?.company?._id) {
        workersByCompanyId[entry.company._id] = entry.workers || [];
      }
    });
  }

  const secondary = await Promise.allSettled([
    ...ids.map(id => trpc('company.getById', { companyId: id })),
    u?.country ? trpc('country.getCountryById', { countryId: u.country }) : Promise.resolve(null),
    u?.mu ? trpc('mu.getById', { muId: u.mu }) : Promise.resolve(null),
    u?.company ? trpc('company.getById', { companyId: u.company }) : Promise.resolve(null),
  ]);

  const companies = secondary.slice(0, ids.length)
    .filter(r => r.status === 'fulfilled')
    .map(r => r.value);
  const country = secondary[ids.length]?.status === 'fulfilled' ? secondary[ids.length].value : null;
  const mu = secondary[ids.length + 1]?.status === 'fulfilled' ? secondary[ids.length + 1].value : null;
  const workplaceCompany = secondary[ids.length + 2]?.status === 'fulfilled' ? secondary[ids.length + 2].value : null;

  let ownWage = null;
  let ownFidelity = null;
  if (workplaceCompany?.user) {
    try {
      const ownerWorkers = await trpc('worker.getWorkers', { userId: workplaceCompany.user });
      if (ownerWorkers?.workersPerCompany) {
        const entry = ownerWorkers.workersPerCompany.find(e => e?.company?._id === workplaceCompany._id);
        const myRecord = entry?.workers?.find(w => w.user === userId);
        if (myRecord) {
          ownWage = Number(myRecord.wage);
          ownFidelity = Number(myRecord.fidelity);
        }
      }
    } catch (e) {
      if (DEBUG) console.warn('Failed to fetch workplace workers:', e);
    }
  }

  return {
    userId,
    user: u,
    userError: user.status === 'rejected' ? String(user.reason?.message || user.reason) : null,
    inventory: inventory.status === 'fulfilled' ? inventory.value : null,
    inventoryError: inventory.status === 'rejected' ? String(inventory.reason?.message || inventory.reason) : null,
    companies,
    companiesError: companyList.status === 'rejected' ? String(companyList.reason?.message || companyList.reason) : null,
    country, mu,
    workplaceCompany,
    workersByCompanyId,
    ownWage, ownFidelity,
    ownWorkOffer: ownWage != null ? { wage: ownWage, fidelity: ownFidelity, source: 'worker_record' } : null,
    prices: pricesR.status === 'fulfilled' ? normalizePrices(pricesR.value) : {},
    pricesError: pricesR.status === 'rejected' ? String(pricesR.reason?.message || pricesR.reason) : null,
    workersError: workersR.status === 'rejected' ? String(workersR.reason?.message || workersR.reason) : null,
  };
}

function normalizePrices(raw) {
  if (!raw) return {};
  if (Array.isArray(raw)) {
    const out = {};
    raw.forEach(item => {
      const code = item?.itemCode || item?.code || item?.item;
      const price = item?.price ?? item?.value;
      if (code && price != null) out[code] = price;
    });
    return out;
  }
  if (raw.prices && typeof raw.prices === 'object') return raw.prices;
  if (typeof raw === 'object') return raw;
  return {};
}

function offerWage(offer) {
  if (!offer) return null;
  const candidates = [offer.wage, offer.salary, offer.payment, offer.amount, offer.ppPerWork, offer.gold];
  for (const c of candidates) {
    if (c != null && !isNaN(c)) return Number(c);
  }
  return null;
}

    eco: {
      energy: grab('energy', 'total'),

      production: grab('production', 'total'),
      companies: grab('companies', 'total'),
      management: grab('management', 'total'),

}

function extractEquipment(inv) {
  const slot = key => {
    const p = inv?.[key];
    if (!p) return null;
    const code = p.code ?? '?';
    const rarity = rarityFromCode(code);
    return {
      code,
      rarity,
      displayName: gearItemName(key, rarity),
      durability: p.state != null ? Math.round((p.state / (p.maxState || 100)) * 100) : null,
      skills: p.skills || {},
    };
  };
  return {
    weapon: slot('weapon'),
    helmet: slot('helmet'),
    chest:  slot('chest'),
    pants:  slot('pants'),
    boots:  slot('boots'),
    gloves: slot('gloves'),
  };
}

function extractCompanies(data) {
  const items = Array.isArray(data.companies) ? data.companies : [];
  const prices = data.prices || {};
  const workersByCompany = data.workersByCompanyId || {};
  const A = FACTORY_ASSUMPTIONS;

  return items.map(co => {
    const id = co._id;
    const itemCodeStr = co.itemCode ?? '?';
    const workerCount = co.workerCount ?? 0;
    const aeLevel = co.activeUpgradeLevels?.automatedEngine ?? 0;
    const price = prices[itemCodeStr] != null ? Number(prices[itemCodeStr]) : null;

    const aePP = AE_TABLE[aeLevel] ?? (aeLevel * 24);

    const workers = workersByCompany[id] || [];
    let workerPP = 0;
    let dailyWageCost = null;
    const workerDetails = [];
    if (workers.length > 0) {
      let wageSum = 0;
      workers.forEach(w => {
        const fid = Number(w.fidelity) || 0;
        const wage = Number(w.wage) || 0;
        const pp = A.workerActionsPerDay * A.workerProduction * (1 + fid / 100);
        workerPP += pp;
        wageSum += wage * A.workerActionsPerDay;
        workerDetails.push({ fidelity: fid, wage, dailyWage: wage * A.workerActionsPerDay, pp });
      });
      dailyWageCost = wageSum;
    } else if (workerCount > 0) {
      workerPP = workerCount * A.workerActionsPerDay * A.workerProduction;
    }

    const dailyOutput = (aePP + workerPP) * A.outputCalibration;
    const dailyRevenue = price != null ? dailyOutput * price : null;

    const recipe = RECIPES[itemCodeStr];
    const isProcessed = !!recipe;
    const recipeBreakdown = [];
    let dailyIngredientCost = null;
    if (recipe) {
      let allPriced = true;
      let cost = 0;
      for (const [ing, qty] of Object.entries(recipe)) {
        const ingPrice = prices[ing] != null ? Number(prices[ing]) : null;
        recipeBreakdown.push({ ingredient: ing, qty, price: ingPrice });
        if (ingPrice == null) { allPriced = false; }
        else { cost += qty * dailyOutput * ingPrice; }
      }
      if (allPriced) dailyIngredientCost = cost;
    }

    const dailyNet = (dailyRevenue != null)
      ? dailyRevenue - (dailyWageCost || 0) - (dailyIngredientCost || 0)
      : null;

    return {
      id, name: co.name ?? '?',
      itemCode: itemCodeStr,
      aeLevel,
      aePP,
      storageLevel: co.activeUpgradeLevels?.storage ?? null,
      breakRoomLevel: co.activeUpgradeLevels?.breakRoom ?? null,
      stored: co.production ?? null,
      estimatedValue: co.estimatedValue ?? null,
      workerCount,
      workers: workerDetails,
      workerPP,
      isProcessed,
      recipeBreakdown,
      dailyIngredientCost,
      marketPrice: price,
      dailyOutput,
      dailyRevenue,
      dailyWageCost,
      dailyNet,
    };
  });
}

/* ═══════════════════════════════════════════════════════════════════
 *  COMPUTE — FOUNDATIONS / GEAR / CONSUMABLES / DAILY
 * ═══════════════════════════════════════════════════════════════════ */
function computeFoundations(player, comps, preset) {
  const items = [];
  const f = preset.foundations || {};
  const minCo = f.minCompanies ?? 0;
  const minAe = f.minAe ?? 0;

  if (player.eco.companies < minCo) {
    const needSlots = minCo - player.eco.companies;
    const targetSkill = companiesSkillLevelForMax(minCo);
    const currentSkill = player.levels.companies || 0;
    items.push({
      what: `Unlock ${needSlots} more company slot${needSlots > 1 ? 's' : ''}`,
      detail: `Level the Companies skill from ${currentSkill} to ${targetSkill} (in your skill tree). Requires leveling up to earn SP.`,
      cost: 'none',
      tone: 'warn',
    });
  }

  const targetBuilt = Math.min(minCo, player.eco.companies);
  if (comps.length < targetBuilt) {
    const need = targetBuilt - comps.length;
    const available = player.eco.companies - comps.length;
    items.push({
      what: `Build ${need} more compan${need > 1 ? 'ies' : 'y'}`,
      detail: `You have ${comps.length} built and ${available} unused slot${available > 1 ? 's' : ''}. Pick profitable items (raw materials for steady income, processed for higher margin).`,
      cost: 'none',
      tone: 'warn',
    });
  }

  const lowAe = comps.filter(c => c.aeLevel < minAe);
  if (lowAe.length > 0) {
    const names = lowAe.map(c => `${c.name} (AE ${c.aeLevel})`).join(', ');
    items.push({
      what: `Upgrade ${lowAe.length} compan${lowAe.length > 1 ? 'ies' : 'y'} to AE ${minAe}`,
      detail: `Below target: ${names}.`,
      cost: 'none',
      tone: 'warn',
    });
  }

  return { items, note: f.note || '' };
}

function computeGearNeeds(eq, preset, prices, params) {
  const items = [];
  let total = 0;
  let anyMissing = false;
  const slots = ['weapon', 'helmet', 'chest', 'pants', 'boots', 'gloves'];

  for (const slot of slots) {
    const targetRarity = preset.gear[slot];
    const targetCode = itemCode(slot, targetRarity);
    let qty = 0;
    let detail = '';

    if (preset.gearModel === 'per-day') {
      const perDay = preset.gearPerDay?.[slot] || 0;
      qty = Math.ceil(perDay * params.warDays);
      detail = `${perDay}/day × ${params.warDays} days — replaces gear as it breaks`;
    } else {
      const currentCode = eq?.[slot]?.code;
      const currentRarity = rarityFromCode(currentCode);
      const needUpgrade = !currentRarity || rarityIndex(currentRarity) < rarityIndex(targetRarity);
      if (needUpgrade) {
        qty = 1;
        detail = currentRarity
          ? `Upgrade from ${RARITY_LABEL[currentRarity]} ${SLOT_LABEL[slot]}`
          : `No ${SLOT_LABEL[slot].toLowerCase()} equipped`;
      }
    }

    if (qty > 0) {
      const price = prices?.[targetCode];
      const unit = price != null ? Number(price) : null;
      const line = unit != null ? unit * qty : null;
      if (unit == null) anyMissing = true;
      if (line != null) total += line;
      items.push({ slot, targetCode, targetRarity, qty, unit, line, detail });
    }
  }

  return { items, total, anyMissing };
}

function computeConsumables(preset, prices, player, params) {
  const days = params.warDays;
  const out = [];
  let total = 0;
  let anyMissing = false;

  const push = (cons, qty, detail) => {
    if (!cons || qty <= 0) return;
    const price = prices?.[cons.code];
    const unit = price != null ? Number(price) : null;
    const line = unit != null ? unit * qty : null;
    if (unit == null) anyMissing = true;
    if (line != null) total += line;
    out.push({ kind: cons.kind, code: cons.code, label: cons.label, qty, unit, line, detail });
  };

  if (preset.consumablesModel === 'pill-push') {
    const per = preset.consumablesPerDay;
    push(CONSUMABLES[preset.buffs.ammo], per.ammo * days, `${per.ammo}/day × ${days} days — heavy pill-push consumption`);
    push(CONSUMABLES[preset.buffs.food], per.food * days, `${per.food}/day × ${days} days — eaten at full hunger before pill`);
    push(CONSUMABLES.pill,               per.pill * days, `${per.pill}/day × ${days} days`);
  } else {
    const hitsPerDay = effectiveHitsPerDay(player, params);
    const totalHits = hitsPerDay * days;
    const hunger = player?.derived?.hunger || 4;
    push(CONSUMABLES[preset.buffs.ammo], totalHits, `1 per hit × ${fmt(hitsPerDay, 1)} hits/day × ${days} days`);
    push(CONSUMABLES[preset.buffs.food], Math.ceil(totalHits / hunger), `1 per ${hunger} hits (Hunger skill) × ${totalHits} hits`);
    if (preset.buffs.pill) push(CONSUMABLES.pill, days * params.pillsPerDay, `${params.pillsPerDay}/day × ${days} days`);
  }

  return { items: out, total, days, anyMissing };
}

function computeTargetStats(preset, militaryRankPercent = 0) {
  const g = preset.gear, b = preset.buffs;
  const gs = r => GEAR_STATS[r];

  const weaponAtk  = midpoint(gs(g.weapon).weapon.attack);
  const weaponCrit = midpoint(gs(g.weapon).weapon.crit);
  const helmetCD   = midpoint(gs(g.helmet).helmet.critDamage);
  const chestArm   = midpoint(gs(g.chest).chest.armor);
  const pantsArm   = midpoint(gs(g.pants).pants.armor);
  const bootsDdg   = midpoint(gs(g.boots).boots.dodge);
  const glovesPrc  = midpoint(gs(g.gloves).gloves.precision);

  const pillMult = b.pill ? BUFFS.pill.damageMult : 1;
  const ammoMult = BUFFS.ammo[b.ammo] ?? 1;
  const foodHp   = BUFFS.food[b.food] ?? 0;
  const rankMult = 1 + militaryRankPercent / 100;

  const armRaw = chestArm + pantsArm;
  const ddgRaw = bootsDdg;

  return {
    atk: (100 + weaponAtk) * ammoMult * pillMult * rankMult,
    prc: 50 + glovesPrc,
    cc:  10 + weaponCrit,
    cd:  100 + helmetCD,
    armRaw,
    arm: armRaw / (armRaw + 40) * 100,
    ddgRaw,
    ddg: ddgRaw / (ddgRaw + 40) * 100,
    hp:  100 * (1 + foodHp),
  };
}

function computeDailyDuringWar(preset, prices, player, data, params, consumables) {
  const comps = extractCompanies(data);

  const consumablesDaily = (consumables?.total || 0) / Math.max(1, params.warDays);
  const factoryRevenue = comps.reduce((s, c) => s + (c.dailyRevenue || 0), 0);
  const factoryWageCost = comps.reduce((s, c) => s + (c.dailyWageCost || 0), 0);
  const factoryIngCost = comps.reduce((s, c) => s + (c.dailyIngredientCost || 0), 0);
  const factoryNet = factoryRevenue - factoryWageCost - factoryIngCost;
  const factoriesHaveRevenue = comps.some(c => c.dailyRevenue != null);
  const factoriesHaveWage = comps.some(c => c.dailyWageCost != null);

  const ownWage = offerWage(data.ownWorkOffer);
  const workActionsPeace = actionsPerDay(player.eco.energy);
  const wageIncomePeace = ownWage != null ? ownWage * workActionsPeace : null;

  const peaceNet = (wageIncomePeace ?? 0) + factoryNet;
  const warNet   = factoryNet - consumablesDaily;
  const burnRate = peaceNet - warNet;

  return {
    consumablesDaily,
    factoryRevenue, factoryWageCost, factoryIngCost, factoryNet,
    factoriesHaveRevenue, factoriesHaveWage,
    ownWage, workActionsPeace,
    wageIncomePeace,
    peaceNet, warNet, burnRate,
    hasOwnWage: ownWage != null,
    consumableLines: consumables?.items || [],
  };
}

function actionsPerDay(bar, usagePct = 1) {
  return Math.floor(bar / 10) * 2.4 * usagePct;
}

function effectiveHitsPerDay(player, params) {
  if (params.hitsPerDay != null && !isNaN(params.hitsPerDay) && params.hitsPerDay >= 0) {
    return params.hitsPerDay;
  }
  return Math.round(actionsPerDay(player.eco.energy));
}

function skillRow(label, value) {
  return `<div class="skill"><span class="skill-name">${label}</span><span class="skill-value">${value}</span></div>`;

const STAT_LABELS = {
  attack: 'attack', criticalChance: 'crit chance', criticalDamages: 'crit damage',
  armor: 'armor', dodge: 'dodge', precision: 'precision',
};

function equipmentTable(eq) {
  const slots = [
    ['weapon', 'Weapon', ['attack', 'criticalChance']],
    ['helmet', 'Helmet', ['criticalDamages']],
    ['chest',  'Chest',  ['armor']],
    ['pants',  'Pants',  ['armor']],
    ['boots',  'Boots',  ['dodge']],
    ['gloves', 'Gloves', ['precision']],
  ];
  const rows = slots.map(([key, label, statKeys]) => {
    const item = eq[key];
    if (!item) return `<tr class="empty"><td>${label}</td><td colspan="3">empty</td></tr>`;
    const statStr = statKeys
      .map(sk => { const v = item.skills[sk]; return v ? `${fmtInt(v)} ${STAT_LABELS[sk] || sk}` : null; })
      .filter(Boolean).join(', ') || '–';
    /* Item cell: plain name (no rarity color) + small rarity tag after. */
    const nameCell = item.rarity
      ? `${escapeHtml(item.displayName)}${rarityTag(item.rarity)}`
      : `<span class="mono">${escapeHtml(item.code)}</span>`;
    return `<tr>
      <td>${label}</td>
      <td>${nameCell}</td>
      <td>${statStr}</td>
      <td class="num">${item.durability != null ? fmtInt(item.durability) + '%' : '–'}</td>
    </tr>`;
  });
  return `<table class="list">
    <thead><tr><th>Slot</th><th>Item</th><th>Stat</th><th>Durability</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

/* Wealth section — surfaces user.stats.wealth (breakdown of your net
   worth) and case-opening history. All data comes from user.getUserById,
   no extra API call needed. */
function wealthSection(data) {
  const stats = data.user?.stats || {};
  const wealth = stats.wealth;

  let wealthHtml = '';
  if (!wealth || typeof wealth !== 'object') {
    wealthHtml = `<p class="muted" style="font-size:0.82rem; margin:0;">Wealth data unavailable.</p>`;
  } else {
    const rows = [
      ['Companies', wealth.companies],
      ['Items',     wealth.items],
      ['Money',     wealth.money],
      ['Equipment', wealth.equipments],
      ['Weapons',   wealth.weapons],
    ].filter(([, v]) => v != null);

    const tbody = rows.map(([label, value]) => `
      <tr>
        <td>${label}</td>
        <td class="num">${fmtBtc(value)}</td>
      </tr>
    `).join('');

    wealthHtml = `<table class="list"><tbody>
      ${tbody}
      <tr class="total">
        <td><strong>Total</strong></td>
        <td class="num"><strong>${fmtBtc(wealth.total)}</strong></td>
      </tr>
    </tbody></table>`;
  }

  // Case-opening history — handy luck/drop tracker.
  const caseEntries = [];
  ['case1', 'case2'].forEach(key => {
    const c = stats[key];
    if (!c || !c.openedCount) return;
    const rarity = c.byRarity || {};
    const parts = ['common','uncommon','rare','epic','legendary','mythic']
      .filter(r => rarity[r] > 0)
      .map(r => `${rarity[r]} ${r}`)
      .join(', ');
    caseEntries.push({ label: key === 'case1' ? 'Common cases' : 'Premium cases', opened: c.openedCount, parts });
  });

  let casesHtml = '';
  if (caseEntries.length) {
    const rows = caseEntries.map(c => `
      <tr>
        <td>${c.label}</td>
        <td class="num">${fmtInt(c.opened)}</td>
        <td>${escapeHtml(c.parts || '—')}</td>
      </tr>
    `).join('');
    casesHtml = `
      <div style="margin-top: 0.7rem;">
        <div style="color: var(--dimmer); font-size: 0.74rem; font-weight: 500; margin-bottom: 0.3rem;">Cases opened</div>
        <table class="list">
          <thead><tr><th>Type</th><th>Opened</th><th>Drops</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  return wealthHtml + casesHtml;
}

  if (c.workers && c.workers.length) {
    const fidList = c.workers.map(w => `fid ${w.fidelity} @ ${fmt(w.wage, 3)} ₿/act`).join(', ');
    rows.push({ term: 'Workers', desc: `${c.workers.length} (${fidList}) → +${fmtInt(c.workerPP)} units/day, wages ${fmtBtc(c.dailyWageCost)}/day` });
  } else if (c.workerCount > 0) {
    rows.push({ term: 'Workers', desc: `${c.workerCount} worker(s), details not loaded — estimated +${fmtInt(c.workerPP)} units/day at 0 fidelity` });
  } else {
    rows.push({ term: 'Workers', desc: 'None' });
  }

  if (c.dailyOutput) rows.push({ term: 'Total output', desc: `${fmtInt(c.dailyOutput)} units/day` });

  if (c.marketPrice != null) {
    rows.push({ term: 'Revenue', desc: `${fmt(c.marketPrice, 3)} ₿ × ${fmtInt(c.dailyOutput)} = ${fmtBtc(c.dailyRevenue)}/day` });
  } else {
    rows.push({ term: 'Revenue', desc: 'Market price unavailable' });
  }

  if (c.isProcessed) {
    if (c.dailyIngredientCost != null) {
      const recipeStr = c.recipeBreakdown.map(r => `${r.qty}× ${r.ingredient}`).join(' + ');
      rows.push({ term: 'Ingredients', desc: `${recipeStr} → −${fmtBtc(c.dailyIngredientCost)}/day` });
    } else {
      rows.push({ term: 'Ingredients', desc: 'Some ingredient prices unavailable' });
    }
  }

  if (c.dailyNet != null) rows.push({ term: 'Net', desc: `${fmtSigned(c.dailyNet)}/day` });
  return rows;
}

function companiesTable(comps) {
  if (!comps.length) return `<p class="muted" style="font-size:0.85rem; margin:0;">No companies found.</p>`;
  const rows = comps.map(c => {
    const revCol = c.dailyRevenue != null
      ? `<td class="num">${fmtBtc(c.dailyRevenue)}</td>`
      : `<td class="num muted">–</td>`;
    const netCol = c.dailyNet != null
      ? `<td class="${c.dailyNet >= 0 ? 'pos' : 'neg'}">${fmtSigned(c.dailyNet)}</td>`
      : `<td class="num muted">–</td>`;
    return `<tr>
      <td>${escapeHtml(c.name)}&nbsp;${infoBtn(companyBreakdownRows(c), c.name + ' breakdown')}</td>
      <td class="mono">${escapeHtml(c.itemCode)}</td>
      <td>${c.aeLevel ? 'AE ' + c.aeLevel : '–'}</td>
      <td class="num">${c.workerCount}</td>
      ${revCol}
      ${netCol}
    </tr>`;
  });
  return `<table class="list">
    <thead><tr>
      <th>Name</th><th>Item</th><th>Engine</th>
      <th>Workers</th><th>Revenue</th><th>Net</th>
    </tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

/* ═══════════════════════════════════════════════════════════════════
 *  RENDER — TARGET BUILD SECTION
 * ═══════════════════════════════════════════════════════════════════ */
function renderTargetBuild(p, data) {
  const preset = PRESETS[selectedPreset];
  const target = computeTargetStats(preset, p.militaryRankPercent);
  const current = p.derived;
  const eq = extractEquipment(data.inventory);
  const comps = extractCompanies(data);
  const havePrices = !!data.prices && Object.keys(data.prices).length > 0;

  const foundations = computeFoundations(p, comps, preset);
  const gearNeeds = computeGearNeeds(eq, preset, data.prices, warParams);
  const consumables = computeConsumables(preset, data.prices, p, warParams);
  const daily = computeDailyDuringWar(preset, data.prices, p, data, warParams, consumables);

  const hitsToday = effectiveHitsPerDay(p, warParams);
  const hitsAutoDerived = warParams.hitsPerDay == null;

  $('#target-content').innerHTML = `
    <div class="picker">
      ${Object.entries(PRESETS).map(([key, ps]) => `
        <button type="button" data-preset="${key}" class="${key === selectedPreset ? 'active' : ''}">${escapeHtml(ps.name)}</button>
      `).join('')}
    </div>
    <p class="preset-tagline">${escapeHtml(preset.tagline)}</p>
    ${preset.outcome ? `<p class="preset-outcome"><strong>Outcome</strong>${escapeHtml(preset.outcome)}</p>` : ''}

    ${warParamsBar(p, preset, hitsToday, hitsAutoDerived)}

    <div class="grid">
      <div class="card">
        <h3>
          <span>Target combat</span>
          <span class="badge">${fmtInt(target.atk)} attack</span>
        </h3>
        ${targetStatsBlock(target, current)}
        <div class="section">
          <div class="section-label">Active during fighting</div>
          <p class="placeholder-text">${escapeHtml(describeBuffs(preset.buffs))}</p>
        </div>
      </div>

      <div class="card">
        <h3><span>What to do</span></h3>
        ${actionPlanSection(foundations, gearNeeds, consumables, preset, havePrices)}
      </div>
    </div>

    <div class="card" style="margin-top: 1rem;">
      <h3><span>Daily during war</span><span class="badge">${fmtSigned(daily.warNet - 0)}/day net</span></h3>
      ${dailyDuringWarSection(daily, havePrices, warParams, preset)}
    </div>
  `;

  $$('#target-content .picker button').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedPreset = btn.dataset.preset;
      renderTargetBuild(p, data);
    });
  });

  const wDays = $('#war-days');
  const wHits = $('#war-hits');
  if (wDays) {
    wDays.addEventListener('change', () => {
      const v = parseInt(wDays.value, 10);
      warParams.warDays = isNaN(v) || v < 1 ? DEFAULT_WAR_PARAMS.warDays : v;
      renderTargetBuild(p, data);
    });
  }
  if (wHits) {
    wHits.addEventListener('change', () => {
      const raw = wHits.value.trim();
      if (raw === '' || raw === 'auto') warParams.hitsPerDay = null;
      else {
        const v = parseInt(raw, 10);
        warParams.hitsPerDay = isNaN(v) || v < 0 ? null : v;
      }
      renderTargetBuild(p, data);
    });
  }
}

function warParamsBar(player, preset, hitsToday, hitsAutoDerived) {
  const hitsTip = [
    { term: 'Auto', desc: `Derived from your Energy (${player.eco.energy} → ${Math.round(actionsPerDay(player.eco.energy))} actions/day).` },
    { term: 'Sustainable build', desc: 'Hits/day drives ammo and food quantities.' },
    { term: 'Hard push', desc: 'Hits/day is ignored — pill push uses fixed daily consumption per the preset.' },
  ];
  const hitsDisabled = preset.hitsFieldEnabled === false;
  return `<div class="war-params">
    <label>War days
      <input id="war-days" type="number" min="1" max="30" value="${warParams.warDays}">
    </label>
    <label class="${hitsDisabled ? 'disabled' : ''}">Hits/day
      <input id="war-hits" type="number" min="0" max="500" value="${hitsToday}" placeholder="auto" ${hitsDisabled ? 'disabled' : ''}>
      ${hitsDisabled ? '<span class="auto-tag">(not used)</span>' : (hitsAutoDerived ? '<span class="auto-tag">(from energy)</span>' : '')}
    </label>
    ${infoBtn(hitsTip, 'War parameters')}
  </div>`;
}

function describeBuffs(buffs) {
  const parts = [];
  if (buffs.pill) parts.push('Pill (+60% damage)');
  const ammoLabel = { light: 'Light Ammo (+10% damage)', ammo: 'Medium Ammo (+20% damage)', heavy: 'Heavy Ammo (+40% damage)' }[buffs.ammo];
  if (ammoLabel) parts.push(ammoLabel);
  const foodLabel = { bread: 'Bread (+10% health)', steak: 'Steak (+15% health)', fish: 'Salmon (+20% health)' }[buffs.food];
  if (foodLabel) parts.push(foodLabel);
  return parts.length ? parts.join(' · ') : 'No active buffs';
}

function targetStatsBlock(target, current) {
  const stat = (label, t, c, suffix = '') => {
    const tv = Math.round(t);
    const cv = Math.round(c);
    const delta = tv - cv;
    const sign = delta > 0 ? '+' : '';
    const deltaStr = delta === 0 ? '' : `<span class="delta">${sign}${fmtInt(delta)}${suffix}</span>`;
    return `<div class="stat">
      <span class="stat-label">${label}</span>
      <span class="stat-value">${fmtInt(tv)}${suffix}${deltaStr}</span>
    </div>`;
  };
  return `<div class="stats">
    ${stat('Attack', target.atk, current.atk)}
    ${stat('Precision', target.prc, current.prc, '%')}
    ${stat('Crit chance', target.cc, current.cc, '%')}
    ${stat('Crit damage', target.cd, current.cd, '%')}
    ${stat('Armor', target.arm, current.arm, '%')}
    ${stat('Dodge', target.ddg, current.ddg, '%')}
    ${stat('Health', target.hp, current.hp)}
  </div>`;
}

function actionPlanSection(foundations, gearNeeds, consumables, preset, havePrices) {
  const gearTotal = gearNeeds.total || 0;
  const consumablesTotal = consumables.total || 0;
  const grandTotal = gearTotal + consumablesTotal;

  let foundationsHtml = '';
  if (foundations.items.length === 0) {
    foundationsHtml = `<div class="action-list"><div class="action-row ok-row">
      <div class="action-main">
        <span class="action-what">✓ Foundations ready</span>
        ${foundations.note ? `<span class="action-detail">${escapeHtml(foundations.note)}</span>` : ''}
      </div>
    </div></div>`;
  } else {
    foundationsHtml = `<div class="action-list">${foundations.items.map(actionRow).join('')}</div>
      ${foundations.note ? `<p class="note">${escapeHtml(foundations.note)}</p>` : ''}`;
  }

  let gearHtml;
  if (gearNeeds.items.length === 0) {
    gearHtml = `<p class="placeholder-text ok">✓ No gear to acquire.</p>`;
  } else {
    const rows = gearNeeds.items.map(it => actionRow({
      /* Gear row: plain item name + rarity tag, then quantity. */
      what: `${escapeHtml(gearItemName(it.slot, it.targetRarity))}${rarityTag(it.targetRarity)} × ${fmtInt(it.qty)}`,
      detail: it.detail,
      cost: it.line != null ? it.line : null,
    })).join('');
    gearHtml = `<div class="action-list">${rows}</div>
      ${gearNeeds.anyMissing ? '<p class="note">Some gear prices not in market data — those lines show "price unknown" and aren\'t in the total.</p>' : ''}`;
  }

  let consumablesHtml;
  if (consumables.items.length === 0) {
    consumablesHtml = `<p class="placeholder-text">No consumables needed for this build.</p>`;
  } else {
    const rows = consumables.items.map(it => actionRow({
      what: `${escapeHtml(it.label)} × ${fmtInt(it.qty)}`,
      detail: it.detail,
      cost: it.line != null ? it.line : null,
    })).join('');
    consumablesHtml = `<div class="action-list">${rows}</div>
      ${consumables.anyMissing ? '<p class="note">Some consumable prices missing — those lines aren\'t in the total.</p>' : ''}`;
  }

  return `
    <div class="section">
      <div class="section-label">1. Foundations</div>
      ${foundationsHtml}
    </div>

    <div class="section">
      <div class="section-label">2. Gear to acquire<span class="right">${gearTotal > 0 ? fmtBtc(gearTotal) : (gearNeeds.items.length ? 'no prices' : '—')}</span></div>
      ${gearHtml}
    </div>

    <div class="section">
      <div class="section-label">3. Consumables · ${consumables.days} day${consumables.days > 1 ? 's' : ''}<span class="right">${fmtBtc(consumablesTotal)}</span></div>
      ${consumablesHtml}
    </div>

    <div class="grand-total">
      <span>Total to prepare</span>
      <span class="mono">${fmtBtc(grandTotal)}${gearNeeds.anyMissing ? `<span class="muted-suffix">(some gear prices missing)</span>` : ''}</span>
    </div>
  `;
}

function dailyDuringWarSection(d, havePrices, params, preset) {
  const inLines = [];
  if (d.factoriesHaveRevenue) {
    inLines.push(`<div class="flow-line"><span class="ll">Company revenue</span><span class="lv pos">${fmtSigned(d.factoryRevenue)}</span></div>`);
  } else {
    inLines.push(`<div class="flow-line"><span class="ll">Company revenue</span><span class="lv unk">unavailable</span></div>`);
  }
  const moneyIn = d.factoriesHaveRevenue ? d.factoryRevenue : 0;

  const outLines = [];
  if (d.factoriesHaveWage && d.factoryWageCost > 0) {
    outLines.push(`<div class="flow-line"><span class="ll">Worker wages</span><span class="lv neg">${fmtSigned(-d.factoryWageCost)}</span></div>`);
  }
  if (d.factoryIngCost > 0) {
    outLines.push(`<div class="flow-line"><span class="ll">Ingredient costs</span><span class="lv neg">${fmtSigned(-d.factoryIngCost)}</span></div>`);
  }
  d.consumableLines.forEach(it => {
    if (it.linePerDay == null && it.line == null) return;
    const dailyValue = it.line != null ? it.line / Math.max(1, params.warDays) : it.linePerDay;
    outLines.push(`<div class="flow-line">
      <span class="ll">${escapeHtml(it.label)}<span class="qty">× ${fmt(it.qty / Math.max(1, params.warDays), 1)}/day</span></span>
      <span class="lv neg">${fmtSigned(-dailyValue)}</span>
    </div>`);
  });
  const moneyOut = (d.factoriesHaveWage ? d.factoryWageCost : 0)
                 + (d.factoryIngCost || 0)
                 + (d.consumablesDaily || 0);

  const wageNoteHtml = d.hasOwnWage
    ? `<div class="flow-note">
        <span>Working-for-others wage paused during war</span>
        <span class="lv unk">peace: ${fmtSigned(d.wageIncomePeace)}/day</span>
      </div>`
    : '';

  const netDay = moneyIn - moneyOut;
  const netClass = netDay >= 0 ? 'positive' : 'negative';
  const burnVsPeace = d.peaceNet - netDay;
  const burnLabel = burnVsPeace >= 0
    ? `${fmtBtc(burnVsPeace)}/day worse than peace`
    : `${fmtBtc(-burnVsPeace)}/day better than peace`;

  const tipRowsArr = [
    { term: 'Money in', desc: 'Companies keep producing during war — revenue continues.' },
    { term: 'Money out', desc: 'Worker wages + ingredient costs (factory costs) + your consumables (ammo, food, pills) burned per day.' },
    { term: 'Paused', desc: 'Working-for-others wage stops because your Energy goes to fighting instead.' },
    { term: 'Note', desc: 'Doesn\'t count loot sales (cases, scrap) — those add income during war.' },
  ];

  return `
    <p class="note" style="margin-top: 0;">Bitcoin flow per day while fighting. ${escapeHtml(burnLabel)}. ${infoBtn(tipRowsArr).replace(/^/, '')}</p>
    <div class="war-flow">
      <div class="flow-block">
        <h5>Money in</h5>
        ${inLines.join('')}
        <div class="flow-line flow-subtotal">
          <span class="ll">Total in</span>
          <span class="lv pos">${fmtSigned(moneyIn)}</span>
        </div>
      </div>
      <div class="flow-block">
        <h5>Money out</h5>
        ${outLines.length ? outLines.join('') : `<div class="flow-line"><span class="ll">No costs</span><span class="lv">${fmtBtc(0)}</span></div>`}
        <div class="flow-line flow-subtotal">
          <span class="ll">Total out</span>
          <span class="lv neg">${fmtSigned(-moneyOut)}</span>
        </div>
      </div>
      ${wageNoteHtml}
      <div class="flow-net ${netClass}">
        <span>Net during war</span>
        <span class="mono">${fmtSigned(netDay)}/day</span>
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════════════
 *  STATUS / FLOW
 * ═══════════════════════════════════════════════════════════════════ */
function setStatus(kind, msg = '') {
  const el = $('#status');
  el.className = 'status' + (kind ? ' ' + kind : '');
  el.textContent = msg;
}

async function load(username) {
  if (!username) { setStatus('error', 'Enter a username.'); return; }
  setStatus('', `Resolving "${username}"…`);
  $('#load-btn').disabled = true;
  $('#player').classList.add('hidden');
  $('#debug-panel').classList.add('hidden');
  try {
    const userId = await resolveUserId(username);
    if (!userId) throw new Error(`No user found for "${username}"`);
    setStatus('', `Loading profile…`);
    const data = await loadPlayer(userId);
    renderPlayer(data);
    const newQs = new URLSearchParams();
    newQs.set('u', username);
    if (DEBUG) newQs.set('debug', '1');
    history.replaceState(null, '', '?' + newQs.toString());
    setStatus('ok', `Loaded ${data.user?.username || username}.`);
  } catch (e) {
    console.error(e);
    setStatus('error', e.message || String(e));
  } finally {
    $('#load-btn').disabled = false;
  }
}

$('#load-btn').addEventListener('click', () => load($('#username').value.trim()));
$('#username').addEventListener('keydown', e => {
  if (e.key === 'Enter') load($('#username').value.trim());
});

const initialU = QS.get('u');
if (initialU) {
  $('#username').value = initialU;
  load(initialU);
} else {
  $('#username').focus();
}

if (DEBUG) console.log('Debug mode on. Add ?debug=1 to URL.');
</script>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>War Readiness · we-ie.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d10;
    --surface: #14181d;
    --surface-2: #1c2128;
    --border: #2a313a;
    --border-strong: #3a424d;
    --text: #e8ecf0;
    --dim: #98a2b0;
    --dimmer: #6b7480;
    --accent: #4ad395;
    --accent-soft: rgba(74, 211, 149, 0.12);
    --warn: #f0c14b;
    --warn-soft: rgba(240, 193, 75, 0.12);
    --error: #f06060;
    --error-soft: rgba(240, 96, 96, 0.12);
    --rarity-common: #8b94a3;
    --rarity-uncommon: #4ad395;
    --rarity-rare: #5b8cff;
    --rarity-epic: #b87ddf;
    --rarity-legendary: #f0c14b;
    --rarity-mythic: #f06060;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-size: 15px;
  }

  .topbar { border-bottom: 1px solid var(--border); background: var(--surface); }
  .topbar-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0.9rem 1.5rem;
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .brand h1 { margin: 0; font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em; }
  .brand .accent { color: var(--accent); }
  .brand .sub { color: var(--dimmer); font-size: 0.85rem; }

  main {
    flex: 1;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .search-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
    flex-wrap: wrap;
  }
  .search-row input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.85rem;
    border-radius: 6px;
    font: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-row input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search-row button {
    background: var(--accent);
    border: 0;
    color: #07120c;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .search-row button:hover:not(:disabled) { background: #5fdfa6; }
  .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    min-height: 1.3rem;
    font-size: 0.85rem;
    color: var(--dim);
    margin-bottom: 1rem;
  }
  .status.error { color: var(--error); }
  .status.ok { color: var(--accent); }

  .player-head {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.85rem 1.1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 1rem;
  }
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    background: var(--surface-2);
    flex-shrink: 0;
    object-fit: cover;
  }
  .player-name { margin: 0 0 0.15rem 0; font-size: 1.05rem; font-weight: 600; }
  .player-meta { margin: 0; font-size: 0.85rem; color: var(--dim); }
  .pill {
    display: inline-block;
    padding: 0.08rem 0.5rem;
    background: var(--surface-2);
    border-radius: 4px;
    margin-right: 0.3rem;
    margin-bottom: 0.15rem;
    font-size: 0.78rem;
  }
  .pill .mono { font-family: var(--mono); }

  .section-title {
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--dimmer);
    margin: 1.25rem 0 0.5rem;
    padding-left: 0.1rem;
  }
  .section-title:first-of-type { margin-top: 0.25rem; }

  .compact-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.4rem;
  }
  .compact-card[open] { border-color: var(--border-strong); }
  .compact-card > summary {
    padding: 0.7rem 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    list-style: none;
    user-select: none;
  }
  .compact-card > summary::-webkit-details-marker { display: none; }
  .compact-card .caret {
    color: var(--dim);
    font-size: 0.8rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .compact-card:not([open]) .caret { transform: rotate(-90deg); }
  .cc-title { font-weight: 600; font-size: 0.92rem; flex-shrink: 0; }
  .cc-summary {
    color: var(--dim);
    font-size: 0.88rem;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .cc-summary .mono { font-family: var(--mono); }
  .cc-summary .pos { color: var(--accent); }
  .cc-summary .neg { color: var(--error); }
  .cc-pill {
    display: inline-block;
    padding: 0.1rem 0.55rem;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 600;
    font-family: var(--mono);
    color: var(--text);
    margin-right: 0.15rem;
  }
  .cc-pill.pos { background: var(--surface-2); border-color: var(--border); color: var(--text); }
  .cc-pill.neg { background: var(--error-soft); border-color: var(--error); color: var(--error); }
  .cc-pill.accent { background: var(--surface-2); border-color: var(--border); color: var(--text); }
  .cc-aux {
    color: var(--dimmer);
    font-family: var(--mono);
    font-size: 0.78rem;
    flex-shrink: 0;
  }
  .cc-body {
    padding: 0.9rem 1.1rem 1.1rem;
    border-top: 1px solid var(--border);
  }

  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 0.85rem;
  }
  @media (max-width: 520px) { .tabs { grid-template-columns: 1fr; } }
  .tab {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 0.9rem;
    cursor: pointer;
    text-align: left;
    font: inherit;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    transition: all 0.15s;
  }
  .tab:hover { border-color: var(--border-strong); }
  .tab.active {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  .tab-name { font-weight: 600; font-size: 0.95rem; }
  .tab.active .tab-name { color: var(--accent); }
  .tab-sub { font-size: 0.78rem; color: var(--dim); line-height: 1.35; }
  .tab-badge {
    display: inline-block;
    font-size: 0.66rem;
    font-weight: 600;
    padding: 0.08rem 0.45rem;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    align-self: flex-start;
    margin-top: 0.15rem;
  }
  .tab-badge.self-funding { background: var(--accent-soft); color: var(--accent); }
  .tab-badge.burns { background: var(--warn-soft); color: var(--warn); }

  .plan-control {
    display: flex;
    gap: 0.9rem;
    align-items: center;
    flex-wrap: wrap;
    padding: 0.65rem 0.9rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.8rem;
    font-size: 0.86rem;
  }
  .plan-control label {
    color: var(--dim);
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
  }
  .plan-control select,
  .plan-control input[type=number] {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.3rem 0.55rem;
    border-radius: 4px;
    font: inherit;
    font-family: var(--mono);
  }
  .plan-control input[type=number] { width: 60px; text-align: right; -moz-appearance: textfield; appearance: textfield; }
  .plan-control input[type=number]::-webkit-inner-spin-button,
  .plan-control input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .plan-control select:focus,
  .plan-control input:focus { outline: none; border-color: var(--accent); }
  .plan-note {
    color: var(--warn);
    font-size: 0.78rem;
    font-style: italic;
    flex-basis: 100%;
    margin: 0.1rem 0 0;
  }

  .grand-banner {
    margin-bottom: 0.85rem;
    padding: 0.85rem 1.1rem;
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.5rem;
    font-weight: 600;
    color: var(--accent);
  }
  .grand-banner .mono { font-family: var(--mono); font-size: 1.05rem; }
  .grand-banner .label { font-size: 0.95rem; }
  .grand-banner .sub { font-size: 0.75rem; font-weight: 400; color: var(--dim); font-style: italic; margin-top: 0.15rem; display: block; }

  .target-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.45rem;
  }
  .target-box.open { border-color: var(--border-strong); }
  .target-box-head {
    padding: 0.75rem 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    user-select: none;
  }
  .target-box-head .caret {
    color: var(--dim);
    font-size: 0.8rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .target-box:not(.open) .target-box-head .caret { transform: rotate(-90deg); }
  .target-box-num {
    font-family: var(--mono);
    color: var(--dimmer);
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .target-box-title {
    font-weight: 600;
    font-size: 0.92rem;
    flex-shrink: 0;
  }
  .target-box-summary {
    color: var(--dim);
    font-size: 0.85rem;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: right;
  }
  .target-box-summary .mono { font-family: var(--mono); }
  .target-box-summary .pos { color: var(--accent); }
  .target-box-summary .neg { color: var(--error); }
  .target-box-summary .warn { color: var(--warn); }
  .target-box-body { display: none; padding: 0 1.1rem 1.1rem; border-top: 1px solid var(--border); padding-top: 1rem; }
  .target-box.open .target-box-body { display: block; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }
  .stat {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.55rem 0.7rem;
    text-align: left;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 4.5em;
  }
  .stat-label {
    display: block;
    color: var(--dim);
    font-size: 0.72rem;
    line-height: 1.3;
    margin-bottom: 0.35rem;
    overflow-wrap: break-word;
    hyphens: auto;
  }
  .stat-value {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 0.95rem;
  }
  .delta {
    font-size: 0.68rem;
    font-weight: 400;
    margin-left: 0.25rem;
    font-family: var(--mono);
    white-space: nowrap;
    color: var(--dimmer);
  }

  .section { margin-top: 0.85rem; }
  .section:first-child { margin-top: 0; }
  .section-label {
    color: var(--dim);
    font-size: 0.78rem;
    margin-bottom: 0.5rem;
    font-weight: 500;
    display: flex;
    align-items: baseline;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .section-label .right {
    margin-left: auto;
    color: var(--text);
    font-family: var(--mono);
    font-weight: 400;
  }

  .skills { display: grid; gap: 0.25rem; font-size: 0.82rem; }
  .skill {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.6rem;
    padding: 0.35rem 0.55rem;
    background: var(--surface-2);
    border-radius: 4px;
  }
  .skill-name { color: var(--dim); }
  .skill-value { font-family: var(--mono); font-weight: 500; text-align: right; }
  .skill-value .sub { color: var(--dimmer); font-weight: 400; }
  .skill-value .total { color: var(--text); font-weight: 600; }

  .skill-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  @media (max-width: 600px) { .skill-cols { grid-template-columns: 1fr; } }

  .action-list { display: grid; gap: 0.35rem; }
  .action-row {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.5rem 0.7rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.6rem;
  }
  .action-row.warn { border-left: 3px solid var(--warn); }
  .action-row.ok-row { border-left: 3px solid var(--accent); }
  .action-main {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    min-width: 0;
    flex: 1;
  }
  .action-what {
    font-size: 0.86rem;
    color: var(--text);
    font-weight: 500;
  }
  .action-detail {
    color: var(--dim);
    font-size: 0.75rem;
  }
  .action-cost {
    font-family: var(--mono);
    font-size: 0.85rem;
    white-space: nowrap;
    flex-shrink: 0;
    color: var(--text);
    font-weight: 600;
    text-align: right;
  }
  .action-cost.unknown { color: var(--dimmer); font-style: italic; font-size: 0.78rem; font-weight: 400; }
  .action-cost.none { color: var(--dimmer); font-size: 0.78rem; font-weight: 400; }

  table.list { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  table.list th, table.list td {
    text-align: left;
    padding: 0.35rem 0.45rem;
    border-bottom: 1px solid var(--border);
  }
  table.list th {
    color: var(--dimmer);
    font-weight: 500;
    font-size: 0.76rem;
  }
  table.list td.mono { font-family: var(--mono); }
  table.list td.num { text-align: right; font-family: var(--mono); white-space: nowrap; }
  table.list tr:last-child td { border-bottom: 0; }
  table.list tr.empty td { color: var(--dimmer); font-style: italic; }
  table.list td.pos { color: var(--accent); font-family: var(--mono); text-align: right; white-space: nowrap; }
  table.list td.neg { color: var(--error); font-family: var(--mono); text-align: right; white-space: nowrap; }

  .r-tag {
    display: inline-block;
    font-size: 0.56rem;
    font-weight: 600;
    padding: 0.02rem 0.32rem;
    border-radius: 3px;
    margin-left: 0.35rem;
    vertical-align: middle;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    line-height: 1.4;
  }
  .r-tag.common    { background: rgba(139,148,163,0.18); color: var(--rarity-common); }
  .r-tag.uncommon  { background: rgba(74,211,149,0.18); color: var(--rarity-uncommon); }
  .r-tag.rare      { background: rgba(91,140,255,0.20); color: var(--rarity-rare); }
  .r-tag.epic      { background: rgba(184,125,223,0.20); color: var(--rarity-epic); }
  .r-tag.legendary { background: rgba(240,193,75,0.20); color: var(--rarity-legendary); }
  .r-tag.mythic    { background: rgba(240,96,96,0.20); color: var(--rarity-mythic); }

  .placeholder-text {
    font-size: 0.83rem;
    color: var(--dim);
    margin: 0.25rem 0 0;
    padding: 0.5rem 0.7rem;
    background: var(--surface-2);
    border-radius: 6px;
    border-left: 2px solid var(--border-strong);
  }
  .placeholder-text.ok { color: var(--accent); border-color: var(--accent); }
  .placeholder-text.warn { color: var(--warn); border-color: var(--warn); }
  .placeholder-text.err { color: var(--error); border-color: var(--error); }

  .plan-list { display: grid; gap: 0.22rem; }
  .plan-row {
    background: var(--surface-2);
    border-radius: 4px;
    padding: 0.4rem 0.7rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.84rem;
  }
  .plan-row.done { opacity: 0.45; }
  .plan-row.next { border-left: 3px solid var(--accent); background: var(--accent-soft); }
  .plan-level {
    color: var(--dim);
    font-family: var(--mono);
    font-size: 0.76rem;
    min-width: 3.5em;
    flex-shrink: 0;
  }
  .plan-spend { flex: 1; color: var(--text); }
  .plan-badge {
    font-size: 0.56rem;
    font-weight: 600;
    padding: 0.04rem 0.36rem;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    flex-shrink: 0;
  }
  .plan-badge.done { background: rgba(139,148,163,0.18); color: var(--dimmer); }
  .plan-badge.next { background: var(--accent-soft); color: var(--accent); }

  .war-flow { display: grid; gap: 0.45rem; }
  .flow-block {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.55rem 0.75rem;
  }
  .flow-block h5 {
    margin: 0 0 0.35rem;
    font-size: 0.76rem;
    color: var(--dim);
    font-weight: 500;
  }
  .flow-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.82rem;
    padding: 0.16rem 0;
    gap: 0.5rem;
  }
  .flow-line .ll { color: var(--dim); flex: 1; }
  .flow-line .ll .qty { color: var(--dimmer); font-family: var(--mono); font-size: 0.74rem; margin-left: 0.3rem; }
  .flow-line .lv { font-family: var(--mono); white-space: nowrap; }
  .flow-line .lv.pos { color: var(--accent); }
  .flow-line .lv.neg { color: var(--error); }
  .flow-line .lv.unk { color: var(--dimmer); font-style: italic; font-size: 0.78rem; }
  .flow-subtotal {
    border-top: 1px solid var(--border);
    margin-top: 0.3rem;
    padding-top: 0.35rem;
    font-weight: 600;
  }
  .flow-net {
    margin-top: 0.45rem;
    padding: 0.6rem 0.85rem;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.92rem;
    font-weight: 600;
  }
  .flow-net.positive { background: var(--accent-soft); color: var(--accent); }
  .flow-net.negative { background: var(--error-soft); color: var(--error); }
  .flow-net .mono { font-family: var(--mono); }

  .bs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.7rem;
  }
  @media (max-width: 600px) { .bs-grid { grid-template-columns: 1fr; } }
  .bs-block {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.7rem 0.85rem;
  }
  .bs-block h5 {
    margin: 0 0 0.5rem;
    font-size: 0.76rem;
    color: var(--dim);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .bs-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.85rem;
    padding: 0.2rem 0;
    gap: 0.5rem;
  }
  .bs-line .ll { color: var(--dim); }
  .bs-line .lv { font-family: var(--mono); white-space: nowrap; font-weight: 500; }
  .bs-line .lv.pos { color: var(--accent); }
  .bs-line .lv.neg { color: var(--error); }
  .bs-line.total {
    border-top: 1px solid var(--border);
    margin-top: 0.3rem;
    padding-top: 0.4rem;
    font-weight: 600;
  }
  .bs-line.total .ll { color: var(--text); font-weight: 600; }

  .note {
    font-size: 0.78rem;
    color: var(--dimmer);
    font-style: italic;
    margin-top: 0.75rem;
  }
  .hidden { display: none !important; }
  .muted { color: var(--dim); }

  .info-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;

<script>

const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmt(n, d = 2) {
  if (n == null || isNaN(n)) return '–';
  return Number(n).toLocaleString(undefined, {
    minimumFractionDigits: d, maximumFractionDigits: d
  });
}
function fmtInt(n) {
  if (n == null || isNaN(n)) return '–';
  return Math.round(Number(n)).toLocaleString();
}
function fmtBtc(n, d = 2) { return n == null || isNaN(n) ? '–' : fmt(n, d) + ' ₿'; }
function fmtSigned(n, d = 2) {
  if (n == null || isNaN(n)) return '–';
  const sign = n > 0 ? '+' : '';
  return sign + fmt(n, d) + ' ₿';
}
function fmtCompact(n) {
  if (n == null || isNaN(n)) return '–';
  const abs = Math.abs(n);
  if (abs >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (abs >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return Math.round(n).toLocaleString();
}

function expectedDamagePerHit(d, rankPct = 0, battleBonusPct = 0) {
  const atk = d.atk || 0;
  const prc = (d.prc || 0) / 100;
  const cc  = (d.cc  || 0) / 100;
  const cdMult = 1 + (d.cd || 0) / 100;
  const rankMult = 1 + (rankPct || 0) / 100;
  const bonusMult = 1 + (battleBonusPct || 0) / 100;
  const baseAtk = atk * rankMult * bonusMult;
  const landed = prc * ((1 - cc) * baseAtk + cc * baseAtk * cdMult);
  const missed = (1 - prc) * baseAtk * 0.5;
  return landed + missed;
}
function flag(code) {
  if (!code || code.length !== 2) return '🏳️';
  return code.toUpperCase().split('').map(c =>
    String.fromCodePoint(c.charCodeAt(0) - 65 + 0x1F1E6)
  ).join('');
}

function tipRows(content) {
  if (typeof content === 'string') return `<span class="tip-row">${escapeHtml(content)}</span>`;
  return content.map(r => {
    if (typeof r === 'string') return `<span class="tip-row">${escapeHtml(r)}</span>`;
    return `<span class="tip-row"><strong>${escapeHtml(r.term)}</strong>${escapeHtml(r.desc)}</span>`;
  }).join('');
}
function infoBtn(content, label = 'More info') {
  return `<button class="info-btn" type="button" tabindex="0" aria-label="${escapeHtml(label)}">?<span class="tip">${tipRows(content)}</span></button>`;
}

function rarityTag(rarity) {
  if (!rarity) return '';

function actionRow({ what, detail, cost, tone }) {
  let costHtml;
  if (cost === 'none') costHtml = `<div class="action-cost none">no direct cost</div>`;
  else if (cost == null) costHtml = `<div class="action-cost unknown">price unknown</div>`;
  else costHtml = `<div class="action-cost">${fmtBtc(cost)}</div>`;
  const toneClass = tone ? ` ${tone}` : '';
  return `<div class="action-row${toneClass}">
    <div class="action-main">
      <span class="action-what">${what}</span>
      ${detail ? `<span class="action-detail">${detail}</span>` : ''}
    </div>
    ${costHtml}
  </div>`;
}

async function trpc(endpoint, params = {}) {
  const input = encodeURIComponent(JSON.stringify(params));
  const url = `${CFG.API}/${endpoint}?input=${input}`;
  if (DEBUG) console.log(`→ ${endpoint}`, params);
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${endpoint} HTTP ${res.status}`);
  const json = await res.json();
  if (DEBUG) console.log(`← ${endpoint}`, json);
  const item = Array.isArray(json) ? json[0] : json;
  if (item?.error) throw new Error(`${endpoint}: ${item.error.message || 'error'}`);
  const d = item?.result?.data;
  return d?.json ?? d ?? item;
}

function skillValueAt(name, level) {
  const lv = CFG_GAME?.skills?.[name]?.levels?.[level];
  return lv?.value ?? null;
}
function skillTotalCost(name, level) {
  const lv = CFG_GAME?.skills?.[name]?.levels?.[level];
  return lv?.totalCost ?? 0;
}
function skillSoftCap(name) {
  return CFG_GAME?.skills?.[name]?.softCap ?? null;
}
function pointsSpentFromCfg(levels, keys) {
  return keys.reduce((s, k) => s + skillTotalCost(k, levels[k] || 0), 0);
}

function itemFromCfg(code) {
  return CFG_GAME?.items?.[code] || null;
}
function ppPerOutput(code) {
  return itemFromCfg(code)?.productionPoints ?? 1;
}
function ingredientsFor(code) {
  return itemFromCfg(code)?.productionNeeds || {};
}
function isItemProcessed(code) {
  return Object.keys(ingredientsFor(code)).length > 0;
}
function pillDamageMult() {
  const pct = itemFromCfg('cocain')?.flatStats?.percentAttack ?? 0;
  return 1 + pct / 100;
}
function ammoDamageMult(code) {
  if (!code || code === 'none') return 1;
  const pct = itemFromCfg(code)?.flatStats?.percentAttack ?? 0;
  return 1 + pct / 100;
}
function foodHpMult(code) {
  if (!code || code === 'none') return 0;
  return (itemFromCfg(code)?.flatStats?.healthRegenPercent ?? 0) / 100;
}
function gearStatMid(code, statKey) {
  const range = itemFromCfg(code)?.dynamicStats?.[statKey];
  if (!Array.isArray(range)) return 0;
  return (range[0] + range[1]) / 2;
}
function aePPForLevel(level) {
  if (!level) return 0;
  return CFG_GAME?.upgradesConfig?.automatedEngine?.levels?.[level]?.stats?.dailyProd ?? 0;
}
function dailyMissionMoney() {
  return CFG_GAME?.mission?.reward?.daily?.money ?? 0;
}
function baseHealthCostPerHit() {
  return CFG_GAME?.battle?.healthCost ?? 0;
}
function hpCostPerHit(armorRaw) {
  const base = baseHealthCostPerHit();
  const soft = skillSoftCap('armor');
  if (!base || !soft) return base;
  const armorPct = armorRaw / (armorRaw + soft);
  return base * (1 - armorPct);
}

function fidelityProdBonusPct() {
  const w = CFG_GAME?.worker;
  if (!w) return 0;
  const v = w.fidelityProductionBonusPercent
        ?? w.fidelityProductionBonus
        ?? w.fidelityBonusPercent
        ?? w.fidelityBonus
        ?? null;
  if (v == null && DEBUG) {
    console.warn('[fidelityProdBonusPct] no known fidelity key on CFG_GAME.worker. Keys:', Object.keys(w));
  }
  return v ?? 0;
}
function fidelityConfigKnown() {
  const w = CFG_GAME?.worker;
  if (!w) return false;
  return w.fidelityProductionBonusPercent != null
      || w.fidelityProductionBonus != null
      || w.fidelityBonusPercent != null
      || w.fidelityBonus != null;
}

function actionsPerDay(bar) {
  if (!bar || !CFG_GAME) return 0;
  const regenDiv = CFG_GAME.user?.regenDividedBy ?? 10;
  const cost = CFG_GAME.user?.energyCostPerAction ?? 10;
  return (bar * 24 / regenDiv) / cost;
}

function companiesSkillLevelForMax(maxTarget) {
  const levels = CFG_GAME?.skills?.companies?.levels;
  if (!levels) throw new Error('companiesSkillLevelForMax: gameConfig.skills.companies.levels missing');
  const keys = Object.keys(levels).map(Number).sort((a, b) => a - b);
  for (const k of keys) {
    const v = levels[k]?.value;
    if (v == null) continue;
    if (v >= maxTarget) return k;
  }
  return null;
}

function projectSkillsAtLevel(currentLevels, plan, viewLevel) {
  const projected = { ...currentLevels };
  if (plan) {
    plan.forEach(step => {
      if (step.skill && step.level <= viewLevel) {
        projected[step.skill] = (projected[step.skill] || 0) + 1;
      }
    });
  }
  return projected;
}

async function resolveUserId(input) {
  const t = input.trim();
  if (!t) return null;
  if (/^[a-f0-9]{24}$/i.test(t)) return t;
  const r = await trpc('search.searchAnything', { searchText: t });
  const userIds = r?.userIds || [];
  if (!userIds.length) return null;
  return userIds[0];
}

async function loadPlayer(userId) {
  const [user, inventory, companyList, pricesR, workersR, gameConfigR] = await Promise.allSettled([
    trpc('user.getUserById', { userId }),
    trpc('inventory.fetchCurrentEquipment', { userId }),
    trpc('company.getCompanies', { userId, perPage: 50 }),
    trpc('itemTrading.getPrices'),
    trpc('worker.getWorkers', { userId }),
    trpc('gameConfig.getGameConfig'),
  ]);

  CFG_GAME = gameConfigR.status === 'fulfilled' ? gameConfigR.value : null;
  const cfgError = gameConfigR.status === 'rejected'
    ? String(gameConfigR.reason?.message || gameConfigR.reason)
    : (CFG_GAME ? null : 'gameConfig returned empty');

  const u = user.status === 'fulfilled' ? user.value : null;
  const ids = companyList.status === 'fulfilled' ? (companyList.value?.items || []) : [];

  const workersData = workersR.status === 'fulfilled' ? workersR.value : null;
  const workersByCompanyId = {};
  if (workersData?.workersPerCompany) {
    workersData.workersPerCompany.forEach(entry => {
      if (entry?.company?._id) {
        workersByCompanyId[entry.company._id] = entry.workers || [];
      }
    });
  }

  const secondary = await Promise.allSettled([
    ...ids.map(id => trpc('company.getById', { companyId: id })),
    u?.country ? trpc('country.getCountryById', { countryId: u.country }) : Promise.resolve(null),
    u?.mu ? trpc('mu.getById', { muId: u.mu }) : Promise.resolve(null),
    u?.company ? trpc('company.getById', { companyId: u.company }) : Promise.resolve(null),
  ]);

  const companies = secondary.slice(0, ids.length)
    .filter(r => r.status === 'fulfilled')
    .map(r => r.value);
  const country = secondary[ids.length]?.status === 'fulfilled' ? secondary[ids.length].value : null;
  const mu = secondary[ids.length + 1]?.status === 'fulfilled' ? secondary[ids.length + 1].value : null;
  const workplaceCompany = secondary[ids.length + 2]?.status === 'fulfilled' ? secondary[ids.length + 2].value : null;

  const workerUserIds = new Set();
  Object.values(workersByCompanyId).forEach(arr => {
    (arr || []).forEach(w => { if (w?.user) workerUserIds.add(w.user); });
  });
  const workerProfilesByUserId = {};
  if (workerUserIds.size) {
    const ids = [...workerUserIds];
    const results = await Promise.allSettled(
      ids.map(id => trpc('user.getUserById', { userId: id }))
    );
    results.forEach((r, i) => {
      if (r.status === 'fulfilled' && r.value) workerProfilesByUserId[ids[i]] = r.value;
    });
  }

  let ownWage = null;
  let ownFidelity = null;
  if (workplaceCompany?.user) {
    try {
      const ownerWorkers = await trpc('worker.getWorkers', { userId: workplaceCompany.user });
      if (ownerWorkers?.workersPerCompany) {
        const entry = ownerWorkers.workersPerCompany.find(e => e?.company?._id === workplaceCompany._id);
        const myRecord = entry?.workers?.find(w => w.user === userId);
        if (myRecord) {
          ownWage = Number(myRecord.wage);
          ownFidelity = Number(myRecord.fidelity);
        }
      }
    } catch (e) {
      if (DEBUG) console.warn('Failed to fetch workplace workers:', e);
    }
  }

  let workplaceCountry = null;
  if (workplaceCompany?.region) {
    try {
      const workplaceRegion = await trpc('region.getRegionById', { regionId: workplaceCompany.region });
      const wrCountryId = workplaceRegion?.country || workplaceRegion?.countryId;
      if (wrCountryId && u?.country && wrCountryId !== u.country) {
        workplaceCountry = await trpc('country.getCountryById', { countryId: wrCountryId });
      }
    } catch (e) {
      if (DEBUG) console.warn('Failed to fetch workplace region/country:', e);
    }
  }

  return {
    userId,
    user: u,
    userError: user.status === 'rejected' ? String(user.reason?.message || user.reason) : null,
    inventory: inventory.status === 'fulfilled' ? inventory.value : null,
    inventoryError: inventory.status === 'rejected' ? String(inventory.reason?.message || inventory.reason) : null,
    companies,
    companiesError: companyList.status === 'rejected' ? String(companyList.reason?.message || companyList.reason) : null,
    country, mu,
    workplaceCompany,
    workplaceCountry,
    workersByCompanyId,
    workerProfilesByUserId,
    ownWage, ownFidelity,
    ownWorkOffer: ownWage != null ? { wage: ownWage, fidelity: ownFidelity, source: 'worker_record' } : null,
    prices: pricesR.status === 'fulfilled' ? normalizePrices(pricesR.value) : {},
    pricesError: pricesR.status === 'rejected' ? String(pricesR.reason?.message || pricesR.reason) : null,
    workersError: workersR.status === 'rejected' ? String(workersR.reason?.message || workersR.reason) : null,
    configError: cfgError,
  };
}

function normalizePrices(raw) {
  if (!raw) return {};
  if (Array.isArray(raw)) {
    const out = {};
    raw.forEach(item => {
      const code = item?.itemCode || item?.code || item?.item;
      const price = item?.price ?? item?.value;
      if (code && price != null) out[code] = price;
    });
    return out;
  }
  if (raw.prices && typeof raw.prices === 'object') return raw.prices;
  if (typeof raw === 'object') return raw;
  return {};
}

function offerWage(offer) {
  if (!offer || offer.wage == null || isNaN(offer.wage)) return null;
  return Number(offer.wage);
}

function extractPlayer(data) {

function extractEquipment(inv) {
  const slot = key => {
    const p = inv?.[key];
    if (!p) return null;
    const code = p.code ?? '?';
    const rarity = rarityFromCode(code);
    return {
      code, rarity,
      displayName: gearItemName(key, rarity),
      durability: p.state != null ? Math.round((p.state / (p.maxState || 100)) * 100) : null,
      skills: p.skills || {},
    };
  };
  return {
    weapon: slot('weapon'), helmet: slot('helmet'), chest: slot('chest'),
    pants: slot('pants'), boots: slot('boots'), gloves: slot('gloves'),
  };
}

function extractCompanies(data) {
  const items = Array.isArray(data.companies) ? data.companies : [];
  const prices = data.prices || {};
  const workersByCompany = data.workersByCompanyId || {};
  const workerProfiles = data.workerProfilesByUserId || {};
  const fidBonusPct = fidelityProdBonusPct();

  const marketTax = data.country?.taxes?.market || 0;
  const prodBonusPct = data.country?.strategicResources?.bonuses?.productionPercent || 0;
  const prodMult = 1 + prodBonusPct / 100;
  const marketMult = 1 - marketTax / 100;

  return items.map(co => {
    const id = co._id;
    const itemCodeStr = co.itemCode ?? '?';
    const workerCount = co.workerCount ?? 0;
    const aeLevel = co.activeUpgradeLevels?.automatedEngine ?? 0;
    const price = prices[itemCodeStr] != null ? Number(prices[itemCodeStr]) : null;
    const aePP = aePPForLevel(aeLevel) * prodMult;

    const workers = workersByCompany[id] || [];
    let workerPP = 0;
    let dailyWageCost = null;
    let workersIncomplete = false;
    const workerDetails = [];
    if (workers.length > 0) {
      let wageSum = 0;
      workers.forEach(w => {
        const fid = Number(w.fidelity) || 0;
        const wage = Number(w.wage) || 0;
        const profile = workerProfiles[w.user];
        const wEnergy = profile?.skills?.energy?.total ?? profile?.skills?.energy?.value ?? 0;
        const wProd   = profile?.skills?.production?.total ?? profile?.skills?.production?.value ?? 0;
        const actsPerDay = actionsPerDay(wEnergy);
        const rawPP = actsPerDay * wProd;
        const pp = rawPP * (1 + fid * fidBonusPct / 100) * prodMult;
        workerPP += pp;
        const dailyWage = wage * rawPP;
        wageSum += dailyWage;
        if (!profile) workersIncomplete = true;
        workerDetails.push({
          userId: w.user, fidelity: fid, wage, dailyWage, pp,
          energy: wEnergy, production: wProd, actionsPerDay: actsPerDay,
          hasProfile: !!profile,
        });
      });
      dailyWageCost = wageSum;
    } else if (workerCount > 0) {
      workersIncomplete = true;
    }

    const totalPP = aePP + workerPP;
    const ppPer = ppPerOutput(itemCodeStr);
    const ingredients = ingredientsFor(itemCodeStr);
    const processed = isItemProcessed(itemCodeStr);

    const dailyOutput = totalPP / Math.max(1, ppPer);
    const dailyRevenue = price != null ? dailyOutput * price * marketMult : null;

    const recipeBreakdown = [];
    let dailyIngredientCost = null;
    if (processed) {
      let allPriced = true;
      let cost = 0;
      for (const [ing, qty] of Object.entries(ingredients)) {
        const ingPrice = prices[ing] != null ? Number(prices[ing]) : null;
        recipeBreakdown.push({ ingredient: ing, qty, price: ingPrice });
        if (ingPrice == null) { allPriced = false; }
        else { cost += qty * dailyOutput * ingPrice; }
      }
      if (allPriced) dailyIngredientCost = cost;
    }

    const dailyNet = (dailyRevenue != null)
      ? dailyRevenue - (dailyWageCost || 0) - (dailyIngredientCost || 0)
      : null;

    return {
      id, name: co.name ?? '?',
      itemCode: itemCodeStr,
      aeLevel, aePP,
      storageLevel: co.activeUpgradeLevels?.storage ?? null,
      breakRoomLevel: co.activeUpgradeLevels?.breakRoom ?? null,
      stored: co.production ?? null,
      estimatedValue: co.estimatedValue ?? null,
      workerCount, workers: workerDetails, workerPP, workersIncomplete,
      isProcessed: processed, recipeBreakdown, dailyIngredientCost,
      marketPrice: price, dailyOutput, dailyRevenue, dailyWageCost, dailyNet,
      ppPer,
    };
  });
}

function buildLabel(player) {
  const fightSpent = pointsSpentFromCfg(player.levels, FIGHT_KEYS);
  const ecoSpent = pointsSpentFromCfg(player.levels, ECO_KEYS);
  const total = fightSpent + ecoSpent;
  if (total === 0) return { label: 'Unallocated', sub: 'No skill points spent' };
  const fightShare = fightSpent / total;
  const fp = Math.round(fightShare * 100);
  const ep = 100 - fp;
  if (fightShare > 0.75) return { label: 'Fight build', sub: `${fp}% fight / ${ep}% eco` };
  if (fightShare < 0.50) return { label: 'Eco build',   sub: `${fp}% fight / ${ep}% eco` };
  return                       { label: 'Hybrid build', sub: `${fp}% fight / ${ep}% eco` };
}

function effectiveHitsPerDay(player, params) {
  if (params.hitsPerDay != null && !isNaN(params.hitsPerDay) && params.hitsPerDay >= 0) {
    return params.hitsPerDay;
  }
  const energyCeiling = actionsPerDay(player.eco.energy);
  const hpPerHit = hpCostPerHit(player.derived.armRaw);
  const hp = player.derived.hp;
  if (!hpPerHit || !hp) return Math.round(energyCeiling);
  const hpCeiling = hp / hpPerHit;
  return Math.round(Math.min(energyCeiling, hpCeiling));
}

function computeFoundations(player, comps, preset) {
  const items = [];
  const f = preset.foundations || {};
  const minCo = f.minCompanies ?? 0;
  const minAe = f.minAe ?? 0;

  const slotShortfall = minCo - player.eco.companies;
  if (slotShortfall > 0) {
    const targetSkill = companiesSkillLevelForMax(minCo);
    const currentSkill = player.levels.companies || 0;
    const skillDetail = targetSkill != null
      ? `Level the Companies skill from ${currentSkill} to ${targetSkill}.`
      : `Companies skill table doesn't reach ${minCo} — your current cap is ${player.eco.companies}.`;
    items.push({
      what: `Unlock ${slotShortfall} more company slot${slotShortfall > 1 ? 's' : ''}`,
      detail: `${skillDetail} Requires leveling up to earn SP.`,
      cost: 'none', tone: 'warn',
    });
  }

  const buildShortfall = minCo - comps.length;
  if (buildShortfall > 0) {
    const unlockedButUnbuilt = player.eco.companies - comps.length;
    const buildableNow = Math.min(buildShortfall, unlockedButUnbuilt);
    const needsSlotsFirst = buildShortfall - buildableNow;
    let detail;
    if (buildableNow > 0 && needsSlotsFirst > 0) {
      detail = `Build ${buildableNow} now (you have unused slots), then ${needsSlotsFirst} more after unlocking slots above.`;
    } else if (buildableNow > 0) {
      detail = `You have ${unlockedButUnbuilt} unused slot${unlockedButUnbuilt > 1 ? 's' : ''} — build into them.`;
    } else {
      detail = `Unlock slots above first, then build ${buildShortfall} compan${buildShortfall > 1 ? 'ies' : 'y'}.`;
    }
    items.push({
      what: `Build ${buildShortfall} more compan${buildShortfall > 1 ? 'ies' : 'y'}`,
      detail,
      cost: 'none', tone: 'warn',
    });
  }

  const lowAe = comps.filter(c => c.aeLevel < minAe);
  if (lowAe.length > 0) {
    const names = lowAe.map(c => `${c.name} (AE ${c.aeLevel})`).join(', ');
    items.push({
      what: `Upgrade ${lowAe.length} compan${lowAe.length > 1 ? 'ies' : 'y'} to AE ${minAe}`,
      detail: `Below target: ${names}.`,
      cost: 'none', tone: 'warn',
    });
  }
  return { items, note: f.note || '', minCompanies: minCo, minAe };
}

function computeGearNeeds(eq, preset, prices, params) {
  const days = params.warDays;

  if (preset.gearModel === 'stockpile') {
    const items = preset.gearStockpile.map(g => {
      const code = itemCode(g.slot, g.rarity);
      const qty = Math.ceil(g.perDay * days);
      const price = prices?.[code];
      const unit = price != null ? Number(price) : null;
      const line = unit != null ? unit * qty : null;
      return {
        slot: g.slot, targetCode: code, targetRarity: g.rarity,
        qty, unit, line,
        detail: `${g.perDay}/day × ${days} day${days > 1 ? 's' : ''}`,
      };
    });
    const total = items.reduce((s, i) => s + (i.line || 0), 0);
    const anyMissing = items.some(i => i.unit == null);
    return { items, total, anyMissing };
  }

  const items = [];
  let total = 0;
  let anyMissing = false;
  const slots = ['weapon', 'helmet', 'chest', 'pants', 'boots', 'gloves'];

  for (const slot of slots) {
    const targetRarity = preset.gear[slot];
    const targetCode = itemCode(slot, targetRarity);
    let qty = 0;
    let detail = '';

    const currentCode = eq?.[slot]?.code;
    const currentRarity = rarityFromCode(currentCode);
    const needUpgrade = !currentRarity || rarityIndex(currentRarity) < rarityIndex(targetRarity);
    if (needUpgrade) {
      qty = 1;
      detail = currentRarity
        ? `Upgrade from ${RARITY_LABEL[currentRarity]} ${SLOT_LABEL[slot]}`
        : `No ${SLOT_LABEL[slot].toLowerCase()} equipped`;
    }

    if (qty > 0) {
      const price = prices?.[targetCode];
      const unit = price != null ? Number(price) : null;
      const line = unit != null ? unit * qty : null;
      if (unit == null) anyMissing = true;
      if (line != null) total += line;
      items.push({ slot, targetCode, targetRarity, qty, unit, line, detail });
    }
  }
  return { items, total, anyMissing };
}

function computeConsumables(preset, prices, player, params) {
  const days = params.warDays;
  const out = [];
  let total = 0;
  let anyMissing = false;

  const push = (cons, qty, detail) => {
    if (!cons || qty <= 0) return;
    const price = prices?.[cons.code];
    const unit = price != null ? Number(price) : null;
    const line = unit != null ? unit * qty : null;
    if (unit == null) anyMissing = true;
    if (line != null) total += line;
    out.push({ kind: cons.kind, code: cons.code, label: cons.label, qty, unit, line, detail });
  };

  if (preset.consumablesModel === 'pill-push') {
    const per = preset.consumablesPerDay;
    push(CONSUMABLES[preset.buffs.ammo], per.ammo * days, `${per.ammo}/day × ${days} day${days > 1 ? 's' : ''}`);
    push(CONSUMABLES[preset.buffs.food], Math.ceil(per.food * days), `${per.food}/day × ${days} day${days > 1 ? 's' : ''}`);
    if (preset.pillsTotal != null) {
      push(CONSUMABLES.pill, preset.pillsTotal, `${preset.pillsTotal} total per push (≈ 1 per pill day)`);
    }
  } else {
    const hitsPerDay = effectiveHitsPerDay(player, params);
    const totalHits = hitsPerDay * days;
    const hunger = player?.derived?.hunger;
    push(CONSUMABLES[preset.buffs.ammo], totalHits, `1 per hit × ${fmt(hitsPerDay, 1)} hits/day × ${days} days`);
    if (hunger && hunger > 0) {
      push(CONSUMABLES[preset.buffs.food], Math.ceil(totalHits / hunger), `1 per ${hunger} hits × ${totalHits} hits`);
    }
    if (preset.buffs.pill) push(CONSUMABLES.pill, days * params.pillsPerDay, `${params.pillsPerDay}/day × ${days} days`);
  }

  return { items: out, total, days, anyMissing };
}

function computeTargetStats(preset, militaryRankPercent = 0, battleBonusPctArg = 0) {
  const g = preset.gear, b = preset.buffs;

  const weaponAtk  = gearStatMid(itemCode('weapon', g.weapon), 'attack');
  const weaponCrit = gearStatMid(itemCode('weapon', g.weapon), 'criticalChance');
  const helmetCD   = gearStatMid(itemCode('helmet', g.helmet), 'criticalDamages');
  const chestArm   = gearStatMid(itemCode('chest',  g.chest),  'armor');
  const pantsArm   = gearStatMid(itemCode('pants',  g.pants),  'armor');
  const bootsDdg   = gearStatMid(itemCode('boots',  g.boots),  'dodge');
  const glovesPrc  = gearStatMid(itemCode('gloves', g.gloves), 'precision');

  const pillMult = b.pill ? pillDamageMult() : 1;
  const ammoMult = ammoDamageMult(CONSUMABLES[b.ammo]?.code);
  const foodHp   = foodHpMult(CONSUMABLES[b.food]?.code);
  const rankMult = 1 + militaryRankPercent / 100;
  const bonusMult = 1 + (battleBonusPctArg || 0) / 100;

  const baseAtk = skillValueAt('attack', 0);
  const basePrc = skillValueAt('precision', 0);
  const baseCC  = skillValueAt('criticalChance', 0);
  const baseCD  = skillValueAt('criticalDamages', 0);
  const baseHp  = skillValueAt('health', 0);
  const armSoft = skillSoftCap('armor');
  const ddgSoft = skillSoftCap('dodge');
  if (baseAtk == null || basePrc == null || baseCC == null || baseCD == null
      || baseHp == null || armSoft == null || ddgSoft == null) {
    throw new Error('computeTargetStats: missing required skill values in gameConfig — '
      + JSON.stringify({ baseAtk, basePrc, baseCC, baseCD, baseHp, armSoft, ddgSoft }));
  }

  const armRaw = chestArm + pantsArm;
  const ddgRaw = bootsDdg;

  return {
    atk: (baseAtk + weaponAtk) * ammoMult * pillMult * rankMult * bonusMult,
    prc: basePrc + glovesPrc,
    cc:  baseCC + weaponCrit,
    cd:  baseCD + helmetCD,
    armRaw, arm: armRaw / (armRaw + armSoft) * 100,
    ddgRaw, ddg: ddgRaw / (ddgRaw + ddgSoft) * 100,
    hp:  baseHp * (1 + foodHp),
  };
}

function computeDailyDuringWar(preset, prices, player, data, params, consumables) {
  const comps = extractCompanies(data);
  const consumablesDaily = (consumables?.total || 0) / Math.max(1, params.warDays);
  const factoryRevenue = comps.reduce((s, c) => s + (c.dailyRevenue || 0), 0);
  const factoryWageCost = comps.reduce((s, c) => s + (c.dailyWageCost || 0), 0);
  const factoryIngCost = comps.reduce((s, c) => s + (c.dailyIngredientCost || 0), 0);
  const factoryNet = factoryRevenue - factoryWageCost - factoryIngCost;
  const factoriesHaveRevenue = comps.some(c => c.dailyRevenue != null);
  const factoriesHaveWage = comps.some(c => c.dailyWageCost != null);

  const ownWage = offerWage(data.ownWorkOffer);
  const workActionsPeace = actionsPerDay(player.eco.energy);
  const playerProd = player.eco.production || 0;
  const workCountry = data.workplaceCountry || data.country;
  const incomeTax = workCountry?.taxes?.income || 0;
  const wageMod = (1 - incomeTax / 100);
  const wageIncomePeace = ownWage != null ? ownWage * workActionsPeace * playerProd * wageMod : null;

  const missionIncome = dailyMissionMoney();

  const peaceNet = (wageIncomePeace ?? 0) + factoryNet;
  const warNet   = factoryNet + missionIncome - consumablesDaily;

  return {
    consumablesDaily,
    factoryRevenue, factoryWageCost, factoryIngCost, factoryNet,
    factoriesHaveRevenue, factoriesHaveWage,
    ownWage, workActionsPeace, wageIncomePeace,
    missionIncome,
    peaceNet, warNet,
    consumableLines: consumables?.items || [],
  };
}

  }

}

    ${compactCard('income',
      `<span class="cc-title">Income</span>
       <span class="cc-summary"><span class="cc-pill ${incomeSign}">${fmtSigned(totalDailyIncome)}/day</span> <span class="muted">${comps.length} compan${comps.length === 1 ? 'y' : 'ies'}${dailyWageIncome > 0 ? ` + job (${fmtBtc(dailyWageIncome)})` : ''}</span></span>`,
      renderIncomeBody(p, data, comps, ownWage, dailyWageIncome, factoryNet)
    )}

    ${compactCard('wealth',
      `<span class="cc-title">Wealth</span>
      <span class="cc-summary"><span class="cc-pill">${wealthTotal != null ? fmtCompact(wealthTotal) + ' ₿' : 'unavailable'}</span></span>`,
      renderWealthBody(data)
    )}
  `;

  const bbInput = $('#battle-bonus-input');
  if (bbInput && !bbInput.dataset.bound) {
    bbInput.dataset.bound = '1';
    bbInput.addEventListener('input', () => {
      const v = parseFloat(bbInput.value);
      battleBonusPct = isNaN(v) || v < 0 ? 0 : v;

      const qs = new URLSearchParams(location.search);
      if (battleBonusPct > 0) qs.set('bb', String(battleBonusPct));
      else qs.delete('bb');
      history.replaceState(null, '', location.pathname + '?' + qs.toString());

      const currP = cached.player;
      if (!currP) return;
      const hitsPerDay = actionsPerDay(currP.eco.energy);
      const rankPct = currP.militaryRankPercent || 0;
      const expDmg = expectedDamagePerHit(currP.derived, rankPct, battleBonusPct);
      const expDmgNoBonus = expectedDamagePerHit(currP.derived, rankPct, 0);
      const dmgPerDay = expDmg * hitsPerDay;

      const damageCard = document.querySelector('#state-content details.compact-card[data-card="damage"]');
      if (damageCard) {
        const pill = damageCard.querySelector('summary .cc-pill');
        if (pill) pill.textContent = `${fmtCompact(dmgPerDay)} dmg/day`;
        const labels = damageCard.querySelectorAll('.section-label .right');
        if (labels[0]) {
          labels[0].innerHTML = `${fmtInt(expDmg)} dmg${battleBonusPct > 0
            ? ` <span style="color: var(--dimmer); font-weight: 400;">(${fmtInt(expDmgNoBonus)} without bonuses)</span>`
            : ''}`;
        }
      }
    });
    bbInput.addEventListener('click', e => e.stopPropagation());
  }
}

function compactCard(id, head, body) {
  return `<details class="compact-card" data-card="${id}">
    <summary><span class="caret">▾</span>${head}</summary>
    <div class="cc-body">${body}</div>
  </details>`;
}

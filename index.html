<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>War Readiness · we-ie.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d10;
    --surface: #14181d;
    --surface-2: #1c2128;
    --border: #2a313a;
    --border-strong: #3a424d;
    --text: #e8ecf0;
    --dim: #98a2b0;
    --dimmer: #6b7480;
    --accent: #4ad395;
    --accent-soft: rgba(74, 211, 149, 0.12);
    --warn: #f0c14b;
    --warn-soft: rgba(240, 193, 75, 0.12);
    --error: #f06060;
    --error-soft: rgba(240, 96, 96, 0.12);
    --rarity-common: #8b94a3;
    --rarity-uncommon: #4ad395;
    --rarity-rare: #5b8cff;
    --rarity-epic: #b87ddf;
    --rarity-legendary: #f0c14b;
    --rarity-mythic: #f06060;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-size: 15px;
  }

  .topbar { border-bottom: 1px solid var(--border); background: var(--surface); }
  .topbar-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0.9rem 1.5rem;
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .brand h1 { margin: 0; font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em; }
  .brand .accent { color: var(--accent); }
  .brand .sub { color: var(--dimmer); font-size: 0.85rem; }

  main {
    flex: 1;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .search-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
    flex-wrap: wrap;
  }
  .search-row input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.85rem;
    border-radius: 6px;
    font: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-row input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search-row button {
    background: var(--accent);
    border: 0;
    color: #07120c;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .search-row button:hover:not(:disabled) { background: #5fdfa6; }
  .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    min-height: 1.3rem;
    font-size: 0.85rem;
    color: var(--dim);
    margin-bottom: 1rem;
  }
  .status.error { color: var(--error); }
  .status.ok { color: var(--accent); }

  .player-head {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 1rem;
  }
  .avatar {
    width: 56px;
    height: 56px;
    border-radius: 8px;
    background: var(--surface-2);
    flex-shrink: 0;
    object-fit: cover;
  }
  .player-name { margin: 0 0 0.2rem 0; font-size: 1.2rem; font-weight: 600; }
  .player-meta { margin: 0; font-size: 0.9rem; color: var(--dim); }
  .pill {
    display: inline-block;
    padding: 0.1rem 0.55rem;
    background: var(--surface-2);
    border-radius: 4px;
    margin-right: 0.35rem;
    margin-bottom: 0.2rem;
    font-size: 0.8rem;
  }
  .pill .mono { font-family: var(--mono); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem 1.25rem;
  }
  .card h3 {
    margin: 0 0 1rem 0;
    font-size: 1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .badge {
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.18rem 0.55rem;
    border-radius: 999px;
    font-family: var(--mono);
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
    gap: 0.5rem;
    margin-bottom: 1.1rem;
  }
  .stat {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.55rem 0.7rem;
    text-align: left;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 4.5em;
  }
  .stat-label {
    display: block;
    color: var(--dim);
    font-size: 0.72rem;
    line-height: 1.3;
    margin-bottom: 0.35rem;
    overflow-wrap: break-word;
    hyphens: auto;
  }
  .stat-value {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 0.95rem;
  }

  /* Calmer deltas — single muted color, smaller. */
  .delta {
    font-size: 0.68rem;
    font-weight: 400;
    margin-left: 0.25rem;
    font-family: var(--mono);
    white-space: nowrap;
    color: var(--dimmer);
  }
  .delta.positive,
  .delta.negative,
  .delta.neutral { color: var(--dimmer); }

  .state-section { margin: 0; margin-top: 1.5rem; }
  .state-section:first-of-type { margin-top: 0; }
  .state-section > summary {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    cursor: pointer;
    padding: 0.5rem 0 0.85rem;
    list-style: none;
    user-select: none;
  }
  .state-section > summary::-webkit-details-marker { display: none; }
  .state-section > summary > .caret {
    color: var(--dim);
    transition: transform 0.2s;
    font-size: 0.85rem;
    flex-shrink: 0;
    display: inline-block;
  }
  .state-section > summary > h2 {
    margin: 0;
    font-size: 1.05rem;
    font-weight: 600;
  }
  .state-section > summary > h2 .sub {
    color: var(--dimmer);
    font-weight: 400;
    font-size: 0.85rem;
    margin-left: 0.5rem;
  }
  .state-section:not([open]) > summary > .caret { transform: rotate(-90deg); }

  .picker {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
  }
  .picker button {
    flex: 1;
    min-width: 130px;
    padding: 0.6rem 0.9rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.15s;
  }
  .picker button:hover { border-color: var(--accent); }
  .picker button.active {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }
  .preset-tagline {
    color: var(--dim);
    font-size: 0.88rem;
    margin: 0 0 1rem 0;
    font-style: italic;
  }

  /* War params bar */
  .war-params {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    padding: 0.6rem 0.85rem;
    background: var(--surface-2);
    border-radius: 6px;
    border: 1px solid var(--border);
    margin-bottom: 1rem;
    font-size: 0.85rem;
  }
  .war-params label {
    color: var(--dim);
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .war-params input {
    width: 56px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.25rem 0.45rem;
    border-radius: 4px;
    font: inherit;
    font-family: var(--mono);
    text-align: right;
  }
  .war-params input:focus {
    outline: none;
    border-color: var(--accent);
  }
  /* Hide native number spinners — they're visually noisy. */
  .war-params input[type=number] {
    -moz-appearance: textfield;
    appearance: textfield;
  }
  .war-params input[type=number]::-webkit-inner-spin-button,
  .war-params input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .war-params .auto-tag {
    color: var(--dimmer);
    font-size: 0.72rem;
    margin-left: 0.15rem;
    font-style: italic;
  }

  /* Section labels — sentence case, no letter-spacing. */
  .section { margin-top: 1rem; }
  .section:first-child { margin-top: 0; }
  .section-label {
    color: var(--dim);
    font-size: 0.82rem;
    margin-bottom: 0.55rem;
    font-weight: 500;
    overflow: hidden;
  }
  .section-label .right {
    float: right;
    color: var(--text);
    font-family: var(--mono);
    font-weight: 400;
  }
  .section-label .info-btn {
    transform: translateY(-1px);
  }

  /* Sub-label — used inside a section to separate sub-blocks. */
  .sub-label {
    color: var(--dimmer);
    font-size: 0.78rem;
    margin-top: 0.95rem;
    margin-bottom: 0.4rem;
    font-weight: 500;
    overflow: hidden;
  }
  .sub-label:first-child { margin-top: 0; }
  .sub-label .right {
    float: right;
    color: var(--dim);
    font-family: var(--mono);
    font-weight: 400;
  }
  .grand-total {
    margin-top: 0.9rem;
    padding: 0.55rem 0.75rem;
    background: var(--surface-2);
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-weight: 600;
    font-size: 0.92rem;
  }
  .grand-total .mono { font-family: var(--mono); }

  .skills { display: grid; gap: 0.3rem; font-size: 0.85rem; }
  .skill {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.6rem;
    padding: 0.4rem 0.6rem;
    background: var(--surface-2);
    border-radius: 4px;
  }
  .skill-name { color: var(--dim); }
  .skill-value { font-family: var(--mono); font-weight: 500; text-align: right; }
  .skill-value .sub { color: var(--dimmer); font-weight: 400; }
  .skill-value .total { color: var(--text); }

  /* Tables — sentence case headers, no letter-spacing. */
  table.list { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  table.list th, table.list td {
    text-align: left;
    padding: 0.4rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  table.list th {
    color: var(--dimmer);
    font-weight: 500;
    font-size: 0.78rem;
  }
  table.list td.mono { font-family: var(--mono); }
  table.list td.num,
  table.list th.num { text-align: right; font-family: var(--mono); }
  table.list th.num { font-family: inherit; }
  table.list tr:last-child td { border-bottom: 0; }
  table.list tr.empty td { color: var(--dimmer); font-style: italic; }
  table.list td.pos { color: var(--accent); font-family: var(--mono); text-align: right; }
  table.list td.neg { color: var(--error); font-family: var(--mono); text-align: right; }
  table.list tr.total td {
    border-top: 1px solid var(--border-strong);
    border-bottom: 0;
    font-weight: 600;
    padding-top: 0.55rem;
  }

  /* Rarity tags — kept uppercase since they're short pills. */
  .rt {
    display: inline-block;
    padding: 0.05rem 0.4rem;
    border-radius: 3px;
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    vertical-align: middle;
    margin-right: 0.35rem;
  }
  .rt.common    { background: var(--rarity-common);    color: #07120c; }
  .rt.uncommon  { background: var(--rarity-uncommon);  color: #07120c; }
  .rt.rare      { background: var(--rarity-rare);      color: #fff;    }
  .rt.epic      { background: var(--rarity-epic);      color: #fff;    }
  .rt.legendary { background: var(--rarity-legendary); color: #07120c; }
  .rt.mythic    { background: var(--rarity-mythic);    color: #fff;    }

  .placeholder-text {
    font-size: 0.85rem;
    color: var(--dim);
    margin: 0.25rem 0 0;
    padding: 0.5rem 0.7rem;
    background: var(--surface-2);
    border-radius: 6px;
    border-left: 2px solid var(--border-strong);
  }
  .placeholder-text.ok { color: var(--accent); border-color: var(--accent); }
  .placeholder-text.warn { color: var(--warn); border-color: var(--warn); }

  /* Daily flow */
  .flow {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.55rem;
    margin-top: 0.5rem;
  }
  @media (max-width: 520px) { .flow { grid-template-columns: 1fr; } }
  .flow-side {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.6rem 0.75rem;
  }
  .flow-side h5 {
    margin: 0 0 0.55rem;
    font-size: 0.82rem;
    color: var(--dim);
    font-weight: 500;
  }
  .flow-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.83rem;
    padding: 0.18rem 0;
    gap: 0.5rem;
  }
  .flow-line .ll { color: var(--dim); flex: 1; }
  .flow-line .ll .qty { color: var(--dimmer); font-family: var(--mono); font-size: 0.78rem; margin-left: 0.3rem; }
  .flow-line .lv { font-family: var(--mono); white-space: nowrap; }
  .flow-line .lv.pos { color: var(--accent); }
  .flow-line .lv.neg { color: var(--error); }
  .flow-line .lv.unk { color: var(--dimmer); font-style: italic; }
  .flow-total {
    border-top: 1px solid var(--border);
    margin-top: 0.45rem;
    padding-top: 0.5rem;
    font-weight: 600;
  }
  .flow-net {
    margin-top: 0.6rem;
    padding: 0.6rem 0.85rem;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.95rem;
    font-weight: 600;
  }
  .flow-net.positive { background: var(--accent-soft); color: var(--accent); }
  .flow-net.negative { background: var(--error-soft); color: var(--error); }
  .flow-net .mono { font-family: var(--mono); }

  .note {
    font-size: 0.8rem;
    color: var(--dimmer);
    font-style: italic;
    margin-top: 0.9rem;
  }
  .hidden { display: none !important; }
  .muted { color: var(--dim); }

  /* Tooltips */
  .info-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--dim);
    font-size: 0.65rem;
    font-weight: 600;
    cursor: help;
    margin-left: 0.4rem;
    position: relative;
    padding: 0;
    vertical-align: middle;
    font-family: inherit;
    line-height: 1;
  }
  .info-btn:hover, .info-btn:focus {
    outline: none;
    color: var(--accent);
    border-color: var(--accent);
  }
  .info-btn::after {
    content: attr(data-tip);
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: var(--surface-2);
    border: 1px solid var(--border-strong);
    padding: 0.6rem 0.8rem;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 400;
    white-space: normal;
    width: 260px;
    text-align: left;
    color: var(--text);
    line-height: 1.45;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 10;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .info-btn:hover::after, .info-btn:focus::after { opacity: 1; }

  details.debug {
    margin-top: 1rem;
    padding: 0.6rem 0.85rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  details.debug summary { cursor: pointer; font-size: 0.8rem; color: var(--dim); }
  details.debug pre {
    margin: 0.6rem 0 0;
    overflow: auto;
    background: var(--bg);
    padding: 0.6rem;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--dim);
    max-height: 400px;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 1rem 1.5rem;
    color: var(--dim);
    font-size: 0.85rem;
    text-align: center;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
  footer .sep { margin: 0 0.5rem; color: var(--border-strong); }

  @media (max-width: 600px) {
    body { font-size: 14px; }
    main { padding: 1rem; }
    .topbar-inner { padding: 0.75rem 1rem; }
    .card { padding: 0.9rem 1rem; }
    .stats { grid-template-columns: repeat(auto-fit, minmax(78px, 1fr)); gap: 0.4rem; }
    .stat { padding: 0.45rem 0.55rem; }
    .stat-label { font-size: 0.7rem; }
    .stat-value { font-size: 0.9rem; }
    .skills { font-size: 0.8rem; }
    .skill { padding: 0.4rem 0.5rem; }
    table.list { font-size: 0.78rem; }
    table.list th, table.list td { padding: 0.35rem 0.4rem; }
    .player-head { padding: 0.85rem 1rem; }
    .player-name { font-size: 1.1rem; }
    .info-btn::after { width: 220px; left: auto; right: 0; }
    .picker button { min-width: 0; flex: 1 1 calc(50% - 0.25rem); font-size: 0.85rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <h1>War <span class="accent">Readiness</span></h1>
    </div>
    <span class="brand sub">build planner for warera.io · v0.4</span>
  </div>
</div>

<main>
  <div class="search-row">
    <input id="username" placeholder="warera username..." autocomplete="off" spellcheck="false">
    <button id="load-btn">Load profile</button>
  </div>
  <div id="status" class="status"></div>

  <div id="player" class="hidden">
    <div class="player-head">
      <img id="avatar" class="avatar" alt="" hidden>
      <div>
        <h2 id="player-name" class="player-name"></h2>
        <p id="player-meta" class="player-meta"></p>
      </div>
    </div>

    <details class="state-section" open>
      <summary>
        <span class="caret">▾</span>
        <h2>Your current state</h2>
      </summary>
      <div class="grid">
        <div class="card">
          <h3>
            <span>Combat <button class="info-btn" type="button" aria-label="About this section" data-tip="Your damage output and survivability. Attack = damage per hit · Precision = accuracy · Crit chance / Crit damage = how often and how hard crits hit · Armor / Dodge = damage reduction. Values include gear but not active buffs.">?</button></span>
            <span class="badge" id="combat-badge"></span>
          </h3>
          <div id="combat-content"></div>
        </div>
        <div class="card">
          <h3>
            <span>Economy <button class="info-btn" type="button" aria-label="About this section" data-tip="Your daily income engine. Energy and Entrepreneurship cap your daily actions · Production = PP earned per action · Companies = factory cap · Management = worker cap.">?</button></span>
            <span class="badge" id="economy-badge"></span>
          </h3>
          <div id="economy-content"></div>
        </div>
      </div>
    </details>

    <details class="state-section" id="target-section" open>
      <summary>
        <span class="caret">▾</span>
        <h2>Target build <button class="info-btn" type="button" aria-label="About this section" data-tip="Pick a target loadout. Target combat shows the stats with that loadout · Before the war = gear + consumables to acquire · Daily during war = running cost vs income while fighting.">?</button></span>
      </summary>
      <div id="target-content"></div>
    </details>

    <details class="debug hidden" id="debug-panel">
      <summary>Raw API responses (debug mode)</summary>
      <pre id="debug-content"></pre>
    </details>
  </div>
</main>

<footer>
  Made with <span style="color: var(--accent);">♥</span> by toie.
  <span class="sep">·</span>
  Data via <a href="https://gateway.warerastats.io/" target="_blank" rel="noopener">War Era Gateway</a>.
  <span class="sep">·</span>
  Sibling of <a href="https://tools.we-ie.com/" target="_blank" rel="noopener">tools.we-ie.com</a>.
</footer>

<script>
/* ═══════════════════════════════════════════════════════════════════
 *  CONFIG
 * ═══════════════════════════════════════════════════════════════════ */
const CFG = {
  API: 'https://warera-proxy.toie.workers.dev/trpc',
  GAME: 'https://app.warera.io',
};
const QS = new URLSearchParams(location.search);
const DEBUG = QS.has('debug');

/* ═══════════════════════════════════════════════════════════════════
 *  UTILITIES
 * ═══════════════════════════════════════════════════════════════════ */
const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) {
  // For attribute values — same escaping but explicit about intent.
  return escapeHtml(s);
}
function fmt(n, d = 2) {
  if (n == null || isNaN(n)) return '–';
  return Number(n).toLocaleString(undefined, {
    minimumFractionDigits: d, maximumFractionDigits: d
  });
}
function fmtInt(n) {
  if (n == null || isNaN(n)) return '–';
  return Math.round(Number(n)).toLocaleString();
}
function fmtGold(n, d = 2) { return n == null || isNaN(n) ? '–' : fmt(n, d) + ' g'; }
function fmtSigned(n, d = 2) {
  if (n == null || isNaN(n)) return '–';
  const sign = n > 0 ? '+' : '';
  return sign + fmt(n, d) + ' g';
}
function flag(code) {
  if (!code || code.length !== 2) return '🏳️';
  return code.toUpperCase().split('').map(c =>
    String.fromCodePoint(c.charCodeAt(0) - 65 + 0x1F1E6)
  ).join('');
}
function midpoint([min, max]) { return (min + max) / 2; }

/* ═══════════════════════════════════════════════════════════════════
 *  TRPC CLIENT
 * ═══════════════════════════════════════════════════════════════════ */
async function trpc(endpoint, params = {}) {
  const input = encodeURIComponent(JSON.stringify(params));
  const url = `${CFG.API}/${endpoint}?input=${input}`;
  if (DEBUG) console.log(`→ ${endpoint}`, params);
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${endpoint} HTTP ${res.status}`);
  const json = await res.json();
  if (DEBUG) console.log(`← ${endpoint}`, json);
  const item = Array.isArray(json) ? json[0] : json;
  if (item?.error) throw new Error(`${endpoint}: ${item.error.message || 'error'}`);
  const d = item?.result?.data;
  return d?.json ?? d ?? item;
}

const RARITY_BY_INDEX = ['', 'common', 'uncommon', 'rare', 'epic', 'legendary', 'mythic'];

const SLOT_LABEL = { weapon: 'Weapon', helmet: 'Helmet', chest: 'Chest', pants: 'Pants', boots: 'Boots', gloves: 'Gloves' };

const WEAPON_DISPLAY = { knife: 'Knife', gun: 'Gun', rifle: 'Rifle', sniper: 'Sniper', tank: 'Tank', fighterJet: 'Fighter Jet' };

function itemCode(slot, rarity) {
  if (slot === 'weapon') return WEAPON_BY_RARITY[rarity];
  return `${slot}${RARITY_BY_INDEX.indexOf(rarity)}`;
}

function rarityFromCode(code) {
  if (!code) return null;
  const m = String(code).match(/(\d)$/);
  if (m) return RARITY_BY_INDEX[parseInt(m[1], 10)] || null;
  const byWeapon = Object.entries(WEAPON_BY_RARITY).find(([, c]) => c === code);
  return byWeapon ? byWeapon[0] : null;
}

function rarityIndex(rarity) { return RARITY_BY_INDEX.indexOf(rarity); }

function rarityTag(rarity) {
  if (!rarity) return '';
  return `<span class="rt ${rarity}">${RARITY_LABEL[rarity]}</span>`;
}

function gearItemName(slot, rarity) {
  if (slot === 'weapon') return WEAPON_DISPLAY[WEAPON_BY_RARITY[rarity]] || SLOT_LABEL.weapon;
  return SLOT_LABEL[slot] || slot;
}

 *  DATA LOAD

async function resolveUserId(input) {
  const t = input.trim();
  if (!t) return null;
  if (/^[a-f0-9]{24}$/i.test(t)) return t;
  const r = await trpc('search.searchAnything', { searchText: t });
  const userIds = r?.userIds || [];
  if (!userIds.length) return null;
  return userIds[0];
}

async function loadPlayer(userId) {
  // First wave: everything we can do in parallel from the userId alone.
  // worker.getWorkers returns the workers across ALL of this user's owned
  // companies, replacing the per-company workOffer.getWorkOfferByCompanyId
  // calls (which returned null for owned companies anyway).
  const [user, inventory, companyList, pricesR, workersR] = await Promise.allSettled([
    trpc('user.getUserById', { userId }),
    trpc('inventory.fetchCurrentEquipment', { userId }),
    trpc('company.getCompanies', { userId, perPage: 50 }),
    trpc('itemTrading.getPrices'),
    trpc('worker.getWorkers', { userId }),
  ]);

  const u = user.status === 'fulfilled' ? user.value : null;
  const ids = companyList.status === 'fulfilled' ? (companyList.value?.items || []) : [];

  // worker.getWorkers shape: { workersPerCompany: [{company:{_id,name,itemCode}, workers:[{user,wage,fidelity,...}]}] }
  const workersData = workersR.status === 'fulfilled' ? workersR.value : null;
  const workersByCompanyId = {};
  if (workersData?.workersPerCompany) {
    workersData.workersPerCompany.forEach(entry => {
      if (entry?.company?._id) {
        workersByCompanyId[entry.company._id] = entry.workers || [];
      }
    });
  }

  // Second wave: company details for owned companies, country, MU, and the
  // workplace company (where the player is employed, if any).
  const secondary = await Promise.allSettled([
    ...ids.map(id => trpc('company.getById', { companyId: id })),
    u?.country ? trpc('country.getCountryById', { countryId: u.country }) : Promise.resolve(null),
    u?.mu ? trpc('mu.getById', { muId: u.mu }) : Promise.resolve(null),
    u?.company ? trpc('company.getById', { companyId: u.company }) : Promise.resolve(null),
  ]);

  const companies = secondary.slice(0, ids.length)
    .filter(r => r.status === 'fulfilled')
    .map(r => r.value);
  const country = secondary[ids.length]?.status === 'fulfilled' ? secondary[ids.length].value : null;
  const mu = secondary[ids.length + 1]?.status === 'fulfilled' ? secondary[ids.length + 1].value : null;
  const workplaceCompany = secondary[ids.length + 2]?.status === 'fulfilled' ? secondary[ids.length + 2].value : null;

  // Third wave: find the player's own wage by querying the workplace owner's
  // workers and locating the player's worker record. workOffer endpoint returns
  // null because it's the *open hiring offer*, not the existing worker's wage.
  let ownWage = null;
  let ownFidelity = null;
  if (workplaceCompany?.user) {
    try {
      const ownerWorkers = await trpc('worker.getWorkers', { userId: workplaceCompany.user });
      if (ownerWorkers?.workersPerCompany) {
        const entry = ownerWorkers.workersPerCompany.find(e => e?.company?._id === workplaceCompany._id);
        const myRecord = entry?.workers?.find(w => w.user === userId);
        if (myRecord) {
          ownWage = Number(myRecord.wage);
          ownFidelity = Number(myRecord.fidelity);
        }
      }
    } catch (e) {
      if (DEBUG) console.warn('Failed to fetch workplace workers:', e);
    }
  }

  return {
    userId,
    user: u,
    userError: user.status === 'rejected' ? String(user.reason?.message || user.reason) : null,
    inventory: inventory.status === 'fulfilled' ? inventory.value : null,
    inventoryError: inventory.status === 'rejected' ? String(inventory.reason?.message || inventory.reason) : null,
    companies,
    companiesError: companyList.status === 'rejected' ? String(companyList.reason?.message || companyList.reason) : null,
    country, mu,
    workplaceCompany,
    workersByCompanyId,
    ownWage, ownFidelity,
    // Synthesize an offer-shaped object so existing offerWage() callers keep working.
    ownWorkOffer: ownWage != null ? { wage: ownWage, fidelity: ownFidelity, source: 'worker_record' } : null,
    companyWorkOffers: {},
    prices: pricesR.status === 'fulfilled' ? normalizePrices(pricesR.value) : {},
    pricesError: pricesR.status === 'rejected' ? String(pricesR.reason?.message || pricesR.reason) : null,
    workersError: workersR.status === 'rejected' ? String(workersR.reason?.message || workersR.reason) : null,
  };
}

function normalizePrices(raw) {
  if (!raw) return {};
  if (Array.isArray(raw)) {
    const out = {};
    raw.forEach(item => {
      const code = item?.itemCode || item?.code || item?.item;
      const price = item?.price ?? item?.value;
      if (code && price != null) out[code] = price;
    });
    return out;
  }
  if (raw.prices && typeof raw.prices === 'object') return raw.prices;
  if (typeof raw === 'object') return raw;
  return {};
}

function offerWage(offer) {
  if (!offer) return null;
  const candidates = [offer.wage, offer.salary, offer.payment, offer.amount, offer.ppPerWork, offer.gold];
  for (const c of candidates) {
    if (c != null && !isNaN(c)) return Number(c);
  }
  return null;
}

function extractPlayer(data) {
  const u = data.user || {};

  return {
    userId: data.userId,
    username: u.username || '?',
    avatarUrl: u.avatarUrl,
    level: lv.level ?? '?',
    militaryRank: u.militaryRank,
    militaryRankPercent: s.attack?.militaryRankPercent ?? 0,
    totalSp: lv.totalSkillPoints ?? 0,
    spentSp: lv.spentSkillPoints ?? 0,
    availableSp: lv.availableSkillPoints ?? 0,
    levels: Object.fromEntries(
      [...FIGHT_KEYS, ...ECO_KEYS].map(k => [k, grab(k, 'level')])
    ),
    derived: {
      atk: grab('attack', 'total'),
      prc: grab('precision', 'total'),
      cc:  grab('criticalChance', 'total'),
      cd:  grab('criticalDamages', 'total'),
      armRaw: grab('armor', 'total'),
      arm: s.armor?.totalAfterSoftCap ?? s.armor?.total ?? 0,
      ddgRaw: grab('dodge', 'total'),
      ddg: s.dodge?.totalAfterSoftCap ?? s.dodge?.total ?? 0,
      hp:  grab('health', 'total') || 100,
      loot: grab('lootChance', 'total'),
      hunger: grab('hunger', 'total') || 4,
    },
    eco: {
      energy: grab('energy', 'total'),
      entrepreneurship: grab('entrepreneurship', 'total'),
      production: grab('production', 'total'),
      companies: grab('companies', 'total'),
      management: grab('management', 'total'),
    },
  };
}

function extractEquipment(inv) {
  const slot = key => {
    const p = inv?.[key];
    if (!p) return null;
    const code = p.code ?? '?';
    const rarity = rarityFromCode(code);
    return {
      code,
      rarity,
      displayName: rarity ? gearItemName(key, rarity) : code,
      durability: p.state != null ? Math.round((p.state / (p.maxState || 100)) * 100) : null,
      skills: p.skills || {},
    };
  };
  return {
    weapon: slot('weapon'),
    helmet: slot('helmet'),
    chest:  slot('chest'),
    pants:  slot('pants'),
    boots:  slot('boots'),
    gloves: slot('gloves'),
  };
}

function extractCompanies(data) {
  const items = Array.isArray(data.companies) ? data.companies : [];
  const prices = data.prices || {};
  const offers = data.companyWorkOffers || {};
  return items.map(co => {
    const id = co._id;
    const itemCodeStr = co.itemCode ?? '?';
    const workerCount = co.workerCount ?? 0;
    const aeLevel = co.activeUpgradeLevels?.automatedEngine ?? 0;
    const price = prices[itemCodeStr] != null ? Number(prices[itemCodeStr]) : null;
    const wage = offerWage(offers[id]);

    const dailyOutput = workerCount * FACTORY_ASSUMPTIONS.dailyOutputPerWorker
                      * (1 + FACTORY_ASSUMPTIONS.aeOutputBonus * aeLevel);
    const dailyRevenue = price != null ? dailyOutput * price : null;
    const dailyWageCost = wage != null
      ? wage * FACTORY_ASSUMPTIONS.workerActionsPerDay * workerCount
      : null;
    const dailyNet = (dailyRevenue != null && dailyWageCost != null)
      ? dailyRevenue - dailyWageCost
      : null;

    return {
      id, name: co.name ?? '?',
      itemCode: itemCodeStr,
      aeLevel,
      storageLevel: co.activeUpgradeLevels?.storage ?? null,
      breakRoomLevel: co.activeUpgradeLevels?.breakRoom ?? null,
      stored: co.production ?? null,
      estimatedValue: co.estimatedValue ?? null,
      workerCount,
      marketPrice: price,
      wagePerAction: wage,
      dailyOutput,
      dailyRevenue,
      dailyWageCost,
      dailyNet,
    };
  });
}

/* ═══════════════════════════════════════════════════════════════════
 *  TARGET BUILD MATH
 * ═══════════════════════════════════════════════════════════════════ */
function computeTargetStats(preset, militaryRankPercent = 0) {
  const g = preset.gear, b = preset.buffs;
  const gs = r => GEAR_STATS[r];

  const weaponAtk  = midpoint(gs(g.weapon).weapon.attack);
  const weaponCrit = midpoint(gs(g.weapon).weapon.crit);
  const helmetCD   = midpoint(gs(g.helmet).helmet.critDamage);
  const chestArm   = midpoint(gs(g.chest).chest.armor);
  const pantsArm   = midpoint(gs(g.pants).pants.armor);
  const bootsDdg   = midpoint(gs(g.boots).boots.dodge);
  const glovesPrc  = midpoint(gs(g.gloves).gloves.precision);

  const pillMult = b.pill ? BUFFS.pill.damageMult : 1;
  const ammoMult = BUFFS.ammo[b.ammo] ?? 1;
  const foodHp   = BUFFS.food[b.food] ?? 0;
  const rankMult = 1 + militaryRankPercent / 100;

  const armRaw = chestArm + pantsArm;
  const ddgRaw = bootsDdg;

  return {
    atk: (100 + weaponAtk) * ammoMult * pillMult * rankMult,
    prc: 50 + glovesPrc,
    cc:  10 + weaponCrit,
    cd:  100 + helmetCD,
    armRaw,
    arm: armRaw / (armRaw + 40) * 100,
    ddgRaw,
    ddg: ddgRaw / (ddgRaw + 40) * 100,
    hp:  100 * (1 + foodHp),
  };
}

function computeBuyGap(currentEq, preset, prices) {
  const slots = ['weapon', 'helmet', 'chest', 'pants', 'boots', 'gloves'];
  const out = [];
  let total = 0;
  for (const slot of slots) {
    const targetRarity = preset.gear[slot];
    const targetCode = itemCode(slot, targetRarity);
    const currentCode = currentEq?.[slot]?.code;
    const currentRarity = rarityFromCode(currentCode);

    const needsBuy = !currentCode
      || currentCode === '?'
      || (currentRarity && rarityIndex(currentRarity) < rarityIndex(targetRarity))
      || !currentRarity;

    if (needsBuy) {
      const price = prices?.[targetCode];
      out.push({
        slot,
        currentCode: currentCode && currentCode !== '?' ? currentCode : null,
        currentRarity,
        targetCode,
        targetRarity,
        price: price != null ? Number(price) : null,
      });
      if (price != null) total += Number(price);
    }
  }
  return { items: out, total };
}

function computeStockpile(preset, prices, player, params) {
  const hitsPerDay = effectiveHitsPerDay(player, params);
  const days = params.warDays;
  const totalHits = hitsPerDay * days;
  const hunger = player?.derived?.hunger || 4;
  const out = [];
  let total = 0;
  let anyMissingPrice = false;

  const push = (cons, qty) => {
    if (qty <= 0) return;
    const price = prices?.[cons.code];
    const unit = price != null ? Number(price) : null;
    const line = unit != null ? unit * qty : null;
    if (unit == null) anyMissingPrice = true;
    if (line != null) total += line;
    out.push({ kind: cons.kind, code: cons.code, label: cons.label, qty, unit, line });
  };

  if (preset.buffs.pill) push(CONSUMABLES.pill, params.pillsPerDay * days);

  const ammoKey = preset.buffs.ammo;
  if (ammoKey && CONSUMABLES[ammoKey]) push(CONSUMABLES[ammoKey], totalHits);

  const foodKey = preset.buffs.food;
  if (foodKey && CONSUMABLES[foodKey]) {
    const foodNeeded = Math.ceil(totalHits / hunger);
    push(CONSUMABLES[foodKey], foodNeeded);
  }

  return { items: out, total, hitsPerDay, days, totalHits, hunger, anyMissingPrice };
}

function computeDailyDuringWar(preset, prices, player, data, params) {
  const stockpile = computeStockpile(preset, prices, player, params);
  const comps = extractCompanies(data);

  const consumablesDaily = stockpile.total / Math.max(1, params.warDays);
  const consumableLines = stockpile.items.map(it => ({
    ...it,
    qtyPerDay: it.qty / Math.max(1, params.warDays),
    linePerDay: it.line != null ? it.line / Math.max(1, params.warDays) : null,
  }));

  const factoryRevenue = comps.reduce((s, c) => s + (c.dailyRevenue || 0), 0);
  const factoryWageCost = comps.reduce((s, c) => s + (c.dailyWageCost || 0), 0);
  const factoryNet = factoryRevenue - factoryWageCost;
  const factoriesHaveRevenue = comps.some(c => c.dailyRevenue != null);
  const factoriesHaveWage = comps.some(c => c.dailyWageCost != null);

  const ownWage = offerWage(data.ownWorkOffer);
  const workActionsPeace = actionsPerDay(player.eco.energy);
  const wageIncomePeace = ownWage != null ? ownWage * workActionsPeace : null;
  const wageIncomeWar = 0;

  const peaceNet = (wageIncomePeace ?? 0) + factoryNet;
  const warNet   = wageIncomeWar + factoryNet - consumablesDaily;
  const burnRate = peaceNet - warNet;

  return {
    consumableLines,
    consumablesDaily,
    factoryRevenue, factoryWageCost, factoryNet,
    factoriesHaveRevenue, factoriesHaveWage,
    ownWage, workActionsPeace,
    wageIncomePeace, wageIncomeWar,
    peaceNet, warNet, burnRate,
    hasOwnWage: ownWage != null,
  };
}

function actionsPerDay(bar, usagePct = 1) {
  return Math.floor(bar / 10) * 2.4 * usagePct;
}

function effectiveHitsPerDay(player, params) {
  if (params.hitsPerDay != null && !isNaN(params.hitsPerDay) && params.hitsPerDay >= 0) {
    return params.hitsPerDay;
  }
  return Math.round(actionsPerDay(player.eco.energy));
}

/* ═══════════════════════════════════════════════════════════════════
 *  RENDER — PLAYER HEADER
 * ═══════════════════════════════════════════════════════════════════ */
function renderPlayer(data) {
  if (!data.user) {
    setStatus('error', `Could not load user. ${data.userError || ''}`);
    return;
  }
  const p = extractPlayer(data);
  cached.player = p;
  cached.data = data;

  const av = $('#avatar');
  if (p.avatarUrl) { av.src = p.avatarUrl; av.hidden = false; }
  else { av.hidden = true; }
  $('#player-name').textContent = p.username;

  const meta = [];
  meta.push(`<span class="pill">Level <span class="mono">${p.level}</span></span>`);
  const cc = data.country?.code;
  if (cc) meta.push(`<span class="pill">${flag(cc)} ${escapeHtml(cc.toUpperCase())}</span>`);
  const muName = data.mu?.name;
  if (muName) meta.push(`<span class="pill">${escapeHtml(muName)}</span>`);
  if (p.militaryRank != null) {
    meta.push(`<span class="pill">Rank <span class="mono">${p.militaryRank}</span></span>`);
  }
  $('#player-meta').innerHTML = meta.join(' ');

  renderCombat(p, data);
  renderEconomy(p, data);
  renderTargetBuild(p, data);

  if (DEBUG) {
    $('#debug-panel').classList.remove('hidden');
    $('#debug-content').textContent = JSON.stringify({
      userId: data.userId,
      user: data.user,
      inventory: data.inventory,
      companies: data.companies,
      country: data.country,
      mu: data.mu,
      ownWorkOffer: data.ownWorkOffer,
      companyWorkOffers: data.companyWorkOffers,
      prices: data.prices,
      errors: {
        user: data.userError,
        inventory: data.inventoryError,
        companies: data.companiesError,
        prices: data.pricesError,
      }
    }, null, 2);
  }

  $('#player').classList.remove('hidden');
}

 * ═══════════════════════════════════════════════════════════════════ */
function renderCombat(p, data) {

    $('#combat-content').innerHTML = `<p class="muted">Could not load equipment: <code>${escapeHtml(data.inventoryError)}</code></p>`;
    return;
  }
  const eq = extractEquipment(data.inventory);
  const d = p.derived;
  const fightPts = pointsSpent(p.levels, FIGHT_KEYS);

  $('#combat-content').innerHTML = `
    <div class="stats">
      <div class="stat"><span class="stat-label">Attack</span><span class="stat-value">${fmtInt(d.atk)}</span></div>
      <div class="stat"><span class="stat-label">Precision</span><span class="stat-value">${fmtInt(d.prc)}%</span></div>
      <div class="stat"><span class="stat-label">Crit chance</span><span class="stat-value">${fmtInt(d.cc)}%</span></div>
      <div class="stat"><span class="stat-label">Crit damage</span><span class="stat-value">${fmtInt(d.cd)}%</span></div>
      <div class="stat"><span class="stat-label">Armor</span><span class="stat-value">${fmtInt(d.arm)}%</span></div>
      <div class="stat"><span class="stat-label">Dodge</span><span class="stat-value">${fmtInt(d.ddg)}%</span></div>
      <div class="stat"><span class="stat-label">Health</span><span class="stat-value">${fmtInt(d.hp)}</span></div>
    </div>

    <div class="section">
      <div class="section-label">Fight skills · ${fightPts}/${p.spentSp + p.availableSp} pts</div>
      <div class="skills">
        ${skillRow('Attack', p.levels.attack)}
        ${skillRow('Precision', p.levels.precision)}
        ${skillRow('Crit chance', p.levels.criticalChance)}
        ${skillRow('Crit damage', p.levels.criticalDamages)}
        ${skillRow('Armor', p.levels.armor)}
        ${skillRow('Dodge', p.levels.dodge)}
        ${skillRow('Health', p.levels.health)}
        ${skillRow('Loot chance', p.levels.lootChance)}
        ${skillRow('Hunger', p.levels.hunger)}
      </div>
    </div>

    <div class="section">
      <div class="section-label">Equipped gear</div>
      ${equipmentTable(eq)}
    </div>
  `;
  $('#combat-badge').textContent = `${fmtInt(d.atk)} attack`;
}

function skillRow(label, value) {
  return `<div class="skill"><span class="skill-name">${label}</span><span class="skill-value">${value}</span></div>`;
}

const STAT_LABELS = {
  attack: 'attack',
  criticalChance: 'crit chance',
  criticalDamages: 'crit damage',
  armor: 'armor',
  dodge: 'dodge',
  precision: 'precision',
};

function equipmentTable(eq) {
  // Slot emojis removed — rarity tag carries the visual weight.
  const slots = [
    ['weapon', 'Weapon', ['attack', 'criticalChance']],
    ['helmet', 'Helmet', ['criticalDamages']],
    ['chest',  'Chest',  ['armor']],
    ['pants',  'Pants',  ['armor']],
    ['boots',  'Boots',  ['dodge']],
    ['gloves', 'Gloves', ['precision']],
  ];
  const rows = slots.map(([key, label, statKeys]) => {
    const item = eq[key];
    if (!item) return `<tr class="empty"><td>${label}</td><td colspan="3">empty</td></tr>`;
    const statStr = statKeys
      .map(sk => {
        const v = item.skills[sk];
        return v ? `${fmtInt(v)} ${STAT_LABELS[sk] || sk}` : null;
      })
      .filter(Boolean)
      .join(', ') || '–';
    const nameCell = item.rarity
      ? `${rarityTag(item.rarity)}${escapeHtml(item.displayName)}`
      : `<span class="mono">${escapeHtml(item.code)}</span>`;
    return `<tr>
      <td>${label}</td>
      <td>${nameCell}</td>
      <td>${statStr}</td>
      <td class="num">${item.durability != null ? fmtInt(item.durability) + '%' : '–'}</td>
    </tr>`;
  });
  return `<table class="list">
    <thead><tr><th>Slot</th><th>Item</th><th>Stat</th><th class="num">Durability</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

/* ═══════════════════════════════════════════════════════════════════
 *  RENDER — ECONOMY CARD
 * ═══════════════════════════════════════════════════════════════════ */
function renderEconomy(p, data) {
  if (data.companiesError) {
    $('#economy-content').innerHTML = `<p class="muted">Could not load companies: <code>${escapeHtml(data.companiesError)}</code></p>`;
    return;
  }

  const comps = extractCompanies(data);
  const eco = p.eco;
  const ecoPts = pointsSpent(p.levels, ECO_KEYS);

  const workActions = actionsPerDay(eco.energy, 1);
  const entreActions = actionsPerDay(eco.entrepreneurship, 1);
  const ownWage = offerWage(data.ownWorkOffer);
  const dailyWageIncome = ownWage != null ? ownWage * workActions : null;

  const haveWageData = comps.some(c => c.dailyWageCost != null && c.dailyWageCost > 0);

  // Tooltip — explains what's real vs estimated.
  const factoryTip = `Real wages + fidelity from worker.getWorkers. Daily output = AE PP (linear from AE 5 = 120) + worker PP (${FACTORY_ASSUMPTIONS.workerActionsPerDay} actions × ${FACTORY_ASSUMPTIONS.workerProduction} prod default per worker, scaled by fidelity). Revenue at market price, minus ingredient cost for processed goods using hardcoded RECIPES (1:1 ratios — verify in-game). Tune FACTORY_ASSUMPTIONS / AE_TABLE / RECIPES if numbers don't match.`;

  $('#economy-content').innerHTML = `
    <div class="stats">
      <div class="stat"><span class="stat-label">Energy</span><span class="stat-value">${eco.energy}</span></div>
      <div class="stat"><span class="stat-label">Entrepreneurship</span><span class="stat-value">${eco.entrepreneurship}</span></div>
      <div class="stat"><span class="stat-label">Production</span><span class="stat-value">${eco.production}</span></div>
      <div class="stat"><span class="stat-label">Companies</span><span class="stat-value">${eco.companies}</span></div>
      <div class="stat"><span class="stat-label">Management</span><span class="stat-value">${eco.management}</span></div>
    </div>

    <div class="section">
      <div class="section-label">Eco skills · ${ecoPts}/${p.spentSp + p.availableSp} pts</div>
      <div class="skills">
        ${skillRow('Energy', p.levels.energy)}
        ${skillRow('Entrepreneurship', p.levels.entrepreneurship)}
        ${skillRow('Production', p.levels.production)}
        ${skillRow('Companies', p.levels.companies)}
        ${skillRow('Management', p.levels.management)}
      </div>
    </div>

    <div class="section">
      <div class="section-label">Daily actions <button class="info-btn" type="button" data-tip="Energy powers fighting and working-for-others — same pool, you pick one. Entrepreneurship powers self-work in your own factories — separate pool, runs in parallel.">?</button></div>
      <div class="skills">
        <div class="skill">
          <span class="skill-name">Energy pool</span>
          <span class="skill-value"><span class="total">${fmt(workActions, 1)}</span> <span class="sub">actions/day</span></span>
        </div>
        <div class="skill">
          <span class="skill-name">Entrepreneurship pool</span>
          <span class="skill-value"><span class="total">${fmt(entreActions, 1)}</span> <span class="sub">actions/day</span></span>
        </div>
        ${ownWage != null ? `
        <div class="skill">
          <span class="skill-name">Current job wage</span>
          <span class="skill-value"><span class="total">${fmtGold(dailyWageIncome)}</span> <span class="sub">/day at ${fmt(ownWage, 3)} g/action</span></span>
        </div>` : ''}
      </div>
    </div>

    <div class="section">
      <div class="section-label">Factories · ${comps.length}/${eco.companies}<button class="info-btn" type="button" data-tip="${escapeAttr(factoryTip)}">?</button></div>
      ${companiesTable(comps, haveWageData)}
    </div>
  `;
  $('#economy-badge').textContent = `${comps.length}/${eco.companies} factories`;
}

function companiesTable(comps, showWages) {
  if (!comps.length) {
    return `<p class="muted" style="font-size:0.85rem; margin:0;">No companies found.</p>`;
  }
  const rows = comps.map(c => {
    const wageCol = showWages
      ? `<td class="num">${c.dailyWageCost != null ? fmtGold(c.dailyWageCost) : '–'}</td>`
      : '';
    const netCol = showWages
      ? (c.dailyNet != null
          ? `<td class="${c.dailyNet >= 0 ? 'pos' : 'neg'}">${fmtSigned(c.dailyNet)}</td>`
          : `<td class="num muted">–</td>`)
      : '';
    return `<tr>
      <td>${escapeHtml(c.name)}</td>
      <td class="mono">${escapeHtml(c.itemCode)}</td>
      <td>${c.aeLevel ? 'AE ' + c.aeLevel : '–'}</td>
      <td class="num">${c.workerCount}</td>
      <td class="num">${c.dailyRevenue != null ? fmtGold(c.dailyRevenue) : '–'}</td>
      ${wageCol}
      ${netCol}
    </tr>`;
  });
  const wageHdr = showWages ? `<th class="num">Wages/d</th><th class="num">Net/d</th>` : '';
  return `<table class="list">
    <thead><tr>
      <th>Name</th><th>Item</th><th>Engine</th>
      <th class="num">Workers</th>
      <th class="num">Revenue/d</th>
      ${wageHdr}
    </tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

/* ═══════════════════════════════════════════════════════════════════
 *  RENDER — TARGET BUILD SECTION
 * ═══════════════════════════════════════════════════════════════════ */
function renderTargetBuild(p, data) {
  const preset = PRESETS[selectedPreset];
  const target = computeTargetStats(preset, p.militaryRankPercent);
  const current = p.derived;
  const eq = extractEquipment(data.inventory);
  const havePrices = !!data.prices && Object.keys(data.prices).length > 0;
  const gap = computeBuyGap(eq, preset, data.prices);
  const stockpile = computeStockpile(preset, data.prices, p, warParams);
  const daily = computeDailyDuringWar(preset, data.prices, p, data, warParams);
  const hitsToday = effectiveHitsPerDay(p, warParams);
  const hitsAutoDerived = warParams.hitsPerDay == null;

  $('#target-content').innerHTML = `
    <div class="picker">
      ${Object.entries(PRESETS).map(([key, ps]) => `
        <button type="button" data-preset="${key}" class="${key === selectedPreset ? 'active' : ''}">${escapeHtml(ps.name)}</button>
      `).join('')}
    </div>
    <p class="preset-tagline">${escapeHtml(preset.tagline)}</p>

    ${warParamsBar(p, hitsToday, hitsAutoDerived)}

    <div class="grid">
      <div class="card">
        <h3>
          <span>Target combat</span>
          <span class="badge">${fmtInt(target.atk)} attack</span>
        </h3>
        ${targetStatsBlock(target, current)}
        <div class="section">
          <div class="section-label">Active during fighting</div>
          <p class="placeholder-text">${escapeHtml(describeBuffs(preset.buffs))}</p>
        </div>
      </div>

      <div class="card">
        <h3><span>What to do</span></h3>
        ${beforeTheWar(gap, stockpile, havePrices)}
        ${dailyDuringWarSection(daily, havePrices, hitsToday, warParams)}
      </div>
    </div>
  `;

  $$('#target-content .picker button').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedPreset = btn.dataset.preset;
      renderTargetBuild(p, data);
    });
  });

  const wDays = $('#war-days');
  const wHits = $('#war-hits');
  if (wDays) {
    wDays.addEventListener('change', () => {
      const v = parseInt(wDays.value, 10);
      warParams.warDays = isNaN(v) || v < 1 ? DEFAULT_WAR_PARAMS.warDays : v;
      renderTargetBuild(p, data);
    });
  }
  if (wHits) {
    wHits.addEventListener('change', () => {
      const raw = wHits.value.trim();
      if (raw === '' || raw === 'auto') {
        warParams.hitsPerDay = null;
      } else {
        const v = parseInt(raw, 10);
        warParams.hitsPerDay = isNaN(v) || v < 0 ? null : v;
      }
      renderTargetBuild(p, data);
    });
  }
}

function warParamsBar(player, hitsToday, hitsAutoDerived) {
  const hitsTip = `Default is derived from your Energy stat (${player.eco.energy} → ${Math.round(actionsPerDay(player.eco.energy))} actions/day). Food quantity scales with your Hunger skill (1 food per ${player.derived.hunger} hits). Pills: 1/day on war days.`;
  return `<div class="war-params">
    <label>War days
      <input id="war-days" type="number" min="1" max="30" value="${warParams.warDays}">
    </label>
    <label>Hits/day
      <input id="war-hits" type="number" min="0" max="200" value="${hitsToday}" placeholder="auto">
      ${hitsAutoDerived ? '<span class="auto-tag">(from energy)</span>' : ''}
    </label>
    <button class="info-btn" type="button" data-tip="${escapeAttr(hitsTip)}">?</button>
  </div>`;
}

function describeBuffs(buffs) {
  const parts = [];
  if (buffs.pill) parts.push('Pill (+60% damage)');
  const ammoLabel = { light: 'Light Ammo (+10% damage)', ammo: 'Ammo (+20% damage)', heavy: 'Heavy Ammo (+40% damage)' }[buffs.ammo];
  if (ammoLabel) parts.push(ammoLabel);
  const foodLabel = { bread: 'Bread (+10% health)', steak: 'Steak (+15% health)', fish: 'Fish (+20% health)' }[buffs.food];
  if (foodLabel) parts.push(foodLabel);
  return parts.length ? parts.join(' · ') : 'No active buffs';
}

function targetStatsBlock(target, current) {
  const stat = (label, t, c, suffix = '') => {
    const tv = Math.round(t);
    const cv = Math.round(c);
    const delta = tv - cv;
    const sign = delta > 0 ? '+' : '';
    const deltaStr = delta === 0
      ? ''
      : `<span class="delta">${sign}${fmtInt(delta)}${suffix}</span>`;
    return `<div class="stat">
      <span class="stat-label">${label}</span>
      <span class="stat-value">${fmtInt(tv)}${suffix}${deltaStr}</span>
    </div>`;
  };
  return `<div class="stats">
    ${stat('Attack', target.atk, current.atk)}
    ${stat('Precision', target.prc, current.prc, '%')}
    ${stat('Crit chance', target.cc, current.cc, '%')}
    ${stat('Crit damage', target.cd, current.cd, '%')}
    ${stat('Armor', target.arm, current.arm, '%')}
    ${stat('Dodge', target.ddg, current.ddg, '%')}
    ${stat('Health', target.hp, current.hp)}
  </div>`;
}

/* ── Before the war (combined gear + consumables) ─────────────────── */
function beforeTheWar(gap, stockpile, havePrices) {
  const gearTotal = gap.total || 0;
  const stockpileTotal = stockpile.total || 0;
  const grandTotal = gearTotal + stockpileTotal;
  const hasGearGap = gap.items.length > 0;
  const hasStockpile = stockpile.items.length > 0;

  if (!hasGearGap && !hasStockpile) {
    return `<div class="section">
      <div class="section-label">Before the war</div>
      <p class="placeholder-text ok">✓ Gear meets target and no consumables required.</p>
    </div>`;
  }

  let blocks = '';

  // Gear sub-block
  if (hasGearGap) {
    const rows = gap.items.map(it => {
      const fromCell = it.currentRarity
        ? `${rarityTag(it.currentRarity)}${escapeHtml(gearItemName(it.slot, it.currentRarity))}`
        : (it.currentCode
          ? `<span class="mono">${escapeHtml(it.currentCode)}</span>`
          : '<span class="muted">none</span>');
      const toCell = `${rarityTag(it.targetRarity)}${escapeHtml(gearItemName(it.slot, it.targetRarity))}`;
      return `<tr>
        <td>${SLOT_LABEL[it.slot]}</td>
        <td>${fromCell}</td>
        <td>${toCell}</td>
        <td class="num">${it.price != null ? fmtGold(it.price) : (havePrices ? '?' : '–')}</td>
      </tr>`;
    }).join('');

    const gearTotalLabel = gearTotal > 0 ? fmtGold(gearTotal) : 'prices unavailable';
    blocks += `<div class="sub-label">Gear<span class="right">${gearTotalLabel}</span></div>
      <table class="list">
        <thead><tr><th>Slot</th><th>From</th><th>To</th><th class="num">Price</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } else {
    blocks += `<div class="sub-label">Gear</div>
      <p class="placeholder-text ok">✓ Target rarity met in every slot.</p>`;
  }

  // Consumables sub-block
  if (hasStockpile) {
    const rows = stockpile.items.map(it => `
      <tr>
        <td>${escapeHtml(it.label)}</td>
        <td class="num">${fmtInt(it.qty)}</td>
        <td class="num">${it.unit != null ? fmtGold(it.unit) : (havePrices ? '?' : '–')}</td>
        <td class="num">${it.line != null ? fmtGold(it.line) : '–'}</td>
      </tr>
    `).join('');

    blocks += `<div class="sub-label">Consumables · ${stockpile.days} days × ${fmt(stockpile.hitsPerDay, 1)} hits/day<span class="right">${fmtGold(stockpileTotal)}</span></div>
      <table class="list">
        <thead><tr><th>Item</th><th class="num">Qty</th><th class="num">Unit</th><th class="num">Line</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  return `<div class="section">
    <div class="section-label">Before the war<span class="right">${fmtGold(grandTotal)} total</span></div>
    ${blocks}
    ${!havePrices ? '<p class="note">Live prices unavailable — codes shown for reference.</p>' : ''}
    ${stockpile.anyMissingPrice ? '<p class="note">Some consumable prices missing — total excludes those lines.</p>' : ''}
  </div>`;
}

/* ── Daily during war ─────────────────────────────────────────────── */
function dailyDuringWarSection(d, havePrices, hitsPerDay, params) {
  const incomeLines = [];
  if (d.factoriesHaveRevenue) {
    incomeLines.push({ label: 'Factory revenue', qty: null, value: d.factoryRevenue, cls: 'pos' });
  }
  if (d.factoriesHaveWage) {
    incomeLines.push({ label: 'Worker payroll (cost)', qty: null, value: -d.factoryWageCost, cls: 'neg' });
  }
  if (!d.factoriesHaveRevenue && !d.factoriesHaveWage) {
    incomeLines.push({ label: 'Factory data', value: null, qty: null, cls: 'unk', note: 'unavailable' });
  }
  incomeLines.push({ label: 'Working-for-others wage', qty: 'paused during war', value: 0, cls: 'neg' });

  const incomeTotal = (d.factoriesHaveRevenue ? d.factoryRevenue : 0)
                   - (d.factoriesHaveWage ? d.factoryWageCost : 0);

  const costLines = d.consumableLines.map(it => ({
    label: it.label,
    qty: it.qtyPerDay,
    value: it.linePerDay,
    cls: 'neg',
  }));

  const costTotal = d.consumablesDaily;
  const warNetEstimate = incomeTotal - costTotal;
  const burnVsPeace = d.peaceNet - warNetEstimate;

  const renderLine = (l) => {
    let valStr;
    if (l.value == null) valStr = `<span class="lv unk">${l.note || '?'}</span>`;
    else valStr = `<span class="lv ${l.cls}">${l.cls === 'neg' && l.value !== 0 ? fmtSigned(l.value < 0 ? l.value : -l.value) : (l.value === 0 ? '0 g' : fmtSigned(l.value))}</span>`;
    return `<div class="flow-line">
      <span class="ll">${escapeHtml(l.label)}${l.qty != null ? `<span class="qty">${typeof l.qty === 'number' ? '× ' + fmt(l.qty, 1) : l.qty}</span>` : ''}</span>
      ${valStr}
    </div>`;
  };

  const netClass = warNetEstimate >= 0 ? 'positive' : 'negative';

  // Tooltip content carries all the explanation that used to live in <p class="flow-note">.
  const peaceLine = d.hasOwnWage
    ? `Peacetime baseline: wage ${fmtGold(d.wageIncomePeace)}/day + factory net ${fmtSigned(d.factoryNet)} = ${fmtSigned(d.peaceNet)}/day.`
    : `Peacetime baseline: factory net ${fmtSigned(d.factoryNet)}/day (no current employment detected).`;
  const tip = `Assumes energy goes to fighting (no working-for-others wage). ${peaceLine} Factory revenue uses the tunable per-worker assumption noted in the Economy card; ingredient costs not modeled.`;

  return `<div class="section">
    <div class="section-label">Daily during war<button class="info-btn" type="button" data-tip="${escapeAttr(tip)}">?</button>
      <span class="right">vs peace: ${burnVsPeace >= 0 ? '−' : '+'}${fmtGold(Math.abs(burnVsPeace))}/day</span>
    </div>
    <div class="flow">
      <div class="flow-side">
        <h5>Income</h5>
        ${incomeLines.map(renderLine).join('')}
        <div class="flow-line flow-total">
          <span class="ll">Net income</span>
          <span class="lv ${incomeTotal >= 0 ? 'pos' : 'neg'}">${fmtSigned(incomeTotal)}</span>
        </div>
      </div>
      <div class="flow-side">
        <h5>Cost</h5>
        ${costLines.map(renderLine).join('')}
        <div class="flow-line flow-total">
          <span class="ll">Total cost</span>
          <span class="lv neg">${fmtSigned(-costTotal)}</span>
        </div>
      </div>
    </div>
    <div class="flow-net ${netClass}">
      <span>Estimated daily net during war</span>
      <span class="mono">${fmtSigned(warNetEstimate)}</span>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════
 *  STATUS / FLOW
 * ═══════════════════════════════════════════════════════════════════ */
function setStatus(kind, msg = '') {
  const el = $('#status');
  el.className = 'status' + (kind ? ' ' + kind : '');
  el.textContent = msg;
}

async function load(username) {
  if (!username) {
    setStatus('error', 'Enter a username.');
    return;
  }
  setStatus('', `Resolving "${username}"…`);
  $('#load-btn').disabled = true;
  $('#player').classList.add('hidden');
  $('#debug-panel').classList.add('hidden');
  try {
    const userId = await resolveUserId(username);
    if (!userId) throw new Error(`No user found for "${username}"`);
    setStatus('', `Loading profile…`);
    const data = await loadPlayer(userId);
    renderPlayer(data);
    const newQs = new URLSearchParams();
    newQs.set('u', username);
    if (DEBUG) newQs.set('debug', '1');
    history.replaceState(null, '', '?' + newQs.toString());
    setStatus('ok', `Loaded ${data.user?.username || username}.`);
  } catch (e) {
    console.error(e);
    setStatus('error', e.message || String(e));
  } finally {
    $('#load-btn').disabled = false;
  }
}

$('#load-btn').addEventListener('click', () => load($('#username').value.trim()));
$('#username').addEventListener('keydown', e => {
  if (e.key === 'Enter') load($('#username').value.trim());
});

const initialU = QS.get('u');
if (initialU) {
  $('#username').value = initialU;
  load(initialU);
} else {
  $('#username').focus();
}

if (DEBUG) console.log('Debug mode on. Add ?debug=1 to URL.');
</script>
</body>
</html>

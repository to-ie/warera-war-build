<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>War Readiness · we-ie.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d10;
    --surface: #14181d;
    --surface-2: #1c2128;
    --border: #2a313a;
    --border-strong: #3a424d;
    --text: #e8ecf0;
    --dim: #98a2b0;
    --dimmer: #6b7480;
    --accent: #4ad395;
    --accent-soft: rgba(74, 211, 149, 0.12);
    --warn: #f0c14b;
    --error: #f06060;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-size: 15px;
  }

  .topbar { border-bottom: 1px solid var(--border); background: var(--surface); }
  .topbar-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0.9rem 1.5rem;
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .brand h1 { margin: 0; font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em; }
  .brand .accent { color: var(--accent); }
  .brand .sub { color: var(--dimmer); font-size: 0.85rem; }

  main {
    flex: 1;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .search-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
    flex-wrap: wrap;
  }
  .search-row input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.85rem;
    border-radius: 6px;
    font: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-row input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search-row button {
    background: var(--accent);
    border: 0;
    color: #07120c;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .search-row button:hover:not(:disabled) { background: #5fdfa6; }
  .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    min-height: 1.3rem;
    font-size: 0.85rem;
    color: var(--dim);
    margin-bottom: 1rem;
  }
  .status.error { color: var(--error); }
  .status.ok { color: var(--accent); }

  .player-head {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 1rem;
  }
  .avatar {
    width: 56px;
    height: 56px;
    border-radius: 8px;
    background: var(--surface-2);
    flex-shrink: 0;
    object-fit: cover;
  }
  .player-name { margin: 0 0 0.2rem 0; font-size: 1.2rem; font-weight: 600; }
  .player-meta { margin: 0; font-size: 0.9rem; color: var(--dim); }
  .pill {
    display: inline-block;
    padding: 0.1rem 0.55rem;
    background: var(--surface-2);
    border-radius: 4px;
    margin-right: 0.35rem;
    margin-bottom: 0.2rem;
    font-size: 0.8rem;
  }
  .pill .mono { font-family: var(--mono); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem 1.25rem;
  }
  .card h3 {
    margin: 0 0 1rem 0;
    font-size: 1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .badge {
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.18rem 0.55rem;
    border-radius: 999px;
    font-family: var(--mono);
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
    gap: 0.5rem;
    margin-bottom: 1.1rem;
  }
  .stat {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.55rem 0.7rem;
    text-align: left;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 4.5em;
  }
  .stat-label {
    display: block;
    color: var(--dim);
    font-size: 0.72rem;
    line-height: 1.3;
    margin-bottom: 0.35rem;
    overflow-wrap: break-word;
    hyphens: auto;
  }
  .stat-value {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 0.95rem;
  }

  /* DELTA — inline change vs current state */
  .delta {
    font-size: 0.72rem;
    font-weight: 500;
    margin-left: 0.25rem;
    font-family: var(--mono);
    white-space: nowrap;
  }
  .delta.positive { color: var(--accent); }
  .delta.negative { color: var(--error); }
  .delta.neutral  { color: var(--dimmer); }

  /* COLLAPSIBLE SECTIONS — caret on left */
  .state-section { margin: 0; margin-top: 1.5rem; }
  .state-section:first-of-type { margin-top: 0; }
  .state-section > summary {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    cursor: pointer;
    padding: 0.5rem 0 0.85rem;
    list-style: none;
    user-select: none;
  }
  .state-section > summary::-webkit-details-marker { display: none; }
  .state-section > summary > .caret {
    color: var(--dim);
    transition: transform 0.2s;
    font-size: 0.85rem;
    flex-shrink: 0;
    display: inline-block;
  }
  .state-section > summary > h2 {
    margin: 0;
    font-size: 1.05rem;
    font-weight: 600;
  }
  .state-section > summary > h2 .sub {
    color: var(--dimmer);
    font-weight: 400;
    font-size: 0.85rem;
    margin-left: 0.5rem;
  }
  .state-section:not([open]) > summary > .caret { transform: rotate(-90deg); }

  /* PRESET PICKER */
  .picker {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
  }
  .picker button {
    flex: 1;
    min-width: 130px;
    padding: 0.6rem 0.9rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.15s;
  }
  .picker button:hover { border-color: var(--accent); }
  .picker button.active {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }
  .preset-tagline {
    color: var(--dim);
    font-size: 0.88rem;
    margin: 0 0 1rem 0;
    font-style: italic;
  }

  .section { margin-top: 1rem; }
  .section:first-child { margin-top: 0; }
  .section-label {
    text-transform: uppercase;
    color: var(--dimmer);
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    margin-bottom: 0.45rem;
    font-weight: 500;
  }
  .section-label .right {
    float: right;
    color: var(--text);
    font-family: var(--mono);
    letter-spacing: 0;
    text-transform: none;
  }

  .skills { display: grid; gap: 0.3rem; font-size: 0.85rem; }
  .skill {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.6rem;
    padding: 0.4rem 0.6rem;
    background: var(--surface-2);
    border-radius: 4px;
  }
  .skill-name { color: var(--dim); }
  .skill-value { font-family: var(--mono); font-weight: 500; text-align: right; }
  .skill-value .sub { color: var(--dimmer); font-weight: 400; }
  .skill-value .total { color: var(--text); }

  /* TABLES */
  table.list { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  table.list th, table.list td {
    text-align: left;
    padding: 0.4rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  table.list th {
    color: var(--dimmer);
    font-weight: 500;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  table.list td.mono { font-family: var(--mono); }
  table.list td.num,
  table.list th.num { text-align: right; font-family: var(--mono); }
  table.list th.num { font-family: inherit; }
  table.list tr:last-child td { border-bottom: 0; }
  table.list tr.empty td { color: var(--dimmer); font-style: italic; }

  .placeholder-text {
    font-size: 0.85rem;
    color: var(--dim);
    margin: 0.25rem 0 0;
    padding: 0.5rem 0.7rem;
    background: var(--surface-2);
    border-radius: 6px;
    border-left: 2px solid var(--border-strong);
  }

  .note {
    font-size: 0.8rem;
    color: var(--dimmer);
    font-style: italic;
    margin-top: 0.9rem;
  }
  .hidden { display: none !important; }
  .muted { color: var(--dim); }

  /* INFO TOOLTIP */
  .info-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--dim);
    font-size: 0.7rem;
    font-weight: 600;
    cursor: help;
    margin-left: 0.4rem;
    position: relative;
    padding: 0;
    vertical-align: middle;
    font-family: inherit;
    line-height: 1;
  }
  .info-btn:hover, .info-btn:focus {
    outline: none;
    color: var(--accent);
    border-color: var(--accent);
  }
  .info-btn::after {
    content: attr(data-tip);
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: var(--surface-2);
    border: 1px solid var(--border-strong);
    padding: 0.6rem 0.8rem;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 400;
    white-space: normal;
    width: 240px;
    text-align: left;
    color: var(--text);
    line-height: 1.45;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 10;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .info-btn:hover::after, .info-btn:focus::after { opacity: 1; }

  details.debug {
    margin-top: 1rem;
    padding: 0.6rem 0.85rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  details.debug summary { cursor: pointer; font-size: 0.8rem; color: var(--dim); }
  details.debug pre {
    margin: 0.6rem 0 0;
    overflow: auto;
    background: var(--bg);
    padding: 0.6rem;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--dim);
    max-height: 400px;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 1rem 1.5rem;
    color: var(--dim);
    font-size: 0.85rem;
    text-align: center;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
  footer .sep { margin: 0 0.5rem; color: var(--border-strong); }

  /* MOBILE */
  @media (max-width: 600px) {
    body { font-size: 14px; }
    main { padding: 1rem; }
    .topbar-inner { padding: 0.75rem 1rem; }
    .card { padding: 0.9rem 1rem; }
    .stats { grid-template-columns: repeat(auto-fit, minmax(78px, 1fr)); gap: 0.4rem; }
    .stat { padding: 0.45rem 0.55rem; }
    .stat-label { font-size: 0.7rem; }
    .stat-value { font-size: 0.9rem; }
    .skills { font-size: 0.8rem; }
    .skill { padding: 0.4rem 0.5rem; }
    table.list { font-size: 0.78rem; }
    table.list th, table.list td { padding: 0.35rem 0.4rem; }
    .player-head { padding: 0.85rem 1rem; }
    .player-name { font-size: 1.1rem; }
    .info-btn::after { width: 200px; left: auto; right: 0; }
    .picker button { min-width: 0; flex: 1 1 calc(50% - 0.25rem); font-size: 0.85rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <h1>War <span class="accent">Readiness</span></h1>
    </div>
    <span class="brand sub">build planner for warera.io · v0.2</span>
  </div>
</div>

<main>
  <div class="search-row">
    <input id="username" placeholder="warera username..." autocomplete="off" spellcheck="false">
    <button id="load-btn">Load profile</button>
  </div>
  <div id="status" class="status"></div>

  <div id="player" class="hidden">
    <div class="player-head">
      <img id="avatar" class="avatar" alt="" hidden>
      <div>
        <h2 id="player-name" class="player-name"></h2>
        <p id="player-meta" class="player-meta"></p>
      </div>
    </div>

    <details class="state-section" open>
      <summary>
        <span class="caret">▾</span>
        <h2>Your current state</h2>
      </summary>
      <div class="grid">
        <div class="card">
          <h3>
            <span>Combat <button class="info-btn" type="button" aria-label="About this section" data-tip="Your damage output and survivability. Attack = damage per hit · Precision = accuracy · Crit chance / Crit damage = how often and how hard crits hit · Armor / Dodge = damage reduction. Values include gear but not active buffs.">?</button></span>
            <span class="badge" id="combat-badge"></span>
          </h3>
          <div id="combat-content"></div>
        </div>
        <div class="card">
          <h3>
            <span>Economy <button class="info-btn" type="button" aria-label="About this section" data-tip="Your daily income engine. Energy and Entrepreneurship cap your daily actions · Production = PP earned per action · Companies = factory cap · Management = worker cap.">?</button></span>
            <span class="badge" id="economy-badge"></span>
          </h3>
          <div id="economy-content"></div>
        </div>
      </div>
    </details>

    <details class="state-section" id="target-section" open>
      <summary>
        <span class="caret">▾</span>
        <h2>Target build <button class="info-btn" type="button" aria-label="About this section" data-tip="Pick a target loadout below. The Target combat panel shows what your stats would be with that loadout · the What to do panel lists the gear to buy, with live market prices.">?</button></span>
      </summary>
      <div id="target-content"></div>
    </details>

    <details class="debug hidden" id="debug-panel">
      <summary>Raw API responses (debug mode)</summary>
      <pre id="debug-content"></pre>
    </details>
  </div>
</main>

<footer>
  Made with <span style="color: var(--accent);">♥</span> by toie.
  <span class="sep">·</span>
  Data via <a href="https://gateway.warerastats.io/" target="_blank" rel="noopener">War Era Gateway</a>.
  <span class="sep">·</span>
  Sibling of <a href="https://tools.we-ie.com/" target="_blank" rel="noopener">tools.we-ie.com</a>.
</footer>

<script>
/* ═══════════════════════════════════════════════════════════════════
 *  CONFIG
 * ═══════════════════════════════════════════════════════════════════ */
const CFG = {
  API: 'https://warera-proxy.toie.workers.dev/trpc',
  GAME: 'https://app.warera.io',
};
const QS = new URLSearchParams(location.search);
const DEBUG = QS.has('debug');

/* ═══════════════════════════════════════════════════════════════════
 *  UTILITIES
 * ═══════════════════════════════════════════════════════════════════ */
const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmt(n, d = 2) {
  if (n == null || isNaN(n)) return '–';
  return Number(n).toLocaleString(undefined, {
    minimumFractionDigits: d, maximumFractionDigits: d
  });
}
function fmtInt(n) {
  if (n == null || isNaN(n)) return '–';
  return Math.round(Number(n)).toLocaleString();
}
function flag(code) {
  if (!code || code.length !== 2) return '🏳️';
  return code.toUpperCase().split('').map(c =>
    String.fromCodePoint(c.charCodeAt(0) - 65 + 0x1F1E6)
  ).join('');
}
function midpoint([min, max]) { return (min + max) / 2; }

/* ═══════════════════════════════════════════════════════════════════
 *  TRPC CLIENT — bare input, single or batched response.
 * ═══════════════════════════════════════════════════════════════════ */
async function trpc(endpoint, params = {}) {
  const input = encodeURIComponent(JSON.stringify(params));
  const url = `${CFG.API}/${endpoint}?input=${input}`;
  if (DEBUG) console.log(`→ ${endpoint}`, params);
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${endpoint} HTTP ${res.status}`);
  const json = await res.json();
  if (DEBUG) console.log(`← ${endpoint}`, json);
  const item = Array.isArray(json) ? json[0] : json;
  if (item?.error) throw new Error(`${endpoint}: ${item.error.message || 'error'}`);
  const d = item?.result?.data;
  return d?.json ?? d ?? item;
}

/* ═══════════════════════════════════════════════════════════════════
 *  GAME CONSTANTS
 * ═══════════════════════════════════════════════════════════════════ */
const ECO_BASE = { energy: 30, entrepreneurship: 30, production: 10, companies: 2, management: 4 };
const ECO_GAIN = { energy: 10, entrepreneurship: 5, production: 3, companies: 1, management: 2 };
const FIGHT_KEYS = ['attack','precision','criticalChance','criticalDamages','armor','dodge','health','lootChance','hunger'];
const ECO_KEYS = ['energy','entrepreneurship','production','companies','management'];

function pointsForLevel(level) { return (level * (level + 1)) / 2; }
function pointsSpent(levels, keys) {
  return keys.reduce((s, k) => s + pointsForLevel(levels[k] || 0), 0);
}

/* GEAR STAT RANGES — from in-game craft screens (toie's screenshots).
   Values are [min, max] of the stat range per rarity. Midpoint used
   for "expected craft" planning. Sources are in-game tooltips, so they
   should hold unless balance changes. */
const GEAR_STATS = {
  common:    { weapon: { attack: [21,40],  crit: [1,5] },   helmet: { critDamage: [1,15] },   chest: { armor: [1,5] },   pants: { armor: [1,5] },   boots: { dodge: [1,5] },   gloves: { precision: [1,5] } },
  uncommon:  { weapon: { attack: [51,60],  crit: [6,10] },  helmet: { critDamage: [16,30] },  chest: { armor: [6,10] },  pants: { armor: [6,10] },  boots: { dodge: [6,10] },  gloves: { precision: [6,10] } },
  rare:      { weapon: { attack: [71,90],  crit: [11,15] }, helmet: { critDamage: [31,50] },  chest: { armor: [11,15] }, pants: { armor: [11,15] }, boots: { dodge: [11,15] }, gloves: { precision: [11,15] } },
  epic:      { weapon: { attack: [101,130], crit: [16,20] }, helmet: { critDamage: [71,90] },  chest: { armor: [21,30] }, pants: { armor: [21,30] }, boots: { dodge: [21,25] }, gloves: { precision: [21,25] } },
  legendary: { weapon: { attack: [141,170], crit: [26,35] }, helmet: { critDamage: [91,110] }, chest: { armor: [36,50] }, pants: { armor: [36,50] }, boots: { dodge: [31,40] }, gloves: { precision: [31,40] } },
  mythic:    { weapon: { attack: [221,300], crit: [41,50] }, helmet: { critDamage: [121,150] },chest: { armor: [56,70] }, pants: { armor: [56,70] }, boots: { dodge: [51,60] }, gloves: { precision: [51,60] } },
};

/* ITEM CODES — verified against toie's inventory: numeric suffix = rarity
   index (1=common ... 6=mythic). Weapon names are unique. Codes will be
   cross-checked against itemTrading.getPrices when prices are fetched. */
const RARITY_BY_INDEX = ['', 'common', 'uncommon', 'rare', 'epic', 'legendary', 'mythic'];
const WEAPON_BY_RARITY = { common: 'knife', uncommon: 'gun', rare: 'rifle', epic: 'sniper', legendary: 'tank', mythic: 'fighterJet' };

function itemCode(slot, rarity) {
  if (slot === 'weapon') return WEAPON_BY_RARITY[rarity];
  return `${slot}${RARITY_BY_INDEX.indexOf(rarity)}`;
}

function rarityFromCode(code) {
  if (!code) return null;
  const m = String(code).match(/(\d)$/);
  if (m) return RARITY_BY_INDEX[parseInt(m[1], 10)] || null;
  const byWeapon = Object.entries(WEAPON_BY_RARITY).find(([, c]) => c === code);
  return byWeapon ? byWeapon[0] : null;
}

function rarityIndex(rarity) { return RARITY_BY_INDEX.indexOf(rarity); }

/* BUFFS */
const BUFFS = {
  pill:  { damageMult: 1.60 },
  ammo:  { none: 1.00, light: 1.10, ammo: 1.20, heavy: 1.40 },  // damage multipliers
  food:  { none: 0,    bread: 0.10, steak: 0.15, fish: 0.20 },  // HP percent bonuses
};
const AMMO_CODES = { light: 'lightAmmo', ammo: 'ammo', heavy: 'heavyAmmo' };
const FOOD_CODES = { bread: 'bread', steak: 'steak', fish: 'fish' };
const PILL_CODE  = 'pill';

/* PRESETS — three opinionated build targets. Each defines gear by
   rarity per slot, the consumables that should be active during war,
   and a short tagline shown under the picker. */
const PRESETS = {
  basic: {
    name: 'War Basic',
    tagline: 'Sustainable build — keep fighting while staying profit-positive. Recommended baseline.',
    gear: { weapon: 'rare', helmet: 'rare', chest: 'rare', pants: 'rare', boots: 'rare', gloves: 'rare' },
    buffs: { pill: false, ammo: 'light', food: 'steak' },
  },
  highDamage: {
    name: 'War High-Damage',
    tagline: 'Pill active. Legendary weapon + boots, Epic everything else. Burns gold for output.',
    gear: { weapon: 'legendary', helmet: 'epic', chest: 'epic', pants: 'epic', boots: 'legendary', gloves: 'epic' },
    buffs: { pill: true, ammo: 'ammo', food: 'fish' },
  },
  debuff: {
    name: 'War Debuff',
    tagline: 'For pill cooldown windows. Same gear as Basic, no pill, cheap ammo. Reduces bleed while you wait.',
    gear: { weapon: 'rare', helmet: 'rare', chest: 'rare', pants: 'rare', boots: 'rare', gloves: 'rare' },
    buffs: { pill: false, ammo: 'light', food: 'steak' },
  },
};

let selectedPreset = 'basic';

/* ═══════════════════════════════════════════════════════════════════
 *  DATA LOAD
 * ═══════════════════════════════════════════════════════════════════ */
async function resolveUserId(input) {
  const t = input.trim();
  if (!t) return null;
  if (/^[a-f0-9]{24}$/i.test(t)) return t;
  const r = await trpc('search.searchAnything', { searchText: t });
  const userIds = r?.userIds || [];
  if (!userIds.length) return null;
  return userIds[0];
}

async function loadPlayer(userId) {
  const [user, inventory, companyList, pricesR] = await Promise.allSettled([
    trpc('user.getUserById', { userId }),
    trpc('inventory.fetchCurrentEquipment', { userId }),
    trpc('company.getCompanies', { userId, perPage: 50 }),
    trpc('itemTrading.getPrices'),
  ]);

  const u = user.status === 'fulfilled' ? user.value : null;
  const ids = companyList.status === 'fulfilled' ? (companyList.value?.items || []) : [];

  const secondary = await Promise.allSettled([
    ...ids.map(id => trpc('company.getById', { companyId: id })),
    u?.country ? trpc('country.getCountryById', { countryId: u.country }) : Promise.resolve(null),
    u?.mu ? trpc('mu.getById', { muId: u.mu }) : Promise.resolve(null),
  ]);

  const companies = secondary.slice(0, ids.length)
    .filter(r => r.status === 'fulfilled')
    .map(r => r.value);
  const country = secondary[ids.length]?.status === 'fulfilled' ? secondary[ids.length].value : null;
  const mu = secondary[ids.length + 1]?.status === 'fulfilled' ? secondary[ids.length + 1].value : null;

  return {
    userId,
    user: u,
    userError: user.status === 'rejected' ? String(user.reason?.message || user.reason) : null,
    inventory: inventory.status === 'fulfilled' ? inventory.value : null,
    inventoryError: inventory.status === 'rejected' ? String(inventory.reason?.message || inventory.reason) : null,
    companies,
    companiesError: companyList.status === 'rejected' ? String(companyList.reason?.message || companyList.reason) : null,
    country, mu,
    prices: pricesR.status === 'fulfilled' ? normalizePrices(pricesR.value) : {},
    pricesError: pricesR.status === 'rejected' ? String(pricesR.reason?.message || pricesR.reason) : null,
  };
}

/* itemTrading.getPrices may return { prices: {...} }, { items: [...] },
   or a flat map. Normalize to { itemCode: number }. */
function normalizePrices(raw) {
  if (!raw) return {};
  if (Array.isArray(raw)) {
    const out = {};
    raw.forEach(item => {
      const code = item?.itemCode || item?.code || item?.item;
      const price = item?.price ?? item?.value;
      if (code && price != null) out[code] = price;
    });
    return out;
  }
  if (raw.prices && typeof raw.prices === 'object') return raw.prices;
  if (typeof raw === 'object') return raw;
  return {};
}

/* ═══════════════════════════════════════════════════════════════════
 *  EXTRACTION
 * ═══════════════════════════════════════════════════════════════════ */
function extractPlayer(data) {
  const u = data.user || {};
  const s = u.skills || {};
  const lv = u.leveling || {};
  const grab = (k, prop = 'level') => s[k]?.[prop] ?? 0;
  return {
    userId: data.userId,
    username: u.username || '?',
    avatarUrl: u.avatarUrl,
    level: lv.level ?? '?',
    militaryRank: u.militaryRank,
    militaryRankPercent: s.attack?.militaryRankPercent ?? 0,
    totalSp: lv.totalSkillPoints ?? 0,
    spentSp: lv.spentSkillPoints ?? 0,
    availableSp: lv.availableSkillPoints ?? 0,
    levels: Object.fromEntries(
      [...FIGHT_KEYS, ...ECO_KEYS].map(k => [k, grab(k, 'level')])
    ),
    derived: {
      atk: grab('attack', 'total'),
      prc: grab('precision', 'total'),
      cc:  grab('criticalChance', 'total'),
      cd:  grab('criticalDamages', 'total'),
      armRaw: grab('armor', 'total'),
      arm: s.armor?.totalAfterSoftCap ?? s.armor?.total ?? 0,
      ddgRaw: grab('dodge', 'total'),
      ddg: s.dodge?.totalAfterSoftCap ?? s.dodge?.total ?? 0,
      hp:  grab('health', 'total') || 100,
      loot: grab('lootChance', 'total'),
      hunger: grab('hunger', 'total') || 4,
    },
    eco: {
      energy: grab('energy', 'total'),
      entrepreneurship: grab('entrepreneurship', 'total'),
      production: grab('production', 'total'),
      companies: grab('companies', 'total'),
      management: grab('management', 'total'),
    },
  };
}

function extractEquipment(inv) {
  const slot = key => {
    const p = inv?.[key];
    if (!p) return null;
    return {
      code: p.code ?? '?',
      durability: p.state != null ? Math.round((p.state / (p.maxState || 100)) * 100) : null,
      skills: p.skills || {},
    };
  };
  return {
    weapon: slot('weapon'),
    helmet: slot('helmet'),
    chest: slot('chest'),
    pants: slot('pants'),
    boots: slot('boots'),
    gloves: slot('gloves'),
  };
}

function extractCompanies(comps) {
  const items = Array.isArray(comps) ? comps : [];
  return items.map(co => ({
    id: co._id,
    name: co.name ?? '?',
    itemCode: co.itemCode ?? '?',
    aeLevel: co.activeUpgradeLevels?.automatedEngine ?? null,
    storageLevel: co.activeUpgradeLevels?.storage ?? null,
    breakRoomLevel: co.activeUpgradeLevels?.breakRoom ?? null,
    production: co.production ?? null,
    workerCount: co.workerCount ?? 0,
    estimatedValue: co.estimatedValue ?? null,
  }));
}

/* ═══════════════════════════════════════════════════════════════════
 *  TARGET BUILD MATH
 * ═══════════════════════════════════════════════════════════════════ */
function computeTargetStats(preset, militaryRankPercent = 0) {
  const g = preset.gear;
  const b = preset.buffs;
  const gs = r => GEAR_STATS[r];

  const weaponAtk  = midpoint(gs(g.weapon).weapon.attack);
  const weaponCrit = midpoint(gs(g.weapon).weapon.crit);
  const helmetCD   = midpoint(gs(g.helmet).helmet.critDamage);
  const chestArm   = midpoint(gs(g.chest).chest.armor);
  const pantsArm   = midpoint(gs(g.pants).pants.armor);
  const bootsDdg   = midpoint(gs(g.boots).boots.dodge);
  const glovesPrc  = midpoint(gs(g.gloves).gloves.precision);

  const pillMult = b.pill ? BUFFS.pill.damageMult : 1;
  const ammoMult = BUFFS.ammo[b.ammo] ?? 1;
  const foodHp   = BUFFS.food[b.food] ?? 0;
  const rankMult = 1 + militaryRankPercent / 100;

  const armRaw = chestArm + pantsArm;
  const ddgRaw = bootsDdg;

  return {
    atk: (100 + weaponAtk) * ammoMult * pillMult * rankMult,
    prc: 50 + glovesPrc,
    cc:  10 + weaponCrit,
    cd:  100 + helmetCD,
    armRaw,
    arm: armRaw / (armRaw + 40) * 100,
    ddgRaw,
    ddg: ddgRaw / (ddgRaw + 40) * 100,
    hp:  100 * (1 + foodHp),
  };
}

function computeBuyGap(currentEq, preset, prices) {
  const slots = ['weapon', 'helmet', 'chest', 'pants', 'boots', 'gloves'];
  const out = [];
  let total = 0;
  for (const slot of slots) {
    const targetRarity = preset.gear[slot];
    const targetCode = itemCode(slot, targetRarity);
    const currentCode = currentEq?.[slot]?.code;
    const currentRarity = rarityFromCode(currentCode);

    // Need to buy if missing, or if current rarity is lower than target
    const needsBuy = !currentCode ||
      currentCode === '?' ||
      (currentRarity && rarityIndex(currentRarity) < rarityIndex(targetRarity)) ||
      (!currentRarity);

    if (needsBuy) {
      const price = prices?.[targetCode];
      out.push({
        slot,
        currentCode: currentCode && currentCode !== '?' ? currentCode : null,
        currentRarity,
        targetCode,
        targetRarity,
        price: price != null ? Number(price) : null,
      });
      if (price != null) total += Number(price);
    }
  }
  return { items: out, total };
}

/* ═══════════════════════════════════════════════════════════════════
 *  ECO MATH
 * ═══════════════════════════════════════════════════════════════════ */
function actionsPerDay(bar, usagePct = 1) {
  return Math.floor(bar / 10) * 2.4 * usagePct;
}

/* ═══════════════════════════════════════════════════════════════════
 *  RENDER — PLAYER HEADER
 * ═══════════════════════════════════════════════════════════════════ */
function renderPlayer(data) {
  if (!data.user) {
    setStatus('error', `Could not load user. ${data.userError || ''}`);
    return;
  }
  const p = extractPlayer(data);

  const av = $('#avatar');
  if (p.avatarUrl) { av.src = p.avatarUrl; av.hidden = false; }
  else { av.hidden = true; }
  $('#player-name').textContent = p.username;

  const meta = [];
  meta.push(`<span class="pill">Level <span class="mono">${p.level}</span></span>`);
  const cc = data.country?.code;
  if (cc) meta.push(`<span class="pill">${flag(cc)} ${escapeHtml(cc.toUpperCase())}</span>`);
  const muName = data.mu?.name;
  if (muName) meta.push(`<span class="pill">${escapeHtml(muName)}</span>`);
  if (p.militaryRank != null) {
    meta.push(`<span class="pill">Rank <span class="mono">${p.militaryRank}</span></span>`);
  }
  $('#player-meta').innerHTML = meta.join(' ');

  renderCombat(p, data);
  renderEconomy(p, data);
  renderTargetBuild(p, data);

  if (DEBUG) {
    $('#debug-panel').classList.remove('hidden');
    $('#debug-content').textContent = JSON.stringify({
      userId: data.userId,
      user: data.user,
      inventory: data.inventory,
      companies: data.companies,
      country: data.country,
      mu: data.mu,
      prices: data.prices,
      errors: {
        user: data.userError,
        inventory: data.inventoryError,
        companies: data.companiesError,
        prices: data.pricesError,
      }
    }, null, 2);
  }

  $('#player').classList.remove('hidden');
}

/* ═══════════════════════════════════════════════════════════════════
 *  RENDER — COMBAT CARD
 * ═══════════════════════════════════════════════════════════════════ */

    return;
  }
  const eq = extractEquipment(data.inventory);
  const d = p.derived;
  const fightPts = pointsSpent(p.levels, FIGHT_KEYS);

  $('#combat-content').innerHTML = `
    <div class="stats">
      <div class="stat"><span class="stat-label">Attack</span><span class="stat-value">${fmtInt(d.atk)}</span></div>
      <div class="stat"><span class="stat-label">Precision</span><span class="stat-value">${fmtInt(d.prc)}%</span></div>
      <div class="stat"><span class="stat-label">Crit chance</span><span class="stat-value">${fmtInt(d.cc)}%</span></div>
      <div class="stat"><span class="stat-label">Crit damage</span><span class="stat-value">${fmtInt(d.cd)}%</span></div>
      <div class="stat"><span class="stat-label">Armor</span><span class="stat-value">${fmtInt(d.arm)}%</span></div>
      <div class="stat"><span class="stat-label">Dodge</span><span class="stat-value">${fmtInt(d.ddg)}%</span></div>
      <div class="stat"><span class="stat-label">Health</span><span class="stat-value">${fmtInt(d.hp)}</span></div>
    </div>

    <div class="section">
      <div class="section-label">Fight skills · ${fightPts}/${p.spentSp + p.availableSp} pts</div>
      <div class="skills">
        ${skillRow('🗡️ Attack', p.levels.attack)}
        ${skillRow('🎯 Precision', p.levels.precision)}
        ${skillRow('✨ Crit chance', p.levels.criticalChance)}
        ${skillRow('💥 Crit damage', p.levels.criticalDamages)}
        ${skillRow('🛡️ Armor', p.levels.armor)}
        ${skillRow('💨 Dodge', p.levels.dodge)}
        ${skillRow('❤️ Health', p.levels.health)}
        ${skillRow('💼 Loot chance', p.levels.lootChance)}
        ${skillRow('🍔 Hunger', p.levels.hunger)}
      </div>
    </div>

    <div class="section">
      <div class="section-label">Equipped gear</div>
      ${equipmentTable(eq)}

function skillRow(label, value) {
  return `<div class="skill"><span class="skill-name">${label}</span><span class="skill-value">${value}</span></div>`;
}

const STAT_LABELS = {
  attack: 'attack',
  criticalChance: 'crit chance',
  criticalDamages: 'crit damage',
  armor: 'armor',
  dodge: 'dodge',
  precision: 'precision',
};

function equipmentTable(eq) {
  const slots = [
    ['weapon', '🗡️ Weapon', ['attack', 'criticalChance']],
    ['helmet', '⛑️ Helmet', ['criticalDamages']],
    ['chest',  '🦺 Chest',  ['armor']],
    ['pants',  '👖 Pants',  ['armor']],
    ['boots',  '👢 Boots',  ['dodge']],
    ['gloves', '🧤 Gloves', ['precision']],
  ];
  const rows = slots.map(([key, label, statKeys]) => {
    const item = eq[key];
    if (!item) return `<tr class="empty"><td>${label}</td><td colspan="3">empty</td></tr>`;
    const statStr = statKeys
      .map(sk => {
        const v = item.skills[sk];
        return v ? `${fmtInt(v)} ${STAT_LABELS[sk] || sk}` : null;
      })
      .filter(Boolean)
      .join(', ') || '–';
    return `<tr>
      <td>${label}</td>
      <td class="mono">${escapeHtml(item.code)}</td>
      <td>${statStr}</td>
      <td class="num">${item.durability != null ? fmtInt(item.durability) + '%' : '–'}</td>
    </tr>`;
  });
  return `<table class="list">
    <thead><tr><th>Slot</th><th>Item</th><th>Stat</th><th class="num">Durability</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

/* ═══════════════════════════════════════════════════════════════════
 *  RENDER — ECONOMY CARD
 * ═══════════════════════════════════════════════════════════════════ */
function renderEconomy(p, data) {
  if (data.companiesError) {
    $('#economy-content').innerHTML = `<p class="muted">Could not load companies: <code>${escapeHtml(data.companiesError)}</code></p>`;
    return;
  }

  const comps = extractCompanies(data.companies);
  const eco = p.eco;
  const ecoPts = pointsSpent(p.levels, ECO_KEYS);

  const workActions = actionsPerDay(eco.energy, 1);
  const workPP = workActions * eco.production;
  const entreActions = actionsPerDay(eco.entrepreneurship, 1);
  const entrePP = entreActions * eco.production;

  $('#economy-content').innerHTML = `
    <div class="stats">
      <div class="stat"><span class="stat-label">Energy</span><span class="stat-value">${eco.energy}</span></div>
      <div class="stat"><span class="stat-label">Entrepreneurship</span><span class="stat-value">${eco.entrepreneurship}</span></div>
      <div class="stat"><span class="stat-label">Production</span><span class="stat-value">${eco.production}</span></div>
      <div class="stat"><span class="stat-label">Companies</span><span class="stat-value">${eco.companies}</span></div>
      <div class="stat"><span class="stat-label">Management</span><span class="stat-value">${eco.management}</span></div>
    </div>

    <div class="section">
      <div class="section-label">Eco skills · ${ecoPts}/${p.spentSp + p.availableSp} pts</div>
      <div class="skills">
        ${skillRow('⚡ Energy', p.levels.energy)}
        ${skillRow('💼 Entrepreneurship', p.levels.entrepreneurship)}
        ${skillRow('🏭 Production', p.levels.production)}
        ${skillRow('🏢 Companies', p.levels.companies)}
        ${skillRow('👤 Management', p.levels.management)}
      </div>
    </div>

    <div class="section">
      <div class="section-label">Daily production points</div>
      <div class="skills">
        <div class="skill">
          <span class="skill-name">Working for others</span>
          <span class="skill-value"><span class="sub">${fmt(workActions, 1)} actions × ${eco.production} =</span> <span class="total">${fmt(workPP, 1)} pp</span></span>
        </div>
        <div class="skill">
          <span class="skill-name">Self-work in your factories</span>
          <span class="skill-value"><span class="sub">${fmt(entreActions, 1)} actions × ${eco.production} =</span> <span class="total">${fmt(entrePP, 1)} pp</span></span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Factories · ${comps.length}/${eco.companies}</div>
      ${companiesTable(comps)}
    </div>
  `;
  $('#economy-badge').textContent = `${comps.length}/${eco.companies} factories`;
}

function companiesTable(comps) {
  if (!comps.length) {
    return `<p class="muted" style="font-size:0.85rem; margin:0;">No companies found.</p>`;
  }
  const rows = comps.map(c => `
    <tr>
      <td>${escapeHtml(c.name)}</td>
      <td class="mono">${escapeHtml(c.itemCode)}</td>
      <td>${c.aeLevel != null ? 'AE ' + c.aeLevel : '–'}</td>
      <td>${c.workerCount}</td>
      <td class="num">${c.production != null ? fmt(c.production, 1) : '–'}</td>
    </tr>
  `);
  return `<table class="list">
    <thead><tr><th>Name</th><th>Item</th><th>Engine</th><th>Workers</th><th class="num">Stored</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

/* ═══════════════════════════════════════════════════════════════════
 *  RENDER — TARGET BUILD SECTION
 * ═══════════════════════════════════════════════════════════════════ */
function renderTargetBuild(p, data) {
  const preset = PRESETS[selectedPreset];
  const target = computeTargetStats(preset, p.militaryRankPercent);
  const current = p.derived;
  const eq = extractEquipment(data.inventory);
  const gap = computeBuyGap(eq, preset, data.prices);

  const buffsLine = describeBuffs(preset.buffs);

  $('#target-content').innerHTML = `
    <div class="picker">
      ${Object.entries(PRESETS).map(([key, ps]) => `
        <button type="button" data-preset="${key}" class="${key === selectedPreset ? 'active' : ''}">${escapeHtml(ps.name)}</button>
      `).join('')}
    </div>
    <p class="preset-tagline">${escapeHtml(preset.tagline)}</p>

    <div class="grid">
      <div class="card">
        <h3>
          <span>Target combat</span>
          <span class="badge">${fmtInt(target.atk)} attack</span>
        </h3>
        ${targetStatsBlock(target, current)}
        <div class="section">
          <div class="section-label">Active during fighting</div>
          <p class="placeholder-text">${escapeHtml(buffsLine)}</p>
        </div>
      </div>

      <div class="card">
        <h3><span>What to do</span></h3>
        ${gapBuyNow(gap, !!data.prices && Object.keys(data.prices).length > 0)}
        <div class="section">
          <div class="section-label">Stockpile for the war week</div>
          <p class="placeholder-text">Pills, ammo, food needed for an N-day war — netted against your factory output. Coming next.</p>
        </div>
        <div class="section">
          <div class="section-label">Daily during war</div>
          <p class="placeholder-text">Running cost (ammo + food + pill + gear wear) vs running income (factory revenue + wage). Coming next.</p>
        </div>
      </div>
    </div>
  `;

  // Picker wiring
  $$('#target-content .picker button').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedPreset = btn.dataset.preset;
      renderTargetBuild(p, data);
    });
  });
}

function describeBuffs(buffs) {
  const parts = [];
  if (buffs.pill) parts.push('Pill (+60% damage)');
  const ammoLabel = { light: 'Light Ammo (+10% damage)', ammo: 'Ammo (+20% damage)', heavy: 'Heavy Ammo (+40% damage)' }[buffs.ammo];
  if (ammoLabel) parts.push(ammoLabel);
  const foodLabel = { bread: 'Bread (+10% health)', steak: 'Steak (+15% health)', fish: 'Fish (+20% health)' }[buffs.food];
  if (foodLabel) parts.push(foodLabel);
  return parts.length ? parts.join(' · ') : 'No active buffs';
}

function targetStatsBlock(target, current) {
  const stat = (label, t, c, suffix = '') => {
    const tv = Math.round(t);
    const cv = Math.round(c);
    const delta = tv - cv;
    const cls = delta > 0 ? 'positive' : delta < 0 ? 'negative' : 'neutral';
    const sign = delta > 0 ? '+' : '';
    const deltaStr = delta === 0
      ? ''
      : `<span class="delta ${cls}">${sign}${fmtInt(delta)}${suffix}</span>`;
    return `<div class="stat">
      <span class="stat-label">${label}</span>
      <span class="stat-value">${fmtInt(tv)}${suffix}${deltaStr}</span>
    </div>`;
  };
  return `<div class="stats">
    ${stat('Attack', target.atk, current.atk)}
    ${stat('Precision', target.prc, current.prc, '%')}
    ${stat('Crit chance', target.cc, current.cc, '%')}
    ${stat('Crit damage', target.cd, current.cd, '%')}
    ${stat('Armor', target.arm, current.arm, '%')}
    ${stat('Dodge', target.ddg, current.ddg, '%')}
    ${stat('Health', target.hp, current.hp)}
  </div>`;
}

function gapBuyNow(gap, havePrices) {
  if (gap.items.length === 0) {
    return `<div class="section">
      <div class="section-label">Buy now (one-time)</div>
      <p class="placeholder-text" style="color: var(--accent); border-color: var(--accent);">You already have this gear (or better) in every slot. ✓</p>
    </div>`;
  }

  const slotLabels = {
    weapon: '🗡️ Weapon',
    helmet: '⛑️ Helmet',
    chest:  '🦺 Chest',
    pants:  '👖 Pants',
    boots:  '👢 Boots',
    gloves: '🧤 Gloves',
  };

  const rows = gap.items.map(it => `
    <tr>
      <td>${slotLabels[it.slot] || it.slot}</td>
      <td class="mono">${it.currentCode ? escapeHtml(it.currentCode) : '<span class="muted">none</span>'}</td>
      <td class="mono">${escapeHtml(it.targetCode)}</td>
      <td class="num">${it.price != null ? fmt(it.price, 2) + ' g' : (havePrices ? '?' : '–')}</td>
    </tr>
  `).join('');

  const totalLine = gap.total > 0
    ? `<span class="right">${fmt(gap.total, 2)} g total</span>`
    : '';

  return `<div class="section">
    <div class="section-label">Buy now (one-time) ${totalLine}</div>
    <table class="list">
      <thead><tr><th>Slot</th><th>From</th><th>To</th><th class="num">Price</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${!havePrices ? '<p class="note">Live prices unavailable — codes shown for reference.</p>' : ''}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════
 *  STATUS / FLOW
 * ═══════════════════════════════════════════════════════════════════ */
function setStatus(kind, msg = '') {
  const el = $('#status');
  el.className = 'status' + (kind ? ' ' + kind : '');
  el.textContent = msg;
}

async function load(username) {
  if (!username) {
    setStatus('error', 'Enter a username.');
    return;
  }
  setStatus('', `Resolving "${username}"…`);
  $('#load-btn').disabled = true;
  $('#player').classList.add('hidden');
  $('#debug-panel').classList.add('hidden');
  try {
    const userId = await resolveUserId(username);
    if (!userId) throw new Error(`No user found for "${username}"`);
    setStatus('', `Loading profile…`);
    const data = await loadPlayer(userId);
    renderPlayer(data);
    const newQs = new URLSearchParams();
    newQs.set('u', username);
    if (DEBUG) newQs.set('debug', '1');
    history.replaceState(null, '', '?' + newQs.toString());
    setStatus('ok', `Loaded ${data.user?.username || username}.`);
  } catch (e) {
    console.error(e);
    setStatus('error', e.message || String(e));
  } finally {
    $('#load-btn').disabled = false;
  }
}

/* ═══════════════════════════════════════════════════════════════════
 *  BOOT
 * ═══════════════════════════════════════════════════════════════════ */
$('#load-btn').addEventListener('click', () => load($('#username').value.trim()));
$('#username').addEventListener('keydown', e => {
  if (e.key === 'Enter') load($('#username').value.trim());
});

const initialU = QS.get('u');
if (initialU) {
  $('#username').value = initialU;
  load(initialU);
} else {
  $('#username').focus();
}

if (DEBUG) console.log('Debug mode on. Add ?debug=1 to URL.');
</script>
</body>
</html>

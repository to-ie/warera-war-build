<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>War Readiness · we-ie.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d10;
    --surface: #14181d;
    --surface-2: #1c2128;
    --border: #2a313a;
    --border-strong: #3a424d;
    --text: #e8ecf0;
    --dim: #98a2b0;
    --dimmer: #6b7480;
    --accent: #4ad395;
    --accent-soft: rgba(74, 211, 149, 0.12);
    --warn: #f0c14b;
    --error: #f06060;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-size: 15px;
  }

  .topbar { border-bottom: 1px solid var(--border); background: var(--surface); }
  .topbar-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0.9rem 1.5rem;
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .brand h1 {
    margin: 0;
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .brand .accent { color: var(--accent); }
  .brand .sub { color: var(--dimmer); font-size: 0.85rem; }

  main {
    flex: 1;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .search-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
    flex-wrap: wrap;
  }
  .search-row input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.85rem;
    border-radius: 6px;
    font: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-row input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search-row button {
    background: var(--accent);
    border: 0;
    color: #07120c;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .search-row button:hover:not(:disabled) { background: #5fdfa6; }
  .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    min-height: 1.3rem;
    font-size: 0.85rem;
    color: var(--dim);
    margin-bottom: 1rem;
  }
  .status.error { color: var(--error); }
  .status.ok { color: var(--accent); }

  .player-head {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 1rem;
  }
  .avatar {
    width: 56px;
    height: 56px;
    border-radius: 8px;
    background: var(--surface-2);
    flex-shrink: 0;
    object-fit: cover;
  }
  .player-name {
    margin: 0 0 0.2rem 0;
    font-size: 1.2rem;
    font-weight: 600;
  }
  .player-meta { margin: 0; font-size: 0.9rem; color: var(--dim); }
  .pill {
    display: inline-block;
    padding: 0.1rem 0.55rem;
    background: var(--surface-2);
    border-radius: 4px;
    margin-right: 0.35rem;
    font-size: 0.8rem;
  }
  .pill .mono { font-family: var(--mono); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 760px) {
    .grid { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem 1.25rem;
  }
  .card h3 {
    margin: 0 0 1rem 0;
    font-size: 1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .badge {
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.18rem 0.55rem;
    border-radius: 999px;
    font-family: var(--mono);
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
    gap: 0.5rem;
    margin-bottom: 1.1rem;
  }
  .stat {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.5rem 0.55rem;
    text-align: center;
  }
  .stat-label {
    display: block;
    color: var(--dimmer);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 0.2rem;
  }
  .stat-value {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 0.95rem;
  }

  .section { margin-top: 1rem; }
  .section:first-child { margin-top: 0; }
  .section-label {
    text-transform: uppercase;
    color: var(--dimmer);
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    margin-bottom: 0.45rem;
    font-weight: 500;
  }

  .skills {
    display: grid;
    gap: 0.3rem;
    font-size: 0.85rem;
  }
  .skill {
    display: flex;
    justify-content: space-between;
    padding: 0.35rem 0.55rem;
    background: var(--surface-2);
    border-radius: 4px;
  }
  .skill-name { color: var(--dim); }
  .skill-value { font-family: var(--mono); font-weight: 500; }
  .skill .sub {
    color: var(--dimmer);
    font-size: 0.78rem;
    margin-left: 0.4rem;
  }

  table.list {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  table.list th, table.list td {
    text-align: left;
    padding: 0.4rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  table.list th {
    color: var(--dimmer);
    font-weight: 500;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  table.list td.mono { font-family: var(--mono); }
  table.list td.num { text-align: right; font-family: var(--mono); }
  table.list tr:last-child td { border-bottom: 0; }
  table.list tr.empty td { color: var(--dimmer); font-style: italic; }

  .note {
    font-size: 0.8rem;
    color: var(--dimmer);
    font-style: italic;
    margin-top: 0.9rem;
  }
  .hidden { display: none !important; }
  .muted { color: var(--dim); }

  /* INFO TOOLTIP — small (?) button with hover/focus-revealed bubble.
     Works on touch devices: tap focuses the button which triggers :focus. */
  .info-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--dim);
    font-size: 0.7rem;
    font-weight: 600;
    cursor: help;
    margin-left: 0.4rem;
    position: relative;
    padding: 0;
    vertical-align: middle;
    font-family: inherit;
    line-height: 1;
  }
  .info-btn:hover,
  .info-btn:focus {
    outline: none;
    color: var(--accent);
    border-color: var(--accent);
  }
  .info-btn::after {
    content: attr(data-tip);
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: var(--surface-2);
    border: 1px solid var(--border-strong);
    padding: 0.6rem 0.8rem;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 400;
    white-space: normal;
    width: 240px;
    text-align: left;
    color: var(--text);
    line-height: 1.45;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 10;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .info-btn:hover::after,
  .info-btn:focus::after { opacity: 1; }

  details.debug {
    margin-top: 1rem;
    padding: 0.6rem 0.85rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  details.debug summary {
    cursor: pointer;
    font-size: 0.8rem;
    color: var(--dim);
  }
  details.debug pre {
    margin: 0.6rem 0 0;
    overflow: auto;
    background: var(--bg);
    padding: 0.6rem;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--dim);
    max-height: 400px;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 1rem 1.5rem;
    color: var(--dim);
    font-size: 0.85rem;
    text-align: center;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
  footer .sep { margin: 0 0.5rem; color: var(--border-strong); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <h1>War <span class="accent">Readiness</span></h1>
    </div>
    <span class="brand sub">build planner for warera.io · v0.1</span>
  </div>
</div>

<main>
  <div class="search-row">
    <input id="username" placeholder="warera username..." autocomplete="off" spellcheck="false">
    <button id="load-btn">Load profile</button>
  </div>
  <div id="status" class="status"></div>

  <div id="player" class="hidden">
    <div class="player-head">
      <img id="avatar" class="avatar" alt="" hidden>
      <div>
        <h2 id="player-name" class="player-name"></h2>
        <p id="player-meta" class="player-meta"></p>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>
          <span>Combat <button class="info-btn" type="button" aria-label="About this section" data-tip="Your damage output and survivability. Atk = hit damage · Prc = accuracy · CC/CD = crit chance and damage · Arm/Ddg = damage reduction. Values include gear but not active buffs.">?</button></span>
          <span class="badge" id="combat-badge"></span>
        </h3>
        <div id="combat-content"></div>
      </div>
      <div class="card">
        <h3>
          <span>Economy <button class="info-btn" type="button" aria-label="About this section" data-tip="Your daily income engine. Energy/Entre = daily actions · Production = PP per action · Cos = factory cap · Mgmt = worker cap. Daily PP = raw output before bonuses.">?</button></span>
          <span class="badge" id="economy-badge"></span>
        </h3>
        <div id="economy-content"></div>
      </div>
    </div>

    <details class="debug hidden" id="debug-panel">
      <summary>Raw API responses (debug mode)</summary>
      <pre id="debug-content"></pre>
    </details>
  </div>
</main>

<footer>
  Made with <span style="color: var(--accent);">♥</span> by toie.
  <span class="sep">·</span>
  Data via <a href="https://gateway.warerastats.io/" target="_blank" rel="noopener">War Era Gateway</a>.
  <span class="sep">·</span>
  Sibling of <a href="https://tools.we-ie.com/" target="_blank" rel="noopener">tools.we-ie.com</a>.
</footer>

<script>
/* ═══════════════════════════════════════════════════════════════════
 *  CONFIG
 * ═══════════════════════════════════════════════════════════════════ */
const CFG = {
  API: 'https://warera-proxy.toie.workers.dev/trpc',
  GAME: 'https://app.warera.io',
};
const QS = new URLSearchParams(location.search);
const DEBUG = QS.has('debug');

/* ═══════════════════════════════════════════════════════════════════
 *  UTILITIES
 * ═══════════════════════════════════════════════════════════════════ */
const $ = sel => document.querySelector(sel);

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmt(n, d = 2) {
  if (n == null || isNaN(n)) return '–';
  return Number(n).toLocaleString(undefined, {
    minimumFractionDigits: d, maximumFractionDigits: d
  });
}
function fmtInt(n) {
  if (n == null || isNaN(n)) return '–';
  return Math.round(Number(n)).toLocaleString();
}
function flag(code) {
  if (!code || code.length !== 2) return '🏳️';
  return code.toUpperCase().split('').map(c =>
    String.fromCodePoint(c.charCodeAt(0) - 65 + 0x1F1E6)
  ).join('');
}

/* ═══════════════════════════════════════════════════════════════════
 *  TRPC CLIENT
 *
 *  Warera's tRPC server expects BATCHED requests with superjson-wrapped
 *  input: `?batch=1&input={"0":{"json":<params>}}`. Response is an array:
 *    [{ result: { data: { json: <data> } } }]   on success
 *    [{ error: ... }]                            on error
 * ═══════════════════════════════════════════════════════════════════ */
async function trpc(endpoint, params = {}) {
  const batchInput = { 0: { json: params } };
  const input = encodeURIComponent(JSON.stringify(batchInput));
  const url = `${CFG.API}/${endpoint}?batch=1&input=${input}`;
  if (DEBUG) console.log(`→ ${endpoint}`, params);
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${endpoint} HTTP ${res.status}`);
  const json = await res.json();
  if (DEBUG) console.log(`← ${endpoint}`, json);
  const item = Array.isArray(json) ? json[0] : json;
  if (item?.error) throw new Error(`${endpoint}: ${item.error.message || 'error'}`);
  const d = item?.result?.data;
  return d?.json ?? d ?? item;
}

/* ═══════════════════════════════════════════════════════════════════
 *  GAME CONSTANTS
 *  Eco bases verified against toie level-18 numbers from the API.
 *  Server returns pre-computed `.total` for each stat, so we mostly
 *  just read those for display; bases/gains used only for projecting
 *  hypothetical builds (future work).
 * ═══════════════════════════════════════════════════════════════════ */
const ECO_BASE = { energy: 30, entrepreneurship: 30, production: 10, companies: 2, management: 4 };
const ECO_GAIN = { energy: 10, entrepreneurship: 5, production: 3, companies: 1, management: 2 };
const FIGHT_KEYS = ['attack','precision','criticalChance','criticalDamages','armor','dodge','health','lootChance','hunger'];
const ECO_KEYS = ['energy','entrepreneurship','production','companies','management'];

function pointsForLevel(level) {
  // progressive cost: level N costs 1+2+...+N total
  return (level * (level + 1)) / 2;
}
function pointsSpent(levels, keys) {
  return keys.reduce((s, k) => s + pointsForLevel(levels[k] || 0), 0);
}

/* ═══════════════════════════════════════════════════════════════════
 *  DATA LOAD
 * ═══════════════════════════════════════════════════════════════════ */
async function resolveUserId(input) {
  const t = input.trim();
  if (!t) return null;
  // direct mongo id
  if (/^[a-f0-9]{24}$/i.test(t)) return t;
  // search — response shape: { userIds: [...], muIds: [...], countryIds: [...], ... }
  const r = await trpc('search.searchAnything', { searchText: t });
  const userIds = r?.userIds || [];
  if (!userIds.length) return null;
  return userIds[0];
}

async function loadPlayer(userId) {
  // First wave: needs only userId
  const [user, inventory, companyList] = await Promise.allSettled([
    trpc('user.getUserById', { userId }),
    trpc('inventory.fetchCurrentEquipment', { userId }),
    trpc('company.getCompanies', { userId, perPage: 50 }),
  ]);

  // Second wave: companies need IDs from companyList; country/mu need
  // IDs from user. Fan out in one parallel batch.
  const u = user.status === 'fulfilled' ? user.value : null;
  const ids = companyList.status === 'fulfilled' ? (companyList.value?.items || []) : [];

  const secondary = await Promise.allSettled([
    ...ids.map(id => trpc('company.getById', { companyId: id })),
    u?.country ? trpc('country.getCountryById', { countryId: u.country }) : Promise.resolve(null),
    u?.mu ? trpc('mu.getById', { muId: u.mu }) : Promise.resolve(null),
  ]);

  const companies = secondary.slice(0, ids.length)
    .filter(r => r.status === 'fulfilled')
    .map(r => r.value);
  const country = secondary[ids.length]?.status === 'fulfilled' ? secondary[ids.length].value : null;
  const mu = secondary[ids.length + 1]?.status === 'fulfilled' ? secondary[ids.length + 1].value : null;

  return {
    userId,
    user: u,
    userError: user.status === 'rejected' ? String(user.reason?.message || user.reason) : null,
    inventory: inventory.status === 'fulfilled' ? inventory.value : null,
    inventoryError: inventory.status === 'rejected' ? String(inventory.reason?.message || inventory.reason) : null,
    companies,
    companiesError: companyList.status === 'rejected' ? String(companyList.reason?.message || companyList.reason) : null,
    country,
    mu,
  };
}

/* ═══════════════════════════════════════════════════════════════════
 *  EXTRACTION
 *
 *  user.skills[name] has shape:
 *    { level, value, weapon, equipment, total, totalAfterSoftCap, ... }
 *  We pull `.level` for the allocation table and `.total` (or
 *  `.totalAfterSoftCap` for armor/dodge) for the derived-stats grid.
 * ═══════════════════════════════════════════════════════════════════ */
function extractPlayer(data) {
  const u = data.user || {};
  const s = u.skills || {};
  const lv = u.leveling || {};
  const grab = (k, prop = 'level') => s[k]?.[prop] ?? 0;
  return {
    userId: data.userId,
    username: u.username || '?',
    avatarUrl: u.avatarUrl,
    level: lv.level ?? '?',
    militaryRank: u.militaryRank,
    totalSp: lv.totalSkillPoints ?? 0,
    spentSp: lv.spentSkillPoints ?? 0,
    availableSp: lv.availableSkillPoints ?? 0,
    levels: Object.fromEntries(
      [...FIGHT_KEYS, ...ECO_KEYS].map(k => [k, grab(k, 'level')])
    ),
    derived: {
      atk: grab('attack', 'total'),
      prc: grab('precision', 'total'),
      cc: grab('criticalChance', 'total'),
      cd: grab('criticalDamages', 'total'),
      armRaw: grab('armor', 'total'),
      arm: s.armor?.totalAfterSoftCap ?? s.armor?.total ?? 0,
      ddgRaw: grab('dodge', 'total'),
      ddg: s.dodge?.totalAfterSoftCap ?? s.dodge?.total ?? 0,
      hp: grab('health', 'total') || 100,
      loot: grab('lootChance', 'total'),
      hunger: grab('hunger', 'total') || 4,
    },
    eco: {
      energy: grab('energy', 'total'),
      entrepreneurship: grab('entrepreneurship', 'total'),
      production: grab('production', 'total'),
      companies: grab('companies', 'total'),
      management: grab('management', 'total'),
    },
  };
}

function extractEquipment(inv) {
  const slot = key => {
    const p = inv?.[key];
    if (!p) return null;
    return {
      code: p.code ?? '?',
      durability: p.state != null ? Math.round((p.state / (p.maxState || 100)) * 100) : null,
      skills: p.skills || {},
    };
  };
  return {
    weapon: slot('weapon'),
    helmet: slot('helmet'),
    chest: slot('chest'),
    pants: slot('pants'),
    boots: slot('boots'),
    gloves: slot('gloves'),
  };
}

function extractCompanies(comps) {
  const items = Array.isArray(comps) ? comps : [];
  return items.map(co => ({
    id: co._id,
    name: co.name ?? '?',
    itemCode: co.itemCode ?? '?',
    aeLevel: co.activeUpgradeLevels?.automatedEngine ?? null,
    storageLevel: co.activeUpgradeLevels?.storage ?? null,
    breakRoomLevel: co.activeUpgradeLevels?.breakRoom ?? null,
    production: co.production ?? null,
    workerCount: co.workerCount ?? 0,
    estimatedValue: co.estimatedValue ?? null,
  }));
}

/* ═══════════════════════════════════════════════════════════════════
 *  ECO MATH
 *  formulas from TheGroxEmpire/warera-eco-simulator README
 * ═══════════════════════════════════════════════════════════════════ */
function actionsPerDay(bar, usagePct = 1) {
  return Math.floor(bar / 10) * 2.4 * usagePct;
}

/* ═══════════════════════════════════════════════════════════════════
 *  RENDER — PLAYER HEADER
 * ═══════════════════════════════════════════════════════════════════ */
function renderPlayer(data) {
  if (!data.user) {
    setStatus('error', `Could not load user. ${data.userError || ''}`);
    return;
  }
  const p = extractPlayer(data);

  const av = $('#avatar');
  if (p.avatarUrl) { av.src = p.avatarUrl; av.hidden = false; }
  else { av.hidden = true; }
  $('#player-name').textContent = p.username;

  const meta = [];
  meta.push(`<span class="pill">Level <span class="mono">${p.level}</span></span>`);
  const cc = data.country?.code;
  if (cc) meta.push(`<span class="pill">${flag(cc)} ${escapeHtml(cc.toUpperCase())}</span>`);
  const muName = data.mu?.name;
  if (muName) meta.push(`<span class="pill">${escapeHtml(muName)}</span>`);
  if (p.militaryRank != null) {
    meta.push(`<span class="pill">MR <span class="mono">${p.militaryRank}</span></span>`);
  }
  $('#player-meta').innerHTML = meta.join(' ');

  renderCombat(p, data);
  renderEconomy(p, data);

  if (DEBUG) {
    $('#debug-panel').classList.remove('hidden');
    $('#debug-content').textContent = JSON.stringify({
      userId: data.userId,
      user: data.user,
      inventory: data.inventory,
      companies: data.companies,
      country: data.country,
      mu: data.mu,
      errors: {
        user: data.userError,
        inventory: data.inventoryError,
        companies: data.companiesError,
      }
    }, null, 2);
  }

  $('#player').classList.remove('hidden');
}

/* ═══════════════════════════════════════════════════════════════════
 *  RENDER — COMBAT CARD
 * ═══════════════════════════════════════════════════════════════════ */
function renderCombat(p, data) {
  if (data.inventoryError) {
    $('#combat-content').innerHTML = `<p class="muted">Could not load equipment: <code>${escapeHtml(data.inventoryError)}</code></p>`;
    return;
  }

  const eq = extractEquipment(data.inventory);
  const d = p.derived;
  const fightPts = pointsSpent(p.levels, FIGHT_KEYS);

  $('#combat-content').innerHTML = `
    <div class="stats">
      <div class="stat"><span class="stat-label">Atk</span><span class="stat-value">${fmtInt(d.atk)}</span></div>
      <div class="stat"><span class="stat-label">Prc</span><span class="stat-value">${fmtInt(d.prc)}%</span></div>
      <div class="stat"><span class="stat-label">CC</span><span class="stat-value">${fmtInt(d.cc)}%</span></div>
      <div class="stat"><span class="stat-label">CD</span><span class="stat-value">${fmtInt(d.cd)}%</span></div>
      <div class="stat"><span class="stat-label">Arm</span><span class="stat-value">${fmtInt(d.arm)}%</span></div>
      <div class="stat"><span class="stat-label">Ddg</span><span class="stat-value">${fmtInt(d.ddg)}%</span></div>
      <div class="stat"><span class="stat-label">HP</span><span class="stat-value">${fmtInt(d.hp)}</span></div>
    </div>

    <div class="section">
      <div class="section-label">Fight skills · ${fightPts}/${p.spentSp + p.availableSp} pts</div>
      <div class="skills">
        ${skillRow('🗡️ Attack', p.levels.attack)}
        ${skillRow('🎯 Precision', p.levels.precision)}
        ${skillRow('✨ Crit chance', p.levels.criticalChance)}
        ${skillRow('💥 Crit damage', p.levels.criticalDamages)}
        ${skillRow('🛡️ Armor', p.levels.armor)}
        ${skillRow('💨 Dodge', p.levels.dodge)}
        ${skillRow('❤️ Health', p.levels.health)}
        ${skillRow('💼 Loot', p.levels.lootChance)}
        ${skillRow('🍔 Hunger', p.levels.hunger)}
      </div>
    </div>

    <div class="section">
      <div class="section-label">Equipped gear</div>
      ${equipmentTable(eq)}
    </div>
  `;
  $('#combat-badge').textContent = `${fmtInt(d.atk)} atk`;
}

function skillRow(label, value) {
  return `<div class="skill"><span class="skill-name">${label}</span><span class="skill-value">${value}</span></div>`;
}

/* Equipment table: each slot maps to which stats matter. We read
 * `slot.skills.{statKey}` from the API and display the value with a
 * short label (atk, cc, cd, arm, ddg, prc). */
const STAT_LABELS = {
  attack: 'atk',
  criticalChance: 'cc',
  criticalDamages: 'cd',
  armor: 'arm',
  dodge: 'ddg',
  precision: 'prc',
};

function equipmentTable(eq) {
  const slots = [
    ['weapon', '🗡️ Weapon', ['attack', 'criticalChance']],
    ['helmet', '⛑️ Helmet', ['criticalDamages']],
    ['chest',  '🦺 Chest',  ['armor']],
    ['pants',  '👖 Pants',  ['armor']],
    ['boots',  '👢 Boots',  ['dodge']],
    ['gloves', '🧤 Gloves', ['precision']],
  ];
  const rows = slots.map(([key, label, statKeys]) => {
    const item = eq[key];
    if (!item) return `<tr class="empty"><td>${label}</td><td colspan="3">empty</td></tr>`;
    const statStr = statKeys
      .map(sk => {
        const v = item.skills[sk];
        return v ? `${fmtInt(v)} ${STAT_LABELS[sk] || sk}` : null;
      })
      .filter(Boolean)
      .join(', ') || '–';
    return `<tr>
      <td>${label}</td>
      <td class="mono">${escapeHtml(item.code)}</td>
      <td class="num">${statStr}</td>
      <td class="num">${item.durability != null ? fmtInt(item.durability) + '%' : '–'}</td>
    </tr>`;
  });
  return `<table class="list">
    <thead><tr><th>Slot</th><th>Item</th><th>Stat</th><th>Dur</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

/* ═══════════════════════════════════════════════════════════════════
 *  RENDER — ECONOMY CARD
 * ═══════════════════════════════════════════════════════════════════ */
function renderEconomy(p, data) {
  if (data.companiesError) {
    $('#economy-content').innerHTML = `<p class="muted">Could not load companies: <code>${escapeHtml(data.companiesError)}</code></p>`;
    return;
  }

  const comps = extractCompanies(data.companies);
  const eco = p.eco;
  const ecoPts = pointsSpent(p.levels, ECO_KEYS);

  // Daily raw PP — formulas from GroxEmpire eco-sim README.
  // work actions/day = floor(energyBar/10) × 2.4 × usage
  // raw PP/day = actions × Production stat
  const workActions = actionsPerDay(eco.energy, 1);
  const workPP = workActions * eco.production;
  const entreSlots = Math.floor(eco.entrepreneurship / 10);
  const entreActions = actionsPerDay(eco.entrepreneurship, 1);
  const entrePP = entreActions * eco.production;

  $('#economy-content').innerHTML = `
    <div class="stats">
      <div class="stat"><span class="stat-label">Energy</span><span class="stat-value">${eco.energy}</span></div>
      <div class="stat"><span class="stat-label">Entre</span><span class="stat-value">${eco.entrepreneurship}</span></div>
      <div class="stat"><span class="stat-label">Prod</span><span class="stat-value">${eco.production}</span></div>
      <div class="stat"><span class="stat-label">Cos lim</span><span class="stat-value">${eco.companies}</span></div>
      <div class="stat"><span class="stat-label">Mgmt</span><span class="stat-value">${eco.management}</span></div>
    </div>

    <div class="section">
      <div class="section-label">Eco skills · ${ecoPts}/${p.spentSp + p.availableSp} pts</div>
      <div class="skills">
        ${skillRow('⚡ Energy', p.levels.energy)}
        ${skillRow('💼 Entrepreneurship', p.levels.entrepreneurship)}
        ${skillRow('🏭 Production', p.levels.production)}
        ${skillRow('🏢 Companies', p.levels.companies)}
        ${skillRow('👤 Management', p.levels.management)}
      </div>
    </div>

    <div class="section">
      <div class="section-label">Daily raw PP</div>
      <div class="skills">
        <div class="skill">
          <span class="skill-name">Work (energy → PP)</span>
          <span class="skill-value">${fmt(workPP, 1)} <span class="sub">${fmt(workActions, 1)} × ${eco.production}</span></span>
        </div>
        <div class="skill">
          <span class="skill-name">Self-work (entre)</span>
          <span class="skill-value">${fmt(entrePP, 1)} <span class="sub">${entreSlots} slots/10h</span></span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Factories · ${comps.length}/${eco.companies}</div>
      ${companiesTable(comps)}
    </div>

    <div class="note">Net profit (factory revenue, ingredient costs, market prices, wage) lands with build presets next.</div>
  `;
  $('#economy-badge').textContent = `${comps.length}/${eco.companies} factories`;
}

function companiesTable(comps) {
  if (!comps.length) {
    return `<p class="muted" style="font-size:0.85rem; margin:0;">No companies found.</p>`;
  }
  const rows = comps.map(c => `
    <tr>
      <td>${escapeHtml(c.name)}</td>
      <td class="mono">${escapeHtml(c.itemCode)}</td>
      <td class="num">${c.aeLevel != null ? 'AE ' + c.aeLevel : '–'}</td>
      <td class="num">${c.workerCount}</td>
      <td class="num">${c.production != null ? fmt(c.production, 1) : '–'}</td>
    </tr>
  `);
  return `<table class="list">
    <thead><tr><th>Name</th><th>Item</th><th>AE</th><th>👷</th><th>Stored</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

/* ═══════════════════════════════════════════════════════════════════
 *  STATUS / FLOW
 * ═══════════════════════════════════════════════════════════════════ */
function setStatus(kind, msg = '') {
  const el = $('#status');
  el.className = 'status' + (kind ? ' ' + kind : '');
  el.textContent = msg;
}

async function load(username) {
  if (!username) {
    setStatus('error', 'Enter a username.');
    return;
  }
  setStatus('', `Resolving "${username}"…`);
  $('#load-btn').disabled = true;
  $('#player').classList.add('hidden');
  $('#debug-panel').classList.add('hidden');
  try {
    const userId = await resolveUserId(username);
    if (!userId) throw new Error(`No user found for "${username}"`);
    setStatus('', `Loading profile…`);
    const data = await loadPlayer(userId);
    renderPlayer(data);
    const newQs = new URLSearchParams();
    newQs.set('u', username);
    if (DEBUG) newQs.set('debug', '1');
    history.replaceState(null, '', '?' + newQs.toString());
    setStatus('ok', `Loaded ${data.user?.username || username}.`);
  } catch (e) {
    console.error(e);
    setStatus('error', e.message || String(e));
  } finally {
    $('#load-btn').disabled = false;
  }
}

/* ═══════════════════════════════════════════════════════════════════
 *  BOOT
 * ═══════════════════════════════════════════════════════════════════ */
$('#load-btn').addEventListener('click', () => load($('#username').value.trim()));
$('#username').addEventListener('keydown', e => {
  if (e.key === 'Enter') load($('#username').value.trim());
});

const initialU = QS.get('u');
if (initialU) {
  $('#username').value = initialU;
  load(initialU);
} else {
  $('#username').focus();
}

if (DEBUG) console.log('Debug mode on. Raw API responses logged. Add ?debug=1 to URL.');
</script>
</body>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>War Readiness · we-ie.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d10;
    --surface: #14181d;
    --surface-2: #1c2128;
    --border: #2a313a;
    --border-strong: #3a424d;
    --text: #e8ecf0;
    --dim: #98a2b0;
    --dimmer: #6b7480;
    --accent: #4ad395;
    --accent-soft: rgba(74, 211, 149, 0.12);
    --warn: #f0c14b;
    --warn-soft: rgba(240, 193, 75, 0.12);
    --error: #f06060;
    --error-soft: rgba(240, 96, 96, 0.12);
    --rarity-common: #8b94a3;
    --rarity-uncommon: #4ad395;
    --rarity-rare: #5b8cff;
    --rarity-epic: #b87ddf;
    --rarity-legendary: #f0c14b;
    --rarity-mythic: #f06060;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-size: 15px;
  }

  .topbar { border-bottom: 1px solid var(--border); background: var(--surface); }
  .topbar-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0.9rem 1.5rem;
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .brand h1 { margin: 0; font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em; }
  .brand .accent { color: var(--accent); }
  .brand .sub { color: var(--dimmer); font-size: 0.85rem; }

  main {
    flex: 1;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .search-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
    flex-wrap: wrap;
  }
  .search-row input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.85rem;
    border-radius: 6px;
    font: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-row input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search-row button {
    background: var(--accent);
    border: 0;
    color: #07120c;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .search-row button:hover:not(:disabled) { background: #5fdfa6; }
  .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    min-height: 1.3rem;
    font-size: 0.85rem;
    color: var(--dim);
    margin-bottom: 1rem;
  }
  .status.error { color: var(--error); }
  .status.ok { color: var(--accent); }

  .player-head {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.85rem 1.1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 1rem;
  }
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    background: var(--surface-2);
    flex-shrink: 0;
    object-fit: cover;
  }
  .player-name { margin: 0 0 0.15rem 0; font-size: 1.05rem; font-weight: 600; }
  .player-meta { margin: 0; font-size: 0.85rem; color: var(--dim); }
  .pill {
    display: inline-block;
    padding: 0.08rem 0.5rem;
    background: var(--surface-2);
    border-radius: 4px;
    margin-right: 0.3rem;
    margin-bottom: 0.15rem;
    font-size: 0.78rem;
  }
  .pill .mono { font-family: var(--mono); }

  .section-title {
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--dimmer);
    margin: 1.25rem 0 0.5rem;
    padding-left: 0.1rem;
  }
  .section-title:first-of-type { margin-top: 0.25rem; }

  /* ─── Compact collapsible card (current state) ───────────────── */
  .compact-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.4rem;
  }
  .compact-card[open] { border-color: var(--border-strong); }
  .compact-card > summary {
    padding: 0.7rem 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    list-style: none;
    user-select: none;
  }
  .compact-card > summary::-webkit-details-marker { display: none; }
  .compact-card .caret {
    color: var(--dim);
    font-size: 0.8rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .compact-card:not([open]) .caret { transform: rotate(-90deg); }
  .cc-title { font-weight: 600; font-size: 0.92rem; flex-shrink: 0; }
  .cc-summary {
    color: var(--dim);
    font-size: 0.88rem;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .cc-summary .mono { font-family: var(--mono); }
  .cc-summary .pos { color: var(--accent); }
  .cc-summary .neg { color: var(--error); }
  .cc-pill {
    display: inline-block;
    padding: 0.1rem 0.55rem;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 600;
    font-family: var(--mono);
    color: var(--text);
    margin-right: 0.15rem;
  }
  .cc-pill.pos { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .cc-pill.neg { background: var(--error-soft); border-color: var(--error); color: var(--error); }
  .cc-pill.accent { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .cc-aux {
    color: var(--dimmer);
    font-family: var(--mono);
    font-size: 0.78rem;
    flex-shrink: 0;
  }
  .cc-body {
    padding: 0.9rem 1.1rem 1.1rem;
    border-top: 1px solid var(--border);
  }

  /* ─── Target build tabs (preset picker) ──────────────────────── */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 0.85rem;
  }
  @media (max-width: 520px) { .tabs { grid-template-columns: 1fr; } }
  .tab {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 0.9rem;
    cursor: pointer;
    text-align: left;
    font: inherit;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    transition: all 0.15s;
  }
  .tab:hover { border-color: var(--border-strong); }
  .tab.active {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  .tab-name { font-weight: 600; font-size: 0.95rem; }
  .tab.active .tab-name { color: var(--accent); }
  .tab-sub { font-size: 0.78rem; color: var(--dim); line-height: 1.35; }
  .tab-badge {
    display: inline-block;
    font-size: 0.66rem;
    font-weight: 600;
    padding: 0.08rem 0.45rem;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    align-self: flex-start;
    margin-top: 0.15rem;
  }
  .tab-badge.self-funding { background: var(--accent-soft); color: var(--accent); }
  .tab-badge.burns { background: var(--warn-soft); color: var(--warn); }

  /* ─── Level + duration control row ───────────────────────────── */
  .plan-control {
    display: flex;
    gap: 0.9rem;
    align-items: center;
    flex-wrap: wrap;
    padding: 0.65rem 0.9rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.8rem;
    font-size: 0.86rem;
  }
  .plan-control label {
    color: var(--dim);
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
  }
  .plan-control select,
  .plan-control input[type=number] {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.3rem 0.55rem;
    border-radius: 4px;
    font: inherit;
    font-family: var(--mono);
  }
  .plan-control input[type=number] { width: 60px; text-align: right; }
  .plan-control input[type=number]::-webkit-inner-spin-button,
  .plan-control input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .plan-control select:focus,
  .plan-control input:focus { outline: none; border-color: var(--accent); }
  .plan-note {
    color: var(--warn);
    font-size: 0.78rem;
    font-style: italic;
    flex-basis: 100%;
    margin: 0.1rem 0 0;
  }

  /* ─── Grand total banner at top of target build ──────────────── */
  .grand-banner {
    margin-bottom: 0.85rem;
    padding: 0.85rem 1.1rem;
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.5rem;
    font-weight: 600;
    color: var(--accent);
  }
  .grand-banner .mono { font-family: var(--mono); font-size: 1.05rem; }
  .grand-banner .label { font-size: 0.95rem; }
  .grand-banner .sub { font-size: 0.75rem; font-weight: 400; color: var(--dim); font-style: italic; margin-top: 0.15rem; display: block; }

  /* ─── Target build boxes (the 5 actionable sections) ─────────── */
  .target-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.45rem;
  }
  .target-box.open { border-color: var(--border-strong); }
  .target-box-head {
    padding: 0.75rem 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    user-select: none;
  }
  .target-box-head .caret {
    color: var(--dim);
    font-size: 0.8rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .target-box:not(.open) .target-box-head .caret { transform: rotate(-90deg); }
  .target-box-num {
    font-family: var(--mono);
    color: var(--dimmer);
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .target-box-title {
    font-weight: 600;
    font-size: 0.92rem;
    flex-shrink: 0;
  }
  .target-box-summary {
    color: var(--dim);
    font-size: 0.85rem;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: right;
  }
  .target-box-summary .mono { font-family: var(--mono); }
  .target-box-summary .pos { color: var(--accent); }
  .target-box-summary .neg { color: var(--error); }
  .target-box-summary .warn { color: var(--warn); }
  .target-box-body { display: none; padding: 0 1.1rem 1.1rem; border-top: 1px solid var(--border); padding-top: 1rem; }
  .target-box.open .target-box-body { display: block; }

  /* ─── Existing styles preserved ──────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }
  .stat {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.55rem 0.7rem;
    text-align: left;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 4.5em;
  }
  .stat-label {
    display: block;
    color: var(--dim);
    font-size: 0.72rem;
    line-height: 1.3;
    margin-bottom: 0.35rem;
    overflow-wrap: break-word;
    hyphens: auto;
  }
  .stat-value {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 0.95rem;
  }
  .delta {
    font-size: 0.68rem;
    font-weight: 400;
    margin-left: 0.25rem;
    font-family: var(--mono);
    white-space: nowrap;
    color: var(--dimmer);
  }

  .section { margin-top: 0.85rem; }
  .section:first-child { margin-top: 0; }
  .section-label {
    color: var(--dim);
    font-size: 0.78rem;
    margin-bottom: 0.5rem;
    font-weight: 500;
    display: flex;
    align-items: baseline;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .section-label .right {
    margin-left: auto;
    color: var(--text);
    font-family: var(--mono);
    font-weight: 400;
  }

  .skills { display: grid; gap: 0.25rem; font-size: 0.82rem; }
  .skill {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.6rem;
    padding: 0.35rem 0.55rem;
    background: var(--surface-2);
    border-radius: 4px;
  }
  .skill-name { color: var(--dim); }
  .skill-value { font-family: var(--mono); font-weight: 500; text-align: right; }
  .skill-value .sub { color: var(--dimmer); font-weight: 400; }
  .skill-value .total { color: var(--text); font-weight: 600; }

  .skill-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  @media (max-width: 600px) { .skill-cols { grid-template-columns: 1fr; } }

  .action-list { display: grid; gap: 0.35rem; }
  .action-row {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.5rem 0.7rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.6rem;
  }
  .action-row.warn { border-left: 3px solid var(--warn); }
  .action-row.ok-row { border-left: 3px solid var(--accent); }
  .action-main {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    min-width: 0;
    flex: 1;
  }
  .action-what {
    font-size: 0.86rem;
    color: var(--text);
    font-weight: 500;
  }
  .action-detail {
    color: var(--dim);
    font-size: 0.75rem;
  }
  .action-cost {
    font-family: var(--mono);
    font-size: 0.85rem;
    white-space: nowrap;
    flex-shrink: 0;
    color: var(--text);
    font-weight: 600;
    text-align: right;
  }
  .action-cost.unknown { color: var(--dimmer); font-style: italic; font-size: 0.78rem; font-weight: 400; }
  .action-cost.none { color: var(--dimmer); font-size: 0.78rem; font-weight: 400; }

  table.list { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  table.list th, table.list td {
    text-align: left;
    padding: 0.35rem 0.45rem;
    border-bottom: 1px solid var(--border);
  }
  table.list th {
    color: var(--dimmer);
    font-weight: 500;
    font-size: 0.76rem;
  }
  table.list td.mono { font-family: var(--mono); }
  table.list td.num { text-align: right; font-family: var(--mono); white-space: nowrap; }
  table.list tr:last-child td { border-bottom: 0; }
  table.list tr.empty td { color: var(--dimmer); font-style: italic; }
  table.list td.pos { color: var(--accent); font-family: var(--mono); text-align: right; white-space: nowrap; }
  table.list td.neg { color: var(--error); font-family: var(--mono); text-align: right; white-space: nowrap; }

  .r-tag {
    display: inline-block;
    font-size: 0.56rem;
    font-weight: 600;
    padding: 0.02rem 0.32rem;
    border-radius: 3px;
    margin-left: 0.35rem;
    vertical-align: middle;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    line-height: 1.4;
  }
  .r-tag.common    { background: rgba(139,148,163,0.18); color: var(--rarity-common); }
  .r-tag.uncommon  { background: rgba(74,211,149,0.18); color: var(--rarity-uncommon); }
  .r-tag.rare      { background: rgba(91,140,255,0.20); color: var(--rarity-rare); }
  .r-tag.epic      { background: rgba(184,125,223,0.20); color: var(--rarity-epic); }
  .r-tag.legendary { background: rgba(240,193,75,0.20); color: var(--rarity-legendary); }
  .r-tag.mythic    { background: rgba(240,96,96,0.20); color: var(--rarity-mythic); }

  .placeholder-text {
    font-size: 0.83rem;
    color: var(--dim);
    margin: 0.25rem 0 0;
    padding: 0.5rem 0.7rem;
    background: var(--surface-2);
    border-radius: 6px;
    border-left: 2px solid var(--border-strong);
  }
  .placeholder-text.ok { color: var(--accent); border-color: var(--accent); }
  .placeholder-text.warn { color: var(--warn); border-color: var(--warn); }
  .placeholder-text.err { color: var(--error); border-color: var(--error); }

  .plan-list { display: grid; gap: 0.22rem; }
  .plan-row {
    background: var(--surface-2);
    border-radius: 4px;
    padding: 0.4rem 0.7rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.84rem;
  }
  .plan-row.done { opacity: 0.45; }
  .plan-row.next { border-left: 3px solid var(--accent); background: var(--accent-soft); }
  .plan-level {
    color: var(--dim);
    font-family: var(--mono);
    font-size: 0.76rem;
    min-width: 3.5em;
    flex-shrink: 0;
  }
  .plan-spend { flex: 1; color: var(--text); }
  .plan-badge {
    font-size: 0.56rem;
    font-weight: 600;
    padding: 0.04rem 0.36rem;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    flex-shrink: 0;
  }
  .plan-badge.done { background: rgba(139,148,163,0.18); color: var(--dimmer); }
  .plan-badge.next { background: var(--accent-soft); color: var(--accent); }

  .war-flow { display: grid; gap: 0.45rem; }
  .flow-block {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.55rem 0.75rem;
  }
  .flow-block h5 {
    margin: 0 0 0.35rem;
    font-size: 0.76rem;
    color: var(--dim);
    font-weight: 500;
  }
  .flow-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.82rem;
    padding: 0.16rem 0;
    gap: 0.5rem;
  }
  .flow-line .ll { color: var(--dim); flex: 1; }
  .flow-line .ll .qty { color: var(--dimmer); font-family: var(--mono); font-size: 0.74rem; margin-left: 0.3rem; }
  .flow-line .lv { font-family: var(--mono); white-space: nowrap; }
  .flow-line .lv.pos { color: var(--accent); }
  .flow-line .lv.neg { color: var(--error); }
  .flow-line .lv.unk { color: var(--dimmer); font-style: italic; font-size: 0.78rem; }
  .flow-subtotal {
    border-top: 1px solid var(--border);
    margin-top: 0.3rem;
    padding-top: 0.35rem;
    font-weight: 600;
  }
  .flow-net {
    margin-top: 0.45rem;
    padding: 0.6rem 0.85rem;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.92rem;
    font-weight: 600;
  }
  .flow-net.positive { background: var(--accent-soft); color: var(--accent); }
  .flow-net.negative { background: var(--error-soft); color: var(--error); }
  .flow-net .mono { font-family: var(--mono); }

  /* Bottom-line balance sheet */
  .bs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.7rem;
  }
  @media (max-width: 600px) { .bs-grid { grid-template-columns: 1fr; } }
  .bs-block {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 0.7rem 0.85rem;
  }
  .bs-block h5 {
    margin: 0 0 0.5rem;
    font-size: 0.76rem;
    color: var(--dim);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .bs-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.85rem;
    padding: 0.2rem 0;
    gap: 0.5rem;
  }
  .bs-line .ll { color: var(--dim); }
  .bs-line .lv { font-family: var(--mono); white-space: nowrap; font-weight: 500; }
  .bs-line .lv.pos { color: var(--accent); }
  .bs-line .lv.neg { color: var(--error); }
  .bs-line.total {
    border-top: 1px solid var(--border);
    margin-top: 0.3rem;
    padding-top: 0.4rem;
    font-weight: 600;
  }
  .bs-line.total .ll { color: var(--text); font-weight: 600; }

  .note {
    font-size: 0.78rem;

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
function fmt(n, d = 2) {
  if (n == null || isNaN(n)) return '–';
  return Number(n).toLocaleString(undefined, {
    minimumFractionDigits: d, maximumFractionDigits: d
  });
}
function fmtInt(n) {
  if (n == null || isNaN(n)) return '–';
  return Math.round(Number(n)).toLocaleString();
}
function fmtBtc(n, d = 2) { return n == null || isNaN(n) ? '–' : fmt(n, d) + ' ₿'; }
function fmtSigned(n, d = 2) {
  if (n == null || isNaN(n)) return '–';
  const sign = n > 0 ? '+' : '';
  return sign + fmt(n, d) + ' ₿';
}
function fmtCompact(n) {
  if (n == null || isNaN(n)) return '–';
  const abs = Math.abs(n);
  if (abs >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (abs >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return Math.round(n).toLocaleString();
}
function expectedDamagePerHit(d) {
  const atk = d.atk || 0;
  const prc = (d.prc || 0) / 100;
  const cc  = (d.cc  || 0) / 100;
  const cdMult = 1 + (d.cd || 0) / 100;
  const landed = prc * ((1 - cc) * atk + cc * atk * cdMult);
  const missed = (1 - prc) * atk * 0.5;
  return landed + missed;
}
function flag(code) {
  if (!code || code.length !== 2) return '🏳️';
  return code.toUpperCase().split('').map(c =>
    String.fromCodePoint(c.charCodeAt(0) - 65 + 0x1F1E6)
  ).join('');
}
function midpoint([min, max]) { return (min + max) / 2; }

function tipRows(content) {
  if (typeof content === 'string') return `<span class="tip-row">${escapeHtml(content)}</span>`;

/* ═══════════════════════════════════════════════════════════════════
 *  TRPC CLIENT
 * ═══════════════════════════════════════════════════════════════════ */
async function trpc(endpoint, params = {}) {
  const input = encodeURIComponent(JSON.stringify(params));
  const url = `${CFG.API}/${endpoint}?input=${input}`;
  if (DEBUG) console.log(`→ ${endpoint}`, params);
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${endpoint} HTTP ${res.status}`);
  const json = await res.json();
  if (DEBUG) console.log(`← ${endpoint}`, json);
  const item = Array.isArray(json) ? json[0] : json;
  if (item?.error) throw new Error(`${endpoint}: ${item.error.message || 'error'}`);
  const d = item?.result?.data;
  return d?.json ?? d ?? item;
}

async function resolveUserId(input) {
  const t = input.trim();
  if (!t) return null;
  if (/^[a-f0-9]{24}$/i.test(t)) return t;
  const r = await trpc('search.searchAnything', { searchText: t });
  const userIds = r?.userIds || [];
  if (!userIds.length) return null;
  return userIds[0];
}

async function loadPlayer(userId) {
  const [user, inventory, companyList, pricesR, workersR] = await Promise.allSettled([
    trpc('user.getUserById', { userId }),
    trpc('inventory.fetchCurrentEquipment', { userId }),
    trpc('company.getCompanies', { userId, perPage: 50 }),
    trpc('itemTrading.getPrices'),
    trpc('worker.getWorkers', { userId }),
  ]);

  const u = user.status === 'fulfilled' ? user.value : null;
  const ids = companyList.status === 'fulfilled' ? (companyList.value?.items || []) : [];

  const workersData = workersR.status === 'fulfilled' ? workersR.value : null;
  const workersByCompanyId = {};
  if (workersData?.workersPerCompany) {
    workersData.workersPerCompany.forEach(entry => {
      if (entry?.company?._id) {
        workersByCompanyId[entry.company._id] = entry.workers || [];
      }
    });
  }

  const secondary = await Promise.allSettled([
    ...ids.map(id => trpc('company.getById', { companyId: id })),
    u?.country ? trpc('country.getCountryById', { countryId: u.country }) : Promise.resolve(null),
    u?.mu ? trpc('mu.getById', { muId: u.mu }) : Promise.resolve(null),
    u?.company ? trpc('company.getById', { companyId: u.company }) : Promise.resolve(null),
  ]);

  const companies = secondary.slice(0, ids.length)
    .filter(r => r.status === 'fulfilled')
    .map(r => r.value);
  const country = secondary[ids.length]?.status === 'fulfilled' ? secondary[ids.length].value : null;
  const mu = secondary[ids.length + 1]?.status === 'fulfilled' ? secondary[ids.length + 1].value : null;
  const workplaceCompany = secondary[ids.length + 2]?.status === 'fulfilled' ? secondary[ids.length + 2].value : null;

  let ownWage = null;
  let ownFidelity = null;
  if (workplaceCompany?.user) {
    try {
      const ownerWorkers = await trpc('worker.getWorkers', { userId: workplaceCompany.user });
      if (ownerWorkers?.workersPerCompany) {
        const entry = ownerWorkers.workersPerCompany.find(e => e?.company?._id === workplaceCompany._id);
        const myRecord = entry?.workers?.find(w => w.user === userId);
        if (myRecord) {
          ownWage = Number(myRecord.wage);
          ownFidelity = Number(myRecord.fidelity);
        }
      }
    } catch (e) {
      if (DEBUG) console.warn('Failed to fetch workplace workers:', e);
    }
  }

  return {
    userId,
    user: u,
    userError: user.status === 'rejected' ? String(user.reason?.message || user.reason) : null,
    inventory: inventory.status === 'fulfilled' ? inventory.value : null,
    inventoryError: inventory.status === 'rejected' ? String(inventory.reason?.message || inventory.reason) : null,
    companies,
    companiesError: companyList.status === 'rejected' ? String(companyList.reason?.message || companyList.reason) : null,
    country, mu,
    workplaceCompany,
    workersByCompanyId,
    ownWage, ownFidelity,
    ownWorkOffer: ownWage != null ? { wage: ownWage, fidelity: ownFidelity, source: 'worker_record' } : null,
    prices: pricesR.status === 'fulfilled' ? normalizePrices(pricesR.value) : {},
    pricesError: pricesR.status === 'rejected' ? String(pricesR.reason?.message || pricesR.reason) : null,
    workersError: workersR.status === 'rejected' ? String(workersR.reason?.message || workersR.reason) : null,
  };
}

function normalizePrices(raw) {
  if (!raw) return {};
  if (Array.isArray(raw)) {
    const out = {};
    raw.forEach(item => {
      const code = item?.itemCode || item?.code || item?.item;
      const price = item?.price ?? item?.value;
      if (code && price != null) out[code] = price;
    });
    return out;
  }
  if (raw.prices && typeof raw.prices === 'object') return raw.prices;
  if (typeof raw === 'object') return raw;
  return {};
}

function offerWage(offer) {
  if (!offer) return null;
  const candidates = [offer.wage, offer.salary, offer.payment, offer.amount, offer.ppPerWork, offer.gold];
  for (const c of candidates) {
    if (c != null && !isNaN(c)) return Number(c);
  }
  return null;
}

/* ═══════════════════════════════════════════════════════════════════
 *  EXTRACTION
 * ═══════════════════════════════════════════════════════════════════ */
function extractPlayer(data) {
  const u = data.user || {};
  const s = u.skills || {};
  const lv = u.leveling || {};
  const grab = (k, prop = 'level') => s[k]?.[prop] ?? 0;
  return {
    userId: data.userId,
    username: u.username || '?',
    avatarUrl: u.avatarUrl,
    level: lv.level ?? '?',
    militaryRank: u.militaryRank,
    militaryRankPercent: s.attack?.militaryRankPercent ?? 0,
    totalSp: lv.totalSkillPoints ?? 0,
    spentSp: lv.spentSkillPoints ?? 0,
    availableSp: lv.availableSkillPoints ?? 0,
    levels: Object.fromEntries(
      [...FIGHT_KEYS, ...ECO_KEYS].map(k => [k, grab(k, 'level')])
    ),
    derived: {
      atk: grab('attack', 'total'),
      prc: grab('precision', 'total'),
      cc:  grab('criticalChance', 'total'),
      cd:  grab('criticalDamages', 'total'),
      armRaw: grab('armor', 'total'),
      arm: s.armor?.totalAfterSoftCap ?? s.armor?.total ?? 0,
      ddgRaw: grab('dodge', 'total'),
      ddg: s.dodge?.totalAfterSoftCap ?? s.dodge?.total ?? 0,
      hp:  grab('health', 'total') || 100,
      loot: grab('lootChance', 'total'),
      hunger: grab('hunger', 'total') || 4,
    },
    eco: {
      energy: grab('energy', 'total'),
      entrepreneurship: grab('entrepreneurship', 'total'),
      production: grab('production', 'total'),
      companies: grab('companies', 'total'),
      management: grab('management', 'total'),
    },
  };
}

function extractEquipment(inv) {
  const slot = key => {
    const p = inv?.[key];
    if (!p) return null;
    const code = p.code ?? '?';
    const rarity = rarityFromCode(code);
    return {
      code, rarity,
      displayName: gearItemName(key, rarity),
      durability: p.state != null ? Math.round((p.state / (p.maxState || 100)) * 100) : null,
      skills: p.skills || {},
    };
  };
  return {
    weapon: slot('weapon'), helmet: slot('helmet'), chest: slot('chest'),
    pants: slot('pants'), boots: slot('boots'), gloves: slot('gloves'),
  };
}

function extractCompanies(data) {
  const items = Array.isArray(data.companies) ? data.companies : [];
  const prices = data.prices || {};
  const workersByCompany = data.workersByCompanyId || {};
  const A = FACTORY_ASSUMPTIONS;

  return items.map(co => {
    const id = co._id;
    const itemCodeStr = co.itemCode ?? '?';
    const workerCount = co.workerCount ?? 0;
    const aeLevel = co.activeUpgradeLevels?.automatedEngine ?? 0;
    const price = prices[itemCodeStr] != null ? Number(prices[itemCodeStr]) : null;
    const aePP = AE_TABLE[aeLevel] ?? (aeLevel * 24);

    const workers = workersByCompany[id] || [];
    let workerPP = 0;
    let dailyWageCost = null;
    const workerDetails = [];
    if (workers.length > 0) {
      let wageSum = 0;
      workers.forEach(w => {
        const fid = Number(w.fidelity) || 0;
        const wage = Number(w.wage) || 0;
        const pp = A.workerActionsPerDay * A.workerProduction * (1 + fid / 100);
        workerPP += pp;
        wageSum += wage * A.workerActionsPerDay;
        workerDetails.push({ fidelity: fid, wage, dailyWage: wage * A.workerActionsPerDay, pp });
      });
      dailyWageCost = wageSum;
    } else if (workerCount > 0) {
      workerPP = workerCount * A.workerActionsPerDay * A.workerProduction;
    }

    const dailyOutput = (aePP + workerPP) * A.outputCalibration;
    const dailyRevenue = price != null ? dailyOutput * price : null;

    const recipe = RECIPES[itemCodeStr];
    const isProcessed = !!recipe;
    const recipeBreakdown = [];
    let dailyIngredientCost = null;
    if (recipe) {
      let allPriced = true;
      let cost = 0;
      for (const [ing, qty] of Object.entries(recipe)) {
        const ingPrice = prices[ing] != null ? Number(prices[ing]) : null;
        recipeBreakdown.push({ ingredient: ing, qty, price: ingPrice });
        if (ingPrice == null) { allPriced = false; }
        else { cost += qty * dailyOutput * ingPrice; }
      }
      if (allPriced) dailyIngredientCost = cost;
    }

    const dailyNet = (dailyRevenue != null)
      ? dailyRevenue - (dailyWageCost || 0) - (dailyIngredientCost || 0)
      : null;

    return {
      id, name: co.name ?? '?',
      itemCode: itemCodeStr,
      aeLevel, aePP,
      storageLevel: co.activeUpgradeLevels?.storage ?? null,
      breakRoomLevel: co.activeUpgradeLevels?.breakRoom ?? null,
      stored: co.production ?? null,
      estimatedValue: co.estimatedValue ?? null,
      workerCount, workers: workerDetails, workerPP,
      isProcessed, recipeBreakdown, dailyIngredientCost,
      marketPrice: price, dailyOutput, dailyRevenue, dailyWageCost, dailyNet,
    };
  });
}

/* ═══════════════════════════════════════════════════════════════════
 *  COMPUTE
 * ═══════════════════════════════════════════════════════════════════ */
function buildLabel(player) {
  const fightSpent = pointsSpent(player.levels, FIGHT_KEYS);
  const ecoSpent = pointsSpent(player.levels, ECO_KEYS);
  const total = fightSpent + ecoSpent;
  if (total === 0) return { label: 'Unallocated', sub: 'No skill points spent' };
  const fightShare = fightSpent / total;
  const fp = Math.round(fightShare * 100);
  const ep = 100 - fp;
  // Thresholds: 9 fight skills vs 5 eco — an even spread by count would be
  // 64% fight, so we anchor "Fight build" well above that and "Eco build"
  // well below 50% (eco-heavy enough that they're actively skipping fight
  // skills despite the larger fight tree).
  if (fightShare > 0.75) return { label: 'Fight build', sub: `${fp}% fight / ${ep}% eco` };
  if (fightShare < 0.50) return { label: 'Eco build',   sub: `${fp}% fight / ${ep}% eco` };
  return                       { label: 'Hybrid build', sub: `${fp}% fight / ${ep}% eco` };
}

function actionsPerDay(bar, usagePct = 1) {
  // Bar regens at 10% of max per hour. Each action costs 7 of the bar.
  // → daily regen = bar × 0.1 × 24 = bar × 2.4, then divide by 7.
  return (bar * 2.4 / 7) * usagePct;
}

function effectiveHitsPerDay(player, params) {
  if (params.hitsPerDay != null && !isNaN(params.hitsPerDay) && params.hitsPerDay >= 0) {
    return params.hitsPerDay;
  }
  return Math.round(actionsPerDay(player.eco.energy));
}

function computeFoundations(player, comps, preset) {
  const items = [];
  const f = preset.foundations || {};
  const minCo = f.minCompanies ?? 0;
  const minAe = f.minAe ?? 0;

  if (player.eco.companies < minCo) {
    const needSlots = minCo - player.eco.companies;
    const targetSkill = companiesSkillLevelForMax(minCo);
    const currentSkill = player.levels.companies || 0;
    items.push({
      what: `Unlock ${needSlots} more company slot${needSlots > 1 ? 's' : ''}`,
      detail: `Level the Companies skill from ${currentSkill} to ${targetSkill}. Requires leveling up to earn SP.`,
      cost: 'none', tone: 'warn',
    });
  }
  const targetBuilt = Math.min(minCo, player.eco.companies);
  if (comps.length < targetBuilt) {
    const need = targetBuilt - comps.length;
    const available = player.eco.companies - comps.length;
    items.push({
      what: `Build ${need} more compan${need > 1 ? 'ies' : 'y'}`,
      detail: `You have ${comps.length} built and ${available} unused slot${available > 1 ? 's' : ''}.`,
      cost: 'none', tone: 'warn',
    });
  }
  const lowAe = comps.filter(c => c.aeLevel < minAe);
  if (lowAe.length > 0) {
    const names = lowAe.map(c => `${c.name} (AE ${c.aeLevel})`).join(', ');
    items.push({
      what: `Upgrade ${lowAe.length} compan${lowAe.length > 1 ? 'ies' : 'y'} to AE ${minAe}`,
      detail: `Below target: ${names}.`,
      cost: 'none', tone: 'warn',
    });
  }
  return { items, note: f.note || '', minCompanies: minCo, minAe };
}

function computeGearNeeds(eq, preset, prices, params) {
  const days = params.warDays;

  if (preset.gearModel === 'stockpile') {
    const items = preset.gearStockpile.map(g => {
      const code = itemCode(g.slot, g.rarity);
      const qty = Math.ceil(g.perDay * days);
      const price = prices?.[code];
      const unit = price != null ? Number(price) : null;
      const line = unit != null ? unit * qty : null;
      return {
        slot: g.slot, targetCode: code, targetRarity: g.rarity,
        qty, unit, line,
        detail: `${g.perDay}/day × ${days} day${days > 1 ? 's' : ''}`,
      };
    });
    const total = items.reduce((s, i) => s + (i.line || 0), 0);
    const anyMissing = items.some(i => i.unit == null);
    return { items, total, anyMissing };
  }

  const items = [];
  let total = 0;
  let anyMissing = false;
  const slots = ['weapon', 'helmet', 'chest', 'pants', 'boots', 'gloves'];

  for (const slot of slots) {
    const targetRarity = preset.gear[slot];
    const targetCode = itemCode(slot, targetRarity);
    let qty = 0;
    let detail = '';

    if (preset.gearModel === 'per-day') {
      const perDay = preset.gearPerDay?.[slot] || 0;
      qty = Math.ceil(perDay * days);
      detail = `${perDay}/day × ${days} days — replaces gear as it breaks`;
    } else {
      const currentCode = eq?.[slot]?.code;
      const currentRarity = rarityFromCode(currentCode);
      const needUpgrade = !currentRarity || rarityIndex(currentRarity) < rarityIndex(targetRarity);
      if (needUpgrade) {
        qty = 1;
        detail = currentRarity
          ? `Upgrade from ${RARITY_LABEL[currentRarity]} ${SLOT_LABEL[slot]}`
          : `No ${SLOT_LABEL[slot].toLowerCase()} equipped`;
      }
    }

    if (qty > 0) {
      const price = prices?.[targetCode];
      const unit = price != null ? Number(price) : null;
      const line = unit != null ? unit * qty : null;
      if (unit == null) anyMissing = true;
      if (line != null) total += line;
      items.push({ slot, targetCode, targetRarity, qty, unit, line, detail });
    }
  }
  return { items, total, anyMissing };
}

function computeConsumables(preset, prices, player, params) {
  const days = params.warDays;
  const out = [];
  let total = 0;
  let anyMissing = false;

  const push = (cons, qty, detail) => {
    if (!cons || qty <= 0) return;
    const price = prices?.[cons.code];
    const unit = price != null ? Number(price) : null;
    const line = unit != null ? unit * qty : null;
    if (unit == null) anyMissing = true;
    if (line != null) total += line;
    out.push({ kind: cons.kind, code: cons.code, label: cons.label, qty, unit, line, detail });
  };

  if (preset.consumablesModel === 'pill-push') {
    const per = preset.consumablesPerDay;
    push(CONSUMABLES[preset.buffs.ammo], per.ammo * days, `${per.ammo}/day × ${days} day${days > 1 ? 's' : ''}`);
    push(CONSUMABLES[preset.buffs.food], Math.ceil(per.food * days), `${per.food}/day × ${days} day${days > 1 ? 's' : ''}`);
    if (preset.pillsTotal != null) {
      push(CONSUMABLES.pill, preset.pillsTotal, `${preset.pillsTotal} total per push (≈ 1 per pill day)`);
    }
  } else {
    const hitsPerDay = effectiveHitsPerDay(player, params);
    const totalHits = hitsPerDay * days;
    const hunger = player?.derived?.hunger || 4;
    push(CONSUMABLES[preset.buffs.ammo], totalHits, `1 per hit × ${fmt(hitsPerDay, 1)} hits/day × ${days} days`);
    push(CONSUMABLES[preset.buffs.food], Math.ceil(totalHits / hunger), `1 per ${hunger} hits × ${totalHits} hits`);
    if (preset.buffs.pill) push(CONSUMABLES.pill, days * params.pillsPerDay, `${params.pillsPerDay}/day × ${days} days`);
  }

  return { items: out, total, days, anyMissing };
}

function computeTargetStats(preset, militaryRankPercent = 0) {
  const g = preset.gear, b = preset.buffs;
  const gs = r => GEAR_STATS[r];

  const weaponAtk  = midpoint(gs(g.weapon).weapon.attack);
  const weaponCrit = midpoint(gs(g.weapon).weapon.crit);
  const helmetCD   = midpoint(gs(g.helmet).helmet.critDamage);
  const chestArm   = midpoint(gs(g.chest).chest.armor);
  const pantsArm   = midpoint(gs(g.pants).pants.armor);
  const bootsDdg   = midpoint(gs(g.boots).boots.dodge);
  const glovesPrc  = midpoint(gs(g.gloves).gloves.precision);

  const pillMult = b.pill ? BUFFS.pill.damageMult : 1;
  const ammoMult = BUFFS.ammo[b.ammo] ?? 1;
  const foodHp   = BUFFS.food[b.food] ?? 0;
  const rankMult = 1 + militaryRankPercent / 100;

  const armRaw = chestArm + pantsArm;
  const ddgRaw = bootsDdg;

  return {
    atk: (100 + weaponAtk) * ammoMult * pillMult * rankMult,
    prc: 50 + glovesPrc,
    cc:  10 + weaponCrit,
    cd:  100 + helmetCD,
    armRaw, arm: armRaw / (armRaw + 40) * 100,
    ddgRaw, ddg: ddgRaw / (ddgRaw + 40) * 100,
    hp:  100 * (1 + foodHp),
  };
}

function computeDailyDuringWar(preset, prices, player, data, params, consumables) {
  const comps = extractCompanies(data);
  const consumablesDaily = (consumables?.total || 0) / Math.max(1, params.warDays);
  const factoryRevenue = comps.reduce((s, c) => s + (c.dailyRevenue || 0), 0);
  const factoryWageCost = comps.reduce((s, c) => s + (c.dailyWageCost || 0), 0);
  const factoryIngCost = comps.reduce((s, c) => s + (c.dailyIngredientCost || 0), 0);
  const factoryNet = factoryRevenue - factoryWageCost - factoryIngCost;
  const factoriesHaveRevenue = comps.some(c => c.dailyRevenue != null);
  const factoriesHaveWage = comps.some(c => c.dailyWageCost != null);

  const ownWage = offerWage(data.ownWorkOffer);
  const workActionsPeace = actionsPerDay(player.eco.energy);
  const wageIncomePeace = ownWage != null ? ownWage * workActionsPeace : null;

  const lootIncome = WAR_LOOT_INCOME_PER_DAY;
  const peaceNet = (wageIncomePeace ?? 0) + factoryNet;
  const warNet   = factoryNet + lootIncome - consumablesDaily;
  const burnRate = peaceNet - warNet;

  return {
    consumablesDaily,
    factoryRevenue, factoryWageCost, factoryIngCost, factoryNet,
    factoriesHaveRevenue, factoriesHaveWage,
    ownWage, workActionsPeace, wageIncomePeace,
    lootIncome,
    peaceNet, warNet, burnRate,
    hasOwnWage: ownWage != null,
    consumableLines: consumables?.items || [],
  };
}

/* ═══════════════════════════════════════════════════════════════════
 *  RENDER — PLAYER HEADER + ROOT
 * ═══════════════════════════════════════════════════════════════════ */
function renderPlayer(data) {
  if (!data.user) {
    setStatus('error', `Could not load user. ${data.userError || ''}`);
    return;
  }
  const p = extractPlayer(data);
  cached.player = p;
  cached.data = data;

  // Reset view level to "current level" on a fresh load.
  viewLevel = null;

  const av = $('#avatar');
  if (p.avatarUrl) { av.src = p.avatarUrl; av.hidden = false; }
  else { av.hidden = true; }
  $('#player-name').textContent = p.username;

  const meta = [];
  meta.push(`<span class="pill">Level <span class="mono">${p.level}</span></span>`);
  const cc = data.country?.code;
  if (cc) meta.push(`<span class="pill">${flag(cc)} ${escapeHtml(cc.toUpperCase())}</span>`);
  const muName = data.mu?.name;
  if (muName) meta.push(`<span class="pill">${escapeHtml(muName)}</span>`);
  if (p.militaryRank != null) {
    meta.push(`<span class="pill">Mil rank <span class="mono">${p.militaryRank}</span></span>`);
  }
  $('#player-meta').innerHTML = meta.join(' ');

  renderCurrentState(p, data);
  renderTargetBuild(p, data);

  if (DEBUG) {
    $('#debug-panel').classList.remove('hidden');
    $('#debug-content').textContent = JSON.stringify({
      userId: data.userId, user: data.user, inventory: data.inventory,
      companies: data.companies, country: data.country, mu: data.mu,
      ownWorkOffer: data.ownWorkOffer, workersByCompanyId: data.workersByCompanyId,
      prices: data.prices,
      errors: { user: data.userError, inventory: data.inventoryError,
        companies: data.companiesError, prices: data.pricesError, workers: data.workersError }
    }, null, 2);
  }

  $('#player').classList.remove('hidden');
}

 *  RENDER — CURRENT STATE (four compact collapsible cards)
 * ═══════════════════════════════════════════════════════════════════ */
function renderCurrentState(p, data) {
  const eq = extractEquipment(data.inventory);
  const comps = extractCompanies(data);

  const build = buildLabel(p);
  const hitsPerDay = actionsPerDay(p.eco.energy);
  const dmgPerDay = expectedDamagePerHit(p.derived) * hitsPerDay;

  const ownWage = offerWage(data.ownWorkOffer);
  const dailyWageIncome = ownWage != null ? ownWage * actionsPerDay(p.eco.energy) : 0;
  const factoryNet = comps.reduce((s, c) => s + (c.dailyNet || 0), 0);
  const totalDailyIncome = factoryNet + dailyWageIncome;
  const incomeSign = totalDailyIncome >= 0 ? 'pos' : 'neg';

  const wealthTotal = data.user?.stats?.wealth?.total;

  $('#state-content').innerHTML = `
    ${compactCard('build',
      `<span class="cc-title">Build</span>
       <span class="cc-summary"><span class="cc-pill accent">${escapeHtml(build.label)}</span> <span class="muted">${escapeHtml(build.sub)}</span></span>
       <span class="cc-aux">Lvl ${p.level}</span>`,
      renderBuildBody(p)
    )}

    ${compactCard('damage',
      `<span class="cc-title">Damage</span>
       <span class="cc-summary"><span class="cc-pill">${fmtCompact(dmgPerDay)} dmg/day</span> <span class="muted">${fmtInt(p.derived.atk)} atk · ${fmt(hitsPerDay, 1)} hits</span></span>`,
      renderDamageBody(p, eq)
    )}

    ${compactCard('income',
      `<span class="cc-title">Income</span>
       <span class="cc-summary"><span class="cc-pill ${incomeSign}">${fmtSigned(totalDailyIncome)}/day</span> <span class="muted">${comps.length} compan${comps.length === 1 ? 'y' : 'ies'}${dailyWageIncome > 0 ? ` + job (${fmtBtc(dailyWageIncome)})` : ''}</span></span>`,
      renderIncomeBody(p, data, comps, ownWage, dailyWageIncome, factoryNet)
    )}

    ${compactCard('wealth',
      `<span class="cc-title">Wealth</span>
       <span class="cc-summary"><span class="cc-pill">${wealthTotal != null ? fmtCompact(wealthTotal) + ' ₿' : 'unavailable'}</span></span>`,
      renderWealthBody(data)
    )}
  `;
}

  `;
}

const STAT_LABELS = {
  attack: 'attack', criticalChance: 'crit chance', criticalDamages: 'crit damage',
  armor: 'armor', dodge: 'dodge', precision: 'precision',
};

function equipmentTable(eq) {
  const slots = [
    ['weapon', 'Weapon', ['attack', 'criticalChance']],
    ['helmet', 'Helmet', ['criticalDamages']],
    ['chest',  'Chest',  ['armor']],
    ['pants',  'Pants',  ['armor']],
    ['boots',  'Boots',  ['dodge']],
    ['gloves', 'Gloves', ['precision']],
  ];
  const rows = slots.map(([key, label, statKeys]) => {
    const item = eq[key];
    if (!item) return `<tr class="empty"><td>${label}</td><td colspan="3">empty</td></tr>`;
    const statStr = statKeys
      .map(sk => { const v = item.skills[sk]; return v ? `${fmtInt(v)} ${STAT_LABELS[sk] || sk}` : null; })
      .filter(Boolean).join(', ') || '–';
    const nameCell = item.rarity
      ? `${escapeHtml(item.displayName)}${rarityTag(item.rarity)}`
      : `<span class="mono">${escapeHtml(item.code)}</span>`;
    return `<tr>
      <td>${label}</td>
      <td>${nameCell}</td>
      <td>${statStr}</td>
      <td class="num">${item.durability != null ? fmtInt(item.durability) + '%' : '–'}</td>
    </tr>`;
  });
  return `<table class="list">
    <thead><tr><th>Slot</th><th>Item</th><th>Stat</th><th>Durability</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

function renderIncomeBody(p, data, comps, ownWage, dailyWageIncome, factoryNet) {
  const eco = p.eco;
  const workActions = actionsPerDay(eco.energy, 1);
  const entreActions = actionsPerDay(eco.entrepreneurship, 1);

  const factoryRevenue = comps.reduce((s, c) => s + (c.dailyRevenue || 0), 0);
  const factoryWageCost = comps.reduce((s, c) => s + (c.dailyWageCost || 0), 0);
  const factoryIngCost = comps.reduce((s, c) => s + (c.dailyIngredientCost || 0), 0);

  return `
    <div class="bs-grid" style="margin-bottom: 0.85rem;">
      <div class="bs-block">
        <h5>Daily inflow</h5>
        ${ownWage != null ? `
          <div class="bs-line">
            <span class="ll">Job wage<span class="qty" style="color: var(--dimmer); font-family: var(--mono); font-size: 0.74rem; margin-left: 0.3rem;">${fmt(ownWage, 3)} × ${fmt(workActions, 1)}</span></span>
            <span class="lv pos">${fmtSigned(dailyWageIncome)}</span>
          </div>` : ''}
        <div class="bs-line">
          <span class="ll">Company revenue</span>
          <span class="lv pos">${fmtSigned(factoryRevenue)}</span>
        </div>
        <div class="bs-line total">
          <span class="ll">Total in</span>
          <span class="lv pos">${fmtSigned(factoryRevenue + dailyWageIncome)}</span>
        </div>
      </div>
      <div class="bs-block">
        <h5>Daily costs</h5>
        ${factoryWageCost > 0 ? `<div class="bs-line">
          <span class="ll">Worker wages</span>
          <span class="lv neg">${fmtSigned(-factoryWageCost)}</span>
        </div>` : ''}
        ${factoryIngCost > 0 ? `<div class="bs-line">
          <span class="ll">Ingredient costs</span>
          <span class="lv neg">${fmtSigned(-factoryIngCost)}</span>
        </div>` : ''}
        ${factoryWageCost === 0 && factoryIngCost === 0 ? `<div class="bs-line"><span class="ll muted">No recurring costs</span><span class="lv">${fmtBtc(0)}</span></div>` : ''}
        <div class="bs-line total">
          <span class="ll">Total out</span>
          <span class="lv neg">${fmtSigned(-(factoryWageCost + factoryIngCost))}</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Pools<span class="right">Energy ${eco.energy} · Entr ${eco.entrepreneurship}</span></div>
      <div class="skills">
        <div class="skill">
          <span class="skill-name">Energy pool (work or fight)</span>
          <span class="skill-value"><span class="total">${fmt(workActions, 1)}</span> <span class="sub">actions/day</span></span>
        </div>
        <div class="skill">
          <span class="skill-name">Entrepreneurship pool (self-work)</span>
          <span class="skill-value"><span class="total">${fmt(entreActions, 1)}</span> <span class="sub">actions/day</span></span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Per company · ${comps.length}/${eco.companies}</div>
      ${companiesTable(comps)}
    </div>
  `;
}

function companyBreakdownRows(c) {
  const rows = [];
  rows.push({ term: 'Engine', desc: c.aeLevel ? `AE ${c.aeLevel} → ${fmtInt(c.aePP)} units/day` : 'No automated engine' });

  if (c.workers && c.workers.length) {
    const fidList = c.workers.map(w => `fid ${w.fidelity} @ ${fmt(w.wage, 3)} ₿/act`).join(', ');
    rows.push({ term: 'Workers', desc: `${c.workers.length} (${fidList}) → +${fmtInt(c.workerPP)} units/day, wages ${fmtBtc(c.dailyWageCost)}/day` });
  } else if (c.workerCount > 0) {
    rows.push({ term: 'Workers', desc: `${c.workerCount} worker(s), details not loaded` });
  } else {
    rows.push({ term: 'Workers', desc: 'None' });
  }

  if (c.dailyOutput) rows.push({ term: 'Total output', desc: `${fmtInt(c.dailyOutput)} units/day` });

  if (c.marketPrice != null) {
    rows.push({ term: 'Revenue', desc: `${fmt(c.marketPrice, 3)} ₿ × ${fmtInt(c.dailyOutput)} = ${fmtBtc(c.dailyRevenue)}/day` });
  } else {
    rows.push({ term: 'Revenue', desc: 'Market price unavailable' });
  }

  if (c.isProcessed && c.dailyIngredientCost != null) {
    const recipeStr = c.recipeBreakdown.map(r => `${r.qty}× ${r.ingredient}`).join(' + ');
    rows.push({ term: 'Ingredients', desc: `${recipeStr} → −${fmtBtc(c.dailyIngredientCost)}/day` });
  }

  if (c.dailyNet != null) rows.push({ term: 'Net', desc: `${fmtSigned(c.dailyNet)}/day` });
  return rows;
}

function companiesTable(comps) {
  if (!comps.length) return `<p class="muted" style="font-size:0.85rem; margin:0;">No companies found.</p>`;
  const rows = comps.map(c => {
    const revCol = c.dailyRevenue != null
      ? `<td class="num">${fmtBtc(c.dailyRevenue)}</td>`
      : `<td class="num muted">–</td>`;
    const netCol = c.dailyNet != null
      ? `<td class="${c.dailyNet >= 0 ? 'pos' : 'neg'}">${fmtSigned(c.dailyNet)}</td>`
      : `<td class="num muted">–</td>`;
    return `<tr>
      <td>${escapeHtml(c.name)}&nbsp;<span class="mono" style="color: var(--dimmer); font-size: 0.76rem; margin-left: 0.25rem;">${escapeHtml(c.itemCode)}</span>&nbsp;${infoBtn(companyBreakdownRows(c), c.name + ' breakdown')}</td>
      <td>${c.aeLevel ? 'AE ' + c.aeLevel : '–'}</td>
      <td class="num">${c.workerCount}</td>
      ${revCol}
      ${netCol}
    </tr>`;
  });
  return `<table class="list">
    <thead><tr>
      <th>Company</th><th>Engine</th><th>Workers</th><th>Revenue</th><th>Net</th>
    </tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

function renderWealthBody(data) {
  const stats = data.user?.stats || {};
  const wealth = stats.wealth;
  if (!wealth || typeof wealth !== 'object') {
    return `<p class="muted" style="font-size:0.82rem; margin:0;">Wealth data unavailable.</p>`;
  }
  const rows = [
    ['Companies', wealth.companies],
    ['Items',     wealth.items],
    ['Money',     wealth.money],
    ['Equipment', wealth.equipments],
    ['Weapons',   wealth.weapons],
  ].filter(([, v]) => v != null);

  const tbody = rows.map(([label, value]) => `
    <tr><td>${label}</td><td class="num">${fmtBtc(value)}</td></tr>
  `).join('');

  return `<table class="list"><tbody>
    ${tbody}
    <tr><td><strong>Total</strong></td><td class="num"><strong>${fmtBtc(wealth.total)}</strong></td></tr>
  </tbody></table>`;
}

/* ═══════════════════════════════════════════════════════════════════
 *  RENDER — TARGET BUILD (5 collapsible boxes)
 * ═══════════════════════════════════════════════════════════════════ */
function renderTargetBuild(p, data) {
  const preset = PRESETS[selectedPreset];
  const currentLevel = parseInt(p.level, 10) || 0;

  // Resolve effective plan level. null = "my current level".
  // Floor at 20 (no published plan below that), cap at 30.
  const minLevel = Math.max(20, currentLevel);
  const effectiveLevel = viewLevel != null ? viewLevel : minLevel;
  const isProjected = currentLevel < 20;
  const isUnsupported = currentLevel > 30;

  // Pre-compute self-sustain status for both presets, for the tab badges.
  const tabBadges = {};
  for (const key of Object.keys(PRESETS)) {
    const ps = PRESETS[key];
    const tempParams = { ...warParams, warDays: warParams.warDays };
    const cons = computeConsumables(ps, data.prices, p, tempParams);
    const eq = extractEquipment(data.inventory);
    const gear = computeGearNeeds(eq, ps, data.prices, tempParams);
    const daily = computeDailyDuringWar(ps, data.prices, p, data, tempParams, cons);
    const selfFunding = daily.warNet >= 0;
    tabBadges[key] = {
      selfFunding,
      label: selfFunding ? '✓ Self-funding' : '⚠ Burns ₿',
      gearTotal: gear.total + cons.total,
    };
  }

  const target = computeTargetStats(preset, p.militaryRankPercent);
  const eq = extractEquipment(data.inventory);
  const comps = extractCompanies(data);
  const foundations = computeFoundations(p, comps, preset);
  const gearNeeds = computeGearNeeds(eq, preset, data.prices, warParams);
  const consumables = computeConsumables(preset, data.prices, p, warParams);
  const daily = computeDailyDuringWar(preset, data.prices, p, data, warParams, consumables);

  const totalToPrepare = (gearNeeds.total || 0) + (consumables.total || 0);
  const grandTotalSub = gearNeeds.anyMissing || consumables.anyMissing
    ? 'Some prices missing — total is a lower bound.'
    : `${escapeHtml(preset.daysLabel || 'War days')}: ${warParams.warDays}`;

  // Tabs
  const tabsHtml = Object.entries(PRESETS).map(([key, ps]) => {
    const badge = tabBadges[key];
    return `<button type="button" class="tab ${key === selectedPreset ? 'active' : ''}" data-preset="${key}">
      <span class="tab-name">${escapeHtml(ps.name)}</span>
      <span class="tab-sub">${escapeHtml(ps.sub || '')}</span>
      <span class="tab-badge ${badge.selfFunding ? 'self-funding' : 'burns'}">${escapeHtml(badge.label)}</span>
    </button>`;
  }).join('');

  // Level + duration control
  const levelControl = renderLevelControl(currentLevel, effectiveLevel, isProjected, isUnsupported, preset);

  // The 5 boxes
  const boxes = [
    targetBox('skills', '1', 'Skill allocation',
      skillSummary(p, preset, effectiveLevel),
      renderSkillBox(p, preset, effectiveLevel, currentLevel)),
    targetBox('companies', '2', 'Companies',
      foundationsSummary(foundations, comps),
      renderCompaniesBox(p, data, foundations, comps, preset)),
    targetBox('gear', '3', 'Gear & consumables',
      gearSummary(gearNeeds, consumables),
      renderGearBox(gearNeeds, consumables, preset)),
    targetBox('modelDay', '4', 'Model war day',
      `<span class="mono ${daily.warNet >= 0 ? 'pos' : 'neg'}">${fmtSigned(daily.warNet)}/day net</span>`,
      renderModelDayBox(daily, warParams, preset)),
    targetBox('bottomLine', '5', 'Bottom line',
      bottomLineSummary(daily, totalToPrepare, warParams),
      renderBottomLineBox(daily, totalToPrepare, warParams, preset, gearNeeds, consumables)),
  ].join('');

  $('#target-content').innerHTML = `
    <div class="tabs">${tabsHtml}</div>
    ${preset.outcome ? `<p class="placeholder-text" style="margin-bottom: 0.7rem;"><strong style="color: var(--accent);">Outcome</strong> ${escapeHtml(preset.outcome)}</p>` : ''}
    ${levelControl}

    <div class="grand-banner">
      <div>
        <div class="label">Total to prepare</div>
        <div class="sub">${grandTotalSub}</div>
      </div>
      <div class="mono">${fmtBtc(totalToPrepare)}</div>
    </div>

    ${boxes}
  `;

  // Wire up handlers.
  $$('#target-content .tab').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedPreset = btn.dataset.preset;
      warParams.warDays = PRESETS[selectedPreset].daysDefault ?? DEFAULT_WAR_PARAMS.warDays;
      renderTargetBuild(p, data);
    });
  });

  $$('#target-content .target-box-head').forEach(h => {
    h.addEventListener('click', () => {
      const box = h.closest('.target-box');
      const id = box.dataset.box;
      targetExpanded[id] = !targetExpanded[id];
      box.classList.toggle('open', targetExpanded[id]);
    });
  });

  const lvSelect = $('#plan-level');
  if (lvSelect) {
    lvSelect.addEventListener('change', () => {
      const v = parseInt(lvSelect.value, 10);
      viewLevel = isNaN(v) ? null : v;
      renderTargetBuild(p, data);
    });
  }
  const wDays = $('#war-days');
  if (wDays) {
    wDays.addEventListener('change', () => {
      const v = parseInt(wDays.value, 10);
      const fallback = PRESETS[selectedPreset].daysDefault ?? DEFAULT_WAR_PARAMS.warDays;
      warParams.warDays = isNaN(v) || v < 1 ? fallback : v;
      renderTargetBuild(p, data);
    });
  }
}

function targetBox(id, num, title, summary, body) {
  const open = targetExpanded[id];
  return `<div class="target-box${open ? ' open' : ''}" data-box="${id}">
    <div class="target-box-head">
      <span class="caret">▾</span>
      <span class="target-box-num">${num}.</span>
      <span class="target-box-title">${escapeHtml(title)}</span>
      <span class="target-box-summary">${summary || ''}</span>
    </div>
    <div class="target-box-body">${body}</div>
  </div>`;
}

function renderLevelControl(currentLevel, effectiveLevel, isProjected, isUnsupported, preset) {
  if (isUnsupported) {
    return `<div class="plan-control">
      <span class="muted">Plan for level:</span>
      <strong style="color: var(--warn);">Lvl ${currentLevel} not modelled</strong>
      ${infoBtn('Published guides cover Levels 20-30. For Lvl 31+ we use the Lvl 30 endgame plan as a reference.', 'Unsupported level')}
      <label>${escapeHtml(preset.daysLabel || 'War days')}
        <input id="war-days" type="number" min="1" max="30" value="${warParams.warDays}">
      </label>
      <p class="plan-note">Showing Lvl 30 endgame plan as a fallback. Lvl 30+ builds haven't been modelled yet.</p>
    </div>`;
  }

  const minLevel = Math.max(20, currentLevel);
  const options = [];
  for (let l = minLevel; l <= 30; l++) {
    const isCurrent = l === currentLevel;
    const label = isCurrent ? `Lvl ${l} (my level)` : `Lvl ${l}`;
    options.push(`<option value="${l}" ${l === effectiveLevel ? 'selected' : ''}>${label}</option>`);
  }

  const note = isProjected
    ? `You're at Lvl ${currentLevel} — Lvl 20 is the earliest plan we have. Numbers below assume you've levelled up first.`
    : '';

  return `<div class="plan-control">
    <label>Plan for
      <select id="plan-level">${options.join('')}</select>
    </label>
    <label>${escapeHtml(preset.daysLabel || 'War days')}
      <input id="war-days" type="number" min="1" max="30" value="${warParams.warDays}">
    </label>
    ${infoBtn([
      { term: 'Plan for', desc: 'Pick the level you want the plan computed for. Skill allocation steps update; gear/consumables stay the same.' },
      { term: preset.daysLabel || 'War days', desc: 'For Basic: full war duration. For High-Damage: pill push days (when you intend to pop pills).' },
    ], 'Plan controls')}
    ${note ? `<p class="plan-note">${escapeHtml(note)}</p>` : ''}
  </div>`;
}

/* ─── Box summaries (single-line right-aligned) ──────────────────── */
function skillSummary(p, preset, effectiveLevel) {
  if (!preset.skillPlan) return '<span class="muted">no plan</span>';
  const currentLevel = parseInt(p.level, 10) || 0;
  if (currentLevel >= 30) return '<span class="pos">✓ Lvl 30 reached</span>';
  const remaining = preset.skillPlan.filter(s => s.level > Math.max(currentLevel, effectiveLevel - 1)).length;
  return `<span class="muted">${remaining} step${remaining === 1 ? '' : 's'} to Lvl 30</span>`;
}

function foundationsSummary(foundations, comps) {
  if (foundations.items.length === 0) return '<span class="pos">✓ Ready</span>';
  const need = foundations.items.length;
  return `<span class="warn">${need} action${need > 1 ? 's' : ''} needed</span>`;
}

function gearSummary(gearNeeds, consumables) {
  const gearTotal = gearNeeds.total || 0;
  const consTotal = consumables.total || 0;
  const total = gearTotal + consTotal;
  if (total === 0 && gearNeeds.items.length === 0 && consumables.items.length === 0) {
    return '<span class="pos">✓ None needed</span>';
  }
  return `<span class="mono">${fmtBtc(total)}</span>${gearNeeds.anyMissing || consumables.anyMissing ? ' <span class="muted">+ unknowns</span>' : ''}`;
}

function bottomLineSummary(daily, totalToPrepare, params) {
  const warTotal = daily.warNet * params.warDays;
  const grandSwing = warTotal - totalToPrepare;
  return `<span class="mono ${grandSwing >= 0 ? 'pos' : 'neg'}">${fmtSigned(grandSwing)}</span>`;
}

/* ─── Box bodies ─────────────────────────────────────────────────── */
function renderSkillBox(p, preset, effectiveLevel, currentLevel) {
  if (!preset.skillPlan) {
    return `<p class="placeholder-text">No published skill plan for this preset yet.</p>`;
  }
  if (currentLevel >= 30) {
    return `<p class="placeholder-text ok">✓ You're at Lvl 30+. The base plan is complete — customize from here.</p>`;
  }

  const sorted = [...preset.skillPlan].sort((a, b) => a.level - b.level);
  // Filter: at "Lvl X" view, show rows for levels >= X.
  // Earlier levels (if current player is between 20 and X) are still shown
  // as done/baseline but de-emphasized.
  const showFromLevel = Math.max(21, effectiveLevel + 1);
  let nextMarked = false;
  const rows = sorted
    .filter(plan => plan.level > Math.max(20, currentLevel))
    .map(plan => {
      let cls = 'plan-row';
      let badge = '';
      // "Next" is the first row at-or-above effectiveLevel that we haven't marked.
      if (plan.level >= showFromLevel && !nextMarked) {
        cls += ' next';
        badge = '<span class="plan-badge next">next</span>';
        nextMarked = true;
      }
      const spend = plan.skill
        ? `+1 ${escapeHtml(plan.label)}`
        : `<span class="muted">${escapeHtml(plan.label)}</span>`;
      return `<div class="${cls}">
        <span class="plan-level">Lvl ${plan.level}</span>
        <span class="plan-spend">${spend}</span>
        ${badge}
      </div>`;
    }).join('');

  const note = currentLevel < 20
    ? `You're at Lvl ${currentLevel}. The plan starts at Lvl 21 (after the Lvl 20 baseline build). Get to Lvl 20 first by working and battling.`
    : currentLevel < effectiveLevel
      ? `Showing the plan from Lvl ${effectiveLevel + 1} onwards. Levels ${currentLevel + 1}–${effectiveLevel} are assumed done.`
      : '';

  const selfSustainable = !preset.buffs.pill;
  const sustainNote = selfSustainable
    ? '<p class="placeholder-text ok" style="margin-top: 0.6rem;">✓ Self-sustainable: this plan keeps 4 SP in the Companies skill (=6 max), enough to run 6 factories on AE while fighting.</p>'
    : '<p class="placeholder-text warn" style="margin-top: 0.6rem;">⚠ Pill push: heavy bitcoin burn. Foundations matter more — see Companies box.</p>';

  return `
    <div class="plan-list">${rows}</div>
    ${note ? `<p class="note">${escapeHtml(note)}</p>` : ''}
    ${sustainNote}
  `;
}

function renderCompaniesBox(p, data, foundations, comps, preset) {
  const eco = p.eco;
  const minCo = foundations.minCompanies;
  const minAe = foundations.minAe;

  let actionsHtml;
  if (foundations.items.length === 0) {
    actionsHtml = `<p class="placeholder-text ok">✓ Foundations ready — ${comps.length} compan${comps.length === 1 ? 'y' : 'ies'} at AE ${minAe}+.</p>`;
  } else {
    actionsHtml = `<div class="action-list">${foundations.items.map(actionRow).join('')}</div>`;
  }

  // Workforce check — flag if the player can't manage the workers their
  // build implies, or if they're overcommitted.
  const totalWorkers = comps.reduce((s, c) => s + (c.workerCount || 0), 0);
  let workforceHtml = '';
  if (totalWorkers > eco.management) {
    workforceHtml = `<p class="placeholder-text warn">⚠ You have ${totalWorkers} worker${totalWorkers > 1 ? 's' : ''} but only ${eco.management} management capacity. Some can't be hired.</p>`;
  }

  return `
    <div class="section">
      <div class="section-label">Required state<span class="right">${minCo} companies @ AE ${minAe}+</span></div>
      <p class="note" style="margin-top: 0;">${escapeHtml(foundations.note)}</p>
    </div>
    <div class="section">
      <div class="section-label">Current status<span class="right">${comps.length} / ${eco.companies} built · ${comps.filter(c => c.aeLevel >= minAe).length} at AE ${minAe}+</span></div>
      ${companiesTable(comps)}
    </div>
    <div class="section">
      <div class="section-label">What to fix</div>
      ${actionsHtml}
      ${workforceHtml}
    </div>
  `;
}

function renderGearBox(gearNeeds, consumables, preset) {
  let gearHtml;
  if (gearNeeds.items.length === 0) {
    gearHtml = `<p class="placeholder-text ok">✓ Gear ready — nothing to buy.</p>`;
  } else {
    const rows = gearNeeds.items.map(it => actionRow({
      what: `${escapeHtml(gearItemName(it.slot, it.targetRarity))}${rarityTag(it.targetRarity)} × ${fmtInt(it.qty)}`,
      detail: it.detail,
      cost: it.line != null ? it.line : null,
    })).join('');
    gearHtml = `<div class="action-list">${rows}</div>`;
  }

  let consumablesHtml;
  if (consumables.items.length === 0) {
    consumablesHtml = `<p class="placeholder-text">No consumables for this build.</p>`;
  } else {
    const rows = consumables.items.map(it => actionRow({
      what: `${escapeHtml(it.label)} × ${fmtInt(it.qty)}`,
      detail: it.detail,
      cost: it.line != null ? it.line : null,
    })).join('');
    consumablesHtml = `<div class="action-list">${rows}</div>`;
  }

  return `
    <div class="section">
      <div class="section-label">Gear to acquire<span class="right">${(gearNeeds.total || 0) > 0 ? fmtBtc(gearNeeds.total) : (gearNeeds.items.length ? 'no prices' : '—')}</span></div>
      ${gearHtml}
    </div>
    <div class="section">
      <div class="section-label">Consumables · ${consumables.days} day${consumables.days > 1 ? 's' : ''}<span class="right">${fmtBtc(consumables.total)}</span></div>
      ${consumablesHtml}
    </div>
    ${gearNeeds.anyMissing || consumables.anyMissing ? `<p class="note">Some market prices unavailable — those lines aren't included in totals.</p>` : ''}
  `;
}

function renderModelDayBox(daily, params, preset) {
  const inLines = [];
  if (daily.factoriesHaveRevenue) {
    inLines.push(`<div class="flow-line"><span class="ll">Company revenue</span><span class="lv pos">${fmtSigned(daily.factoryRevenue)}</span></div>`);
  } else {
    inLines.push(`<div class="flow-line"><span class="ll">Company revenue</span><span class="lv unk">unavailable</span></div>`);
  }
  if (daily.lootIncome > 0) {
    inLines.push(`<div class="flow-line"><span class="ll">Loot + missions <span class="qty">(est)</span></span><span class="lv pos">${fmtSigned(daily.lootIncome)}</span></div>`);
  }
  const moneyIn = (daily.factoriesHaveRevenue ? daily.factoryRevenue : 0) + (daily.lootIncome || 0);

  const outLines = [];
  if (daily.factoriesHaveWage && daily.factoryWageCost > 0) {
    outLines.push(`<div class="flow-line"><span class="ll">Worker wages</span><span class="lv neg">${fmtSigned(-daily.factoryWageCost)}</span></div>`);
  }
  if (daily.factoryIngCost > 0) {
    outLines.push(`<div class="flow-line"><span class="ll">Ingredient costs</span><span class="lv neg">${fmtSigned(-daily.factoryIngCost)}</span></div>`);
  }
  daily.consumableLines.forEach(it => {
    if (it.line == null) return;
    const dailyValue = it.line / Math.max(1, params.warDays);
    outLines.push(`<div class="flow-line">
      <span class="ll">${escapeHtml(it.label)}<span class="qty">× ${fmt(it.qty / Math.max(1, params.warDays), 1)}/day</span></span>
      <span class="lv neg">${fmtSigned(-dailyValue)}</span>
    </div>`);
  });
  const moneyOut = (daily.factoriesHaveWage ? daily.factoryWageCost : 0)
                 + (daily.factoryIngCost || 0)
                 + (daily.consumablesDaily || 0);

  const netDay = moneyIn - moneyOut;
  const netClass = netDay >= 0 ? 'positive' : 'negative';

  return `
    <p class="note" style="margin-top: 0;">One typical day during the war. Working-for-others wage pauses while Energy goes to fighting.</p>
    <div class="war-flow">
      <div class="flow-block">
        <h5>Money in</h5>
        ${inLines.join('')}
        <div class="flow-line flow-subtotal">
          <span class="ll">Total in</span>
          <span class="lv pos">${fmtSigned(moneyIn)}</span>
        </div>
      </div>
      <div class="flow-block">
        <h5>Money out</h5>
        ${outLines.length ? outLines.join('') : `<div class="flow-line"><span class="ll">No costs</span><span class="lv">${fmtBtc(0)}</span></div>`}
        <div class="flow-line flow-subtotal">
          <span class="ll">Total out</span>
          <span class="lv neg">${fmtSigned(-moneyOut)}</span>
        </div>
      </div>
      <div class="flow-net ${netClass}">
        <span>Net per day</span>
        <span class="mono">${fmtSigned(netDay)}/day</span>
      </div>
    </div>
  `;
}

function renderBottomLineBox(daily, totalToPrepare, params, preset, gearNeeds, consumables) {
  const days = params.warDays;
  const warTotal = daily.warNet * days;
  const peaceTotal = daily.peaceNet * days;
  const oppCost = peaceTotal - warTotal;
  const grandSwing = warTotal - totalToPrepare;

  return `
    <p class="note" style="margin-top: 0;">Full P&L for fighting this war (${days} day${days > 1 ? 's' : ''}) vs staying in peace.</p>

    <div class="bs-grid">
      <div class="bs-block">
        <h5>Upfront stockpile</h5>
        <div class="bs-line">
          <span class="ll">Gear</span>
          <span class="lv neg">${fmtSigned(-(gearNeeds.total || 0))}</span>
        </div>
        <div class="bs-line">
          <span class="ll">Consumables</span>
          <span class="lv neg">${fmtSigned(-(consumables.total || 0))}</span>
        </div>
        <div class="bs-line total">
          <span class="ll">Total upfront</span>
          <span class="lv neg">${fmtSigned(-totalToPrepare)}</span>
        </div>
      </div>

      <div class="bs-block">
        <h5>Over ${days} day${days > 1 ? 's' : ''} of war</h5>
        <div class="bs-line">
          <span class="ll">Per-day net (in war)</span>
          <span class="lv ${daily.warNet >= 0 ? 'pos' : 'neg'}">${fmtSigned(daily.warNet)}</span>
        </div>
        <div class="bs-line">
          <span class="ll">× ${days} day${days > 1 ? 's' : ''}</span>
          <span class="lv ${warTotal >= 0 ? 'pos' : 'neg'}">${fmtSigned(warTotal)}</span>
        </div>
        <div class="bs-line total">
          <span class="ll">War operations</span>
          <span class="lv ${warTotal >= 0 ? 'pos' : 'neg'}">${fmtSigned(warTotal)}</span>
        </div>
      </div>
    </div>

    <div class="flow-net ${grandSwing >= 0 ? 'positive' : 'negative'}" style="margin-top: 0.85rem;">
      <span>Bitcoin swing vs starting position</span>
      <span class="mono">${fmtSigned(grandSwing)}</span>
    </div>

    <div class="bs-block" style="margin-top: 0.7rem;">
      <h5>Comparison</h5>
      <div class="bs-line">
        <span class="ll">If you stayed in peace</span>
        <span class="lv ${peaceTotal >= 0 ? 'pos' : 'neg'}">${fmtSigned(peaceTotal)}</span>
      </div>
      <div class="bs-line">
        <span class="ll">Opportunity cost of fighting</span>
        <span class="lv neg">${fmtSigned(-oppCost)}</span>
      </div>
    </div>

    <p class="note">Numbers ignore: scrap/case drop value beyond the ${fmtBtc(WAR_LOOT_INCOME_PER_DAY)}/day estimate, mission rewards beyond dailies, and any bounties.</p>
  `;
}

/* ═══════════════════════════════════════════════════════════════════
 *  STATUS / FLOW
 * ═══════════════════════════════════════════════════════════════════ */
function setStatus(kind, msg = '') {
  const el = $('#status');
  el.className = 'status' + (kind ? ' ' + kind : '');
  el.textContent = msg;
}

async function load(username) {
  if (!username) { setStatus('error', 'Enter a username.'); return; }
  setStatus('', `Resolving "${username}"…`);
  $('#load-btn').disabled = true;
  $('#player').classList.add('hidden');
  $('#debug-panel').classList.add('hidden');
  try {
    const userId = await resolveUserId(username);
    if (!userId) throw new Error(`No user found for "${username}"`);
    setStatus('', `Loading profile…`);
    const data = await loadPlayer(userId);
    renderPlayer(data);
    const newQs = new URLSearchParams();
    newQs.set('u', username);
    if (DEBUG) newQs.set('debug', '1');
    history.replaceState(null, '', '?' + newQs.toString());
    setStatus('ok', `Loaded ${data.user?.username || username}.`);
  } catch (e) {
    console.error(e);
    setStatus('error', e.message || String(e));
  } finally {
    $('#load-btn').disabled = false;
  }
}

$('#load-btn').addEventListener('click', () => load($('#username').value.trim()));
$('#username').addEventListener('keydown', e => {
  if (e.key === 'Enter') load($('#username').value.trim());
});

const initialU = QS.get('u');
if (initialU) {
  $('#username').value = initialU;
  load(initialU);
} else {
  $('#username').focus();
}

if (DEBUG) console.log('Debug mode on.');
</script>
